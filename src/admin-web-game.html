      function renderPartyPresetCard(preset, index) {
        const profiles = (preset.serviceIds || [])
          .map((serviceId) => serviceById(serviceId))
          .filter(Boolean)
          .map((service) => buildHeroProfile(service));
        const rosterCopy = profiles.length
          ? profiles.map((profile) => profile.displayName).slice(0, 3).join(' / ')
          : '저장된 멤버 없음';

        return `
          <article class="preset-card">
            <div class="preset-top">
              <div>
                <div class="mission-tier">Squad ${escapeHtml(String(index + 1))}</div>
                <h3>${escapeHtml(preset.name)}</h3>
              </div>
              <span class="pill">${escapeHtml(`${profiles.length}/${PARTY_LIMIT}`)}</span>
            </div>
            <p>${escapeHtml(rosterCopy)}</p>
            <div class="preset-meta">
              <span>${escapeHtml(`${partyCombatPower(profiles)} power`)}</span>
              <span>${escapeHtml(profiles[0]?.formationRoleLabel || 'idle')}</span>
            </div>
            <div class="party-controls">
              <button
                type="button"
                class="secondary small"
                data-action="load-party-preset"
                data-preset-slot="${escapeHtml(preset.slotId)}"
              >
                불러오기
              </button>
              <button
                type="button"
                class="secondary small"
                data-action="save-party-preset"
                data-preset-slot="${escapeHtml(preset.slotId)}"
              >
                현재 파티 저장
              </button>
            </div>
          </article>
        `;
      }

      function renderRaidEncounterCard(encounter) {
        const raid = raidState();
        const bossPercent = encounter.active
          ? Math.max(
              0,
              Math.round((encounter.bossHp / Math.max(encounter.bossMaxHp, 1)) * 100),
            )
          : Math.max(
              18,
              Math.min(
                100,
                Math.round((encounter.partyPower / Math.max(encounter.difficulty, 1)) * 100),
              ),
            );

        return `
          <article class="mission-card ${escapeHtml(encounter.state)} ${encounter.cleared ? 'clear' : ''}">
            <div class="mission-top">
              <div>
                <div class="mission-tier">${escapeHtml(encounter.tier)}</div>
                <h3>${escapeHtml(encounter.title)}</h3>
              </div>
              <span class="pill">${escapeHtml(
                encounter.cleared
                  ? 'loot ready'
                  : encounter.active
                    ? 'engaged'
                    : encounter.readinessLabel,
              )}</span>
            </div>
            <p>${escapeHtml(encounter.copy)}</p>
            <div class="hero-meter">
              <span style="width:${escapeHtml(String(bossPercent))}%"></span>
            </div>
            <div class="mission-footer">
              <span>${escapeHtml(
                encounter.active
                  ? `boss ${encounter.bossHp}/${encounter.bossMaxHp} · ${encounter.reward}`
                  : `power ${encounter.partyPower}/${encounter.difficulty} · ${encounter.reward}`,
              )}</span>
              <div class="party-controls">
                ${
                  encounter.active
                    ? encounter.cleared
                      ? `
                        <button
                          type="button"
                          class="secondary mission-action"
                          data-action="claim-raid-loot"
                        >
                          보상 회수
                        </button>
                      `
                      : `
                        <button
                          type="button"
                          class="secondary mission-action"
                          data-action="raid-command"
                          data-command="strike"
                        >
                          강타
                        </button>
                        <button
                          type="button"
                          class="secondary mission-action"
                          data-action="raid-command"
                          data-command="burst"
                        >
                          오버클럭
                        </button>
                        <button
                          type="button"
                          class="secondary mission-action"
                          data-action="raid-command"
                          data-command="guard"
                        >
                          수비
                        </button>
                        <button
                          type="button"
                          class="secondary mission-action"
                          data-action="raid-command"
                          data-command="rally"
                        >
                          집결
                        </button>
                      `
                    : `
                      <button
                        type="button"
                        class="secondary mission-action"
                        data-action="begin-raid"
                        data-encounter-id="${escapeHtml(encounter.id)}"
                      >
                        레이드 시작
                      </button>
                    `
                }
              </div>
            </div>
            ${
              encounter.active
                ? `
                  <div class="note raid-outcome">
                    ${escapeHtml(
                      raid.lastOutcome ||
                        `${encounter.title}와 교전 중입니다. 현재 선택된 영웅의 스킬로 흐름을 바꾸세요.`,
                    )}
                  </div>
                `
                : ''
            }
          </article>
        `;
      }

      function selectHero(serviceId) {
        const service = serviceById(serviceId);
        if (!service) return;
        ui.selectedServiceId = service.serviceId;
        focusCameraOn('service', service.serviceId);
        render();
        if (ui.activeDesk === 'hr' && ui.activeTab === 'employees') {
          void loadServiceLogs(service.serviceId, true);
        }
      }

      function togglePartyMember(serviceId) {
        const service = serviceById(serviceId);
        if (!service) return;
        const currentParty = uniqueIds(ui.heroPartyServiceIds);
        const existingIndex = currentParty.indexOf(serviceId);
        if (existingIndex >= 0) {
          if (currentParty.length === 1) {
            showToast('최소 한 명은 파티에 남겨야 합니다.', 'info');
            return;
          }
          currentParty.splice(existingIndex, 1);
          ui.heroPartyServiceIds = currentParty;
          if (ui.selectedServiceId === serviceId) {
            ui.selectedServiceId = currentParty[0] || null;
          }
          persistUiPrefs();
          render();
          return;
        }
        if (currentParty.length >= PARTY_LIMIT) {
          showToast('파티 정원은 4명입니다. 먼저 한 명을 해제하세요.', 'info');
          return;
        }
        ui.heroPartyServiceIds = [...currentParty, serviceId];
        ui.selectedServiceId = serviceId;
        focusCameraOn('service', serviceId);
        persistUiPrefs();
        render();
      }

      function savePartyPreset(slotId) {
        if (!slotId) return;
        ui.heroPartyPresets = partyPresets().map((preset) =>
          preset.slotId === slotId
            ? {
                ...preset,
                serviceIds: uniqueIds(ui.heroPartyServiceIds).slice(0, PARTY_LIMIT),
              }
            : preset,
        );
        persistUiPrefs();
        pushCampaignJournal(
          'Squad Save',
          `${slotId.toUpperCase()} 슬롯에 현재 파티를 저장했습니다.`,
        );
        render();
        showToast('파티 프리셋 저장', 'success');
      }

      function loadPartyPreset(slotId) {
        const preset = partyPresets().find((entry) => entry.slotId === slotId);
        const nextParty = uniqueIds(preset?.serviceIds || [])
          .map((serviceId) => serviceById(serviceId)?.serviceId || '')
          .filter(Boolean)
          .slice(0, PARTY_LIMIT);

        if (!nextParty.length) {
          showToast('이 슬롯에는 저장된 파티가 없습니다.', 'info');
          return;
        }

        ui.heroPartyServiceIds = nextParty;
        ui.selectedServiceId = nextParty[0];
        focusCameraOn('service', nextParty[0]);
        persistUiPrefs();
        pushCampaignJournal(
          'Squad Load',
          `${preset.name} 구성을 불러와 파티를 즉시 교체했습니다.`,
        );
        render();
        showToast('파티 프리셋 불러오기', 'success');
      }

      function cycleHero(step) {
        const party = partyServices();
        if (!party.length) return;
        const currentIndex = party.findIndex(
          (service) => service.serviceId === ui.selectedServiceId,
        );
        const baseIndex = currentIndex >= 0 ? currentIndex : 0;
        const nextIndex =
          (baseIndex + step + party.length) % Math.max(party.length, 1);
        selectHero(party[nextIndex].serviceId);
      }

      async function handleHeroCustomizationSubmit(form) {
        const formData = new FormData(form);
        const serviceId = String(formData.get('serviceId') || '').trim();
        if (!serviceId || !serviceById(serviceId)) {
          throw new Error('대상 캐릭터를 찾을 수 없습니다.');
        }

        const nextEntry = {
          alias: String(formData.get('alias') || '').trim(),
          title: String(formData.get('title') || '').trim(),
          formationRole:
            String(formData.get('formationRole') || '').trim() ||
            defaultFormationRole(serviceById(serviceId)),
          theme: String(formData.get('theme') || '').trim(),
          motto: String(formData.get('motto') || '').trim(),
        };

        const hasMeaningfulCustomization = Boolean(
          nextEntry.alias ||
            nextEntry.title ||
            nextEntry.motto ||
            nextEntry.formationRole !== defaultFormationRole(serviceById(serviceId)) ||
            nextEntry.theme,
        );

        if (hasMeaningfulCustomization) {
          ui.heroCustomizations = {
            ...ui.heroCustomizations,
            [serviceId]: nextEntry,
          };
        } else {
          const nextCustomizations = { ...ui.heroCustomizations };
          delete nextCustomizations[serviceId];
          ui.heroCustomizations = nextCustomizations;
        }

        persistUiPrefs();
        render();
        showToast('캐릭터 커스터마이징을 저장했습니다.', 'success');
      }

      function resetHeroCustomization(serviceId) {
        if (!serviceId) return;
        const nextCustomizations = { ...ui.heroCustomizations };
        delete nextCustomizations[serviceId];
        ui.heroCustomizations = nextCustomizations;
        persistUiPrefs();
        render();
        showToast('기본 캐릭터 설정으로 되돌렸습니다.', 'info');
      }

      function beginRaid(encounterId) {
        const encounter = buildRaidEncounters().find(
          (entry) => entry.id === encounterId,
        );
        if (!encounter) return;
        if (partyServices().length < 2) {
          showToast('레이드는 최소 2인 파티가 필요합니다.', 'info');
          return;
        }

        ui.campaignState = {
          ...ui.campaignState,
          raid: {
            ...raidState(),
            activeEncounterId: encounter.id,
            bossHp: encounter.bossMaxHp,
            bossMaxHp: encounter.bossMaxHp,
            pendingReward: '',
            lastBossTitle: encounter.title,
            lastOutcome: `${encounter.title}이(가) HQ 외곽에 출현했습니다.`,
          },
        };
        pushCampaignJournal(
          'Raid Start',
          `${encounter.title} 레이드를 개시했습니다. 보상은 ${encounter.reward}입니다.`,
        );
        persistUiPrefs();
        render();
        showToast('레이드 시작', 'success');
      }

      function executeRaidCommand(command) {
        const encounter = activeRaidEncounter();
        const hero = selectedHeroProfile();
        if (!encounter || !hero) return;

        const raid = raidState();
        const partySize = Math.max(partyServices().length, 1);
        const power = partyCombatPower();
        let damage = 0;
        let moraleDelta = 0;
        let syncDelta = 0;
        let threatDelta = 0;
        let guildDelta = 0;
        let logLine = '';

        if (command === 'strike') {
          damage = Math.round(power * 0.22 + hero.focus * 1.4 + hero.level * 2);
          syncDelta = 2;
          logLine = `${hero.displayName}이(가) ${encounter.title}에게 강타를 날려 ${damage} 피해를 입혔습니다.`;
        } else if (command === 'burst') {
          damage = Math.round(power * 0.28 + hero.focus * 1.8 + hero.mp * 0.3);
          syncDelta = 4;
          threatDelta = 3;
          logLine = `${hero.displayName}이(가) 오버클럭으로 ${encounter.title}의 코어를 흔들어 ${damage} 피해를 만들었습니다.`;
        } else if (command === 'guard') {
          damage = Math.round(power * 0.12 + hero.guard * 1.7);
          threatDelta = -6;
          guildDelta = 2;
          logLine = `${hero.displayName}이(가) 방어 진형을 세워 ${encounter.title}의 위협도를 낮추고 ${damage} 피해를 누적했습니다.`;
        } else if (command === 'rally') {
          damage = Math.round(power * 0.14 + hero.speed * 1.3 + partySize * 8);
          moraleDelta = 6;
          syncDelta = 3;
          logLine = `${hero.displayName}이(가) 파티를 집결시켜 사기를 올리고 ${damage} 피해를 유도했습니다.`;
        } else {
          return;
        }

        const bossHp = Math.max(0, raid.bossHp - damage);
        const cleared = bossHp <= 0;

        ui.campaignState = {
          ...ui.campaignState,
          moraleBonus: clampNumber(
            (ui.campaignState.moraleBonus || 0) + moraleDelta,
            0,
            40,
          ),
          syncBonus: clampNumber(
            (ui.campaignState.syncBonus || 0) + syncDelta,
            0,
            40,
          ),
          threatDelta: clampNumber(
            (ui.campaignState.threatDelta || 0) + threatDelta,
            -40,
            40,
          ),
          guildBonus: clampNumber(
            (ui.campaignState.guildBonus || 0) + guildDelta,
            0,
            40,
          ),
          raid: {
            ...raid,
            bossHp,
            bossMaxHp: raid.bossMaxHp || encounter.bossMaxHp,
            pendingReward: cleared ? encounter.reward : raid.pendingReward,
            lastBossTitle: encounter.title,
            lastOutcome: cleared
              ? `${hero.displayName}이(가) ${encounter.title}을 격파했습니다. ${encounter.reward} 회수 준비 완료.`
              : logLine,
          },
        };

        pushCampaignJournal(
          cleared ? 'Raid Clear' : 'Raid Turn',
          cleared
            ? `${encounter.title} 레이드 정리 완료. ${encounter.reward}를 회수할 수 있습니다.`
            : logLine,
        );
        persistUiPrefs();
        render();
        showToast(
          cleared ? `${encounter.title} 격파` : `${raidCommandLabel(command)} 실행`,
          'success',
        );
      }

      function claimRaidLoot() {
        const encounter = activeRaidEncounter();
        const raid = raidState();
        if (!encounter || raid.bossHp > 0) return;
        const rewardRelic = relicDefForEncounter(encounter.id);
        const inventory = ownedRelicIds();
        const equipped = equippedRelicIds();
        const alreadyOwned = rewardRelic
          ? inventory.includes(rewardRelic.id)
          : false;
        const nextInventory =
          rewardRelic && !alreadyOwned
            ? [...inventory, rewardRelic.id]
            : inventory;
        const autoEquipped =
          rewardRelic && !alreadyOwned && equipped.length < RELIC_EQUIP_LIMIT;
        const nextEquippedRelicIds =
          rewardRelic && autoEquipped
            ? [...equipped, rewardRelic.id]
            : equipped;
        const lootTitle = rewardRelic?.title || encounter.reward;
        const outcomeCopy = rewardRelic
          ? alreadyOwned
            ? `${lootTitle} 공명이 누적되어 렐릭 충전이 상승했습니다.`
            : autoEquipped
              ? `${lootTitle}를 확보해 즉시 장착했습니다.`
              : `${lootTitle}를 확보해 렐릭 금고에 보관했습니다.`
          : `${encounter.reward}를 확보해 길드 전력을 강화했습니다.`;
        const journalCopy = rewardRelic
          ? alreadyOwned
            ? `${lootTitle}와 기존 금고가 공명해 추가 충전을 확보했습니다.`
            : autoEquipped
              ? `${lootTitle} 회수 완료. 즉시 장착되어 파티 전투력이 상승했습니다.`
              : `${lootTitle} 회수 완료. 렐릭 금고에서 언제든 장착할 수 있습니다.`
          : `${encounter.reward} 회수 완료. 길드 전력과 사기가 함께 상승했습니다.`;

        ui.campaignState = {
          ...ui.campaignState,
          moraleBonus: clampNumber((ui.campaignState.moraleBonus || 0) + 6, 0, 40),
          syncBonus: clampNumber((ui.campaignState.syncBonus || 0) + 5, 0, 40),
          threatDelta: clampNumber(
            (ui.campaignState.threatDelta || 0) - 8,
            -40,
            40,
          ),
          guildBonus: clampNumber((ui.campaignState.guildBonus || 0) + 6, 0, 40),
          relicInventory: nextInventory,
          equippedRelicIds: nextEquippedRelicIds,
          raid: {
            ...raid,
            activeEncounterId: '',
            bossHp: 0,
            bossMaxHp: 0,
            victories: (raid.victories || 0) + 1,
            relicCharge: (raid.relicCharge || 0) + 1,
            pendingReward: '',
            lastOutcome: outcomeCopy,
            lastBossTitle: encounter.title,
          },
        };
        pushCampaignJournal('Loot', journalCopy);
        persistUiPrefs();
        render();
        showToast('레이드 보상 회수', 'success');
      }

      function equipRelic(relicId) {
        const relic = relicDefById(relicId);
        if (!relic || !ownedRelicIds().includes(relicId)) return;
        const equipped = equippedRelicIds();
        if (equipped.includes(relicId)) return;
        if (equipped.length >= RELIC_EQUIP_LIMIT) {
          showToast(`렐릭은 ${RELIC_EQUIP_LIMIT}개까지만 장착할 수 있습니다.`, 'info');
          return;
        }

        ui.campaignState = {
          ...ui.campaignState,
          equippedRelicIds: [...equipped, relicId],
        };
        pushCampaignJournal(
          'Relic Equip',
          `${relic.title} 장착 완료. 파티 전투력 +${relic.power} 보정을 적용했습니다.`,
        );
        persistUiPrefs();
        render();
        showToast(`${relic.title} 장착`, 'success');
      }

      function unequipRelic(relicId) {
        const relic = relicDefById(relicId);
        if (!relic) return;
        const equipped = equippedRelicIds();
        if (!equipped.includes(relicId)) return;

        ui.campaignState = {
          ...ui.campaignState,
          equippedRelicIds: equipped.filter((entry) => entry !== relicId),
        };
        pushCampaignJournal(
          'Relic Vault',
          `${relic.title} 장착을 해제하고 금고에 보관했습니다.`,
        );
        persistUiPrefs();
        render();
        showToast(`${relic.title} 장착 해제`, 'info');
      }

      function saveRelicLoadout(slotId) {
        if (!slotId) return;
        const equipped = equippedRelicIds();
        const savedAt = new Date().toISOString();
        const nextLoadouts = relicLoadouts().map((loadout) =>
          loadout.slotId === slotId
            ? {
                ...loadout,
                relicIds: equipped,
                savedAt,
              }
            : loadout,
        );
        const loadout = nextLoadouts.find((entry) => entry.slotId === slotId);
        const relicTitles = equipped
          .map((relicId) => relicDefById(relicId)?.title || '')
          .filter(Boolean);

        ui.campaignState = {
          ...ui.campaignState,
          relicLoadouts: nextLoadouts,
        };
        pushCampaignJournal(
          'Relic Memory',
          relicTitles.length
            ? `${loadout?.name || slotId} 슬롯에 ${relicTitles.join(' / ')} 구성을 저장했습니다.`
            : `${loadout?.name || slotId} 슬롯을 빈 렐릭 세팅으로 저장했습니다.`,
        );
        persistUiPrefs();
        render();
        showToast('렐릭 메모리 저장', 'success');
      }

      function loadRelicLoadout(slotId) {
        const loadout = relicLoadouts().find((entry) => entry.slotId === slotId);
        if (!loadout?.savedAt) {
          showToast('이 슬롯에는 저장된 렐릭 세팅이 없습니다.', 'info');
          return;
        }
        const nextEquippedRelicIds = uniqueIds(loadout.relicIds || [])
          .filter((relicId) => ownedRelicIds().includes(relicId))
          .slice(0, RELIC_EQUIP_LIMIT);
        const relicTitles = nextEquippedRelicIds
          .map((relicId) => relicDefById(relicId)?.title || '')
          .filter(Boolean);

        ui.campaignState = {
          ...ui.campaignState,

        };

            : `${loadout.name} 구성을 불러와 모든 렐릭을 금고 대기 상태로 전환했습니다.`,

      function triggerHeroAction(actionId) {
        const hero = selectedHeroProfile();
        if (!hero) return;
        const focus = currentFocusSummary();
        const nextState = {
          ...ui.campaignState,
        };
        const heroName = hero.displayName;
        const focusTitle = focus?.title || '오피스 전체';

        if (actionId === 'scout') {
          nextState.syncBonus = clampNumber((nextState.syncBonus || 0) + 4, 0, 40);
          nextState.threatDelta = clampNumber((nextState.threatDelta || 0) - 6, -40, 40);
          pushCampaignJournal(
            'Scout',
            `${heroName}이(가) ${focusTitle} 주변을 정찰해 위험 수치를 낮췄습니다.`,
          );
        } else if (actionId === 'brief') {
          nextState.syncBonus = clampNumber((nextState.syncBonus || 0) + 6, 0, 40);
          nextState.guildBonus = clampNumber((nextState.guildBonus || 0) + 3, 0, 40);
          pushCampaignJournal(
            'Brief',
            `${heroName}이(가) ${focusTitle} 브리핑을 마치고 길드 동기화를 끌어올렸습니다.`,
          );
        } else if (actionId === 'fortify') {
          nextState.threatDelta = clampNumber((nextState.threatDelta || 0) - 10, -40, 40);
          nextState.guildBonus = clampNumber((nextState.guildBonus || 0) + 2, 0, 40);
          pushCampaignJournal(
            'Fortify',
            `${heroName}이(가) ${focusTitle} 방어선을 점검해 HQ 안정도를 높였습니다.`,
          );
        } else if (actionId === 'celebrate') {
          nextState.moraleBonus = clampNumber((nextState.moraleBonus || 0) + 8, 0, 40);
          pushCampaignJournal(
            'Celebrate',
            `${heroName}이(가) ${focusTitle}에서 사기 충전 이벤트를 열었습니다.`,
          );
        } else {
          return;
        }

        nextState.journal = campaignJournalEntries();
        ui.campaignState = nextState;
        persistUiPrefs();
        render();
        showToast(`${heroActionLabel(actionId)} 실행`, 'success');
      }

        if (!objectiveId) return;
        ui.campaignState = {
          ...ui.campaignState,
          activeObjectiveId: objectiveId,
        };
        const objective = buildCampaignObjectives().find(
          (entry) => entry.id === objectiveId,
        );
        pushCampaignJournal(
          'Quest',
          `${objective?.title || objectiveId} 퀘스트를 수락했습니다.`,
        );
        persistUiPrefs();
        render();
        showToast('퀘스트 수락', 'success');
      }

      function resolveObjective(objectiveId) {
        const objective = buildCampaignObjectives().find(
          (entry) => entry.id === objectiveId,
        );
        if (!objective) return;
        const completedObjectiveIds = new Set(
          objectiveState().completedObjectiveIds || [],
        );
        completedObjectiveIds.add(objectiveId);
        ui.campaignState = {
          ...ui.campaignState,
          activeObjectiveId:
            ui.campaignState.activeObjectiveId === objectiveId
              ? ''
              : ui.campaignState.activeObjectiveId,
          completedObjectiveIds: [...completedObjectiveIds],
          moraleBonus: clampNumber(
            (ui.campaignState.moraleBonus || 0) + 4,
            0,
            40,
          ),
          syncBonus: clampNumber((ui.campaignState.syncBonus || 0) + 4, 0, 40),
          guildBonus: clampNumber(
            (ui.campaignState.guildBonus || 0) + 3,
            0,
            40,
          ),
          threatDelta: clampNumber(
            (ui.campaignState.threatDelta || 0) - 4,
            -40,
            40,
          ),
        };
        pushCampaignJournal(
          'Quest Clear',
          `${objective.title} 퀘스트를 정리하고 보상 ${objective.reward}를 반영했습니다.`,
        );
        persistUiPrefs();
        render();
        showToast('퀘스트 완료 처리', 'success');
      }

      function syncOriginPanels(form) {
        if (!(form instanceof HTMLFormElement)) return;
        const agentType =
          form.querySelector('[name="agentType"]')?.value === 'codex'
            ? 'codex'
            : 'claude-code';
        form.querySelectorAll('[data-origin-block]').forEach((block) => {
          block.classList.toggle(
            'is-hidden',
            block.dataset.originBlock !== agentType,
          );
        });
        const summary = form.querySelector('[data-origin-summary]');
        if (summary) {
          summary.value = originSummaryText(agentType);
        }
      }

      function syncRolePanels(form) {
        if (!(form instanceof HTMLFormElement)) return;
        const role =
          form.querySelector('[name="role"]')?.value === 'dashboard'
            ? 'dashboard'
            : 'normal';
        form.querySelectorAll('[data-role-block]').forEach((block) => {
          block.classList.toggle('is-hidden', block.dataset.roleBlock !== role);
        });
        form
          .querySelectorAll('[data-discord-channel-input="channel-id"]')
          .forEach((input) => {
            if (!(input instanceof HTMLInputElement)) return;
            input.required = role === 'dashboard';
            applyDiscordChannelInputState(input);
          });
      }

      async function api(path, options = {}) {
        const init = { ...options };
        if (init.body && !init.headers) {
          init.headers = { 'content-type': 'application/json' };
        }
        const response = await fetch(path, init);
        if (response.status === 401) {
          window.location.href = '/login';
          throw new Error('Authentication required');
        }
        const payload = await response
          .json()
          .catch(() => ({ error: `HTTP ${response.status}` }));
        if (!response.ok) {
          throw new Error(payload.error || `HTTP ${response.status}`);
        }
        return payload;
      }

      function showToast(message, tone = 'info') {
        const el = document.getElementById('toast');
        el.textContent = message;
        el.classList.remove('success', 'error', 'info');
        el.classList.add(tone);
        el.classList.add('visible');
        if (ui.toastTimer) clearTimeout(ui.toastTimer);
        ui.toastTimer = setTimeout(() => {
          el.classList.remove('visible');
        }, 2600);
      }

      function buildServiceSaveToast(result, mode = 'update') {
        const prefix =
          mode === 'hire'
            ? '직원을 저장했습니다.'
            : '직원 설정을 저장했습니다.';
        if (result?.restartScheduled) {
          return `${prefix} 대상 서비스 재시작을 함께 적용했습니다. 반영까지 몇 초 걸릴 수 있습니다.`;
        }
        if (result?.runtime?.running) {
          return `${prefix} 실행 중 서비스 상태를 확인했습니다.`;
        }
        return `${prefix} 반영 상태는 아래 실행 정보에서 확인해 주세요.`;
      }

      function getSubmitBusyLabel(formId) {
        if (formId === 'chat-form' || formId === 'team-chat-form') {
          return '전송 중...';
        }
        if (formId === 'map-upload-form') {
          return '업로드 중...';
        }
        return '저장 중...';
      }

      function setFormBusy(form, isBusy, submitter) {
        const buttons = Array.from(form.querySelectorAll('button'));
        buttons.forEach((button) => {
          if (!(button instanceof HTMLButtonElement)) return;
          if (!button.dataset.originalLabel) {
            button.dataset.originalLabel = button.textContent || '';
          }
          button.disabled = isBusy;
        });
        if (
          submitter instanceof HTMLButtonElement &&
          submitter.dataset.originalLabel
        ) {
          submitter.textContent = isBusy
            ? getSubmitBusyLabel(form.id)
            : submitter.dataset.originalLabel;
        }
      }

      function ensureSelection() {
        if (!ui.data) return;
        const derived = ui.derived || emptyDerivedState();
        const availablePartyIds = (
          derived.nonDashboardServices.length
            ? derived.nonDashboardServices
            : derived.services
        ).map((service) => service.serviceId);
        const availablePartyIdSet = new Set(availablePartyIds);

        ui.heroPartyServiceIds = uniqueIds(ui.heroPartyServiceIds).filter(
          (serviceId) => availablePartyIdSet.has(serviceId),
        );
        ui.heroPartyPresets = partyPresets().map((preset) => ({
          ...preset,
          serviceIds: uniqueIds(preset.serviceIds).filter((serviceId) =>
            availablePartyIdSet.has(serviceId),
          ),
        }));
        if (!ui.heroPartyServiceIds.length) {
          ui.heroPartyServiceIds = availablePartyIds.slice(0, PARTY_LIMIT);
        }

        if (!ui.selectedTeamId || !derived.teamsById.has(ui.selectedTeamId)) {
          ui.selectedTeamId = derived.teams[0]?.teamId || null;
        }

        const preferredService =
          serviceById(ui.selectedServiceId) ||
          serviceById(ui.heroPartyServiceIds[0]) ||
          derived.nonDashboardServices[0] ||
          derived.services[0] ||
          null;
        ui.selectedServiceId = preferredService?.serviceId || null;

        const preferredTeamService = teamChatTarget(ui.selectedTeamId);
        ui.selectedTeamChatServiceId = preferredTeamService?.serviceId || null;

        if (
          ui.selectedTemperamentId &&
          !derived.temperamentsById.has(ui.selectedTemperamentId)
        ) {
          ui.selectedTemperamentId = null;
        }

        if (!ui.selectedTemperamentId) {
          ui.selectedTemperamentId =
            derived.temperaments[0]?.temperamentId || null;
        }

        if (
          ui.selectedRoomId &&
          !['general', 'lounge', 'offsite', 'ops'].includes(ui.selectedRoomId)
        ) {
          ui.selectedRoomId = null;
        }

        if (
          ui.selectedLayoutTargetKey?.startsWith('team:') &&
          !derived.teamLayoutTargetKeys.has(ui.selectedLayoutTargetKey)
        ) {
          ui.selectedLayoutTargetKey = null;
        }

        if (ui.cameraTargetKey.startsWith('service:')) {
          const serviceId = ui.cameraTargetKey.slice('service:'.length);
          if (!serviceById(serviceId)) {
            ui.cameraTargetKey = '';
          }
        } else if (ui.cameraTargetKey.startsWith('team:')) {
          const teamId = ui.cameraTargetKey.slice('team:'.length);
          if (!derived.teamsById.has(teamId)) {
            ui.cameraTargetKey = '';
          }
        } else if (
          ui.cameraTargetKey.startsWith('room:') &&
          !['management', 'general', 'hr', 'lounge', 'offsite', 'ops'].includes(
            ui.cameraTargetKey.slice('room:'.length),
          )
        ) {
          ui.cameraTargetKey = '';
        }

        persistUiPrefs();
      }

        officeGame.resizeObserver?.disconnect?.();

      async function loadState(options = {}) {
        const payload = await api('/api/admin/state');
        const nextMapVersion = payload.map?.version || null;
        if (
          ui.mapVersion &&
          nextMapVersion &&
          ui.mapVersion !== nextMapVersion
        ) {
          destroyOfficeGame();
        }
        ui.mapVersion = nextMapVersion;
        ui.data = payload;
        rebuildDerivedState();
        ensureSelection();
        render();

        if (ui.detailMode === 'room' && ui.selectedRoomId === 'ops') {
          void loadDashboardPreview();
        }

        if (
          !options.skipChatSync &&
          ui.selectedTeamId &&
          teamChatTarget(ui.selectedTeamId)
        ) {
          await loadChatHistory(ui.selectedTeamId, true);
        }

        if (
          ui.activeDesk === 'hr' &&
          ui.activeTab === 'employees' &&
          ui.selectedServiceId &&
          ui.serviceLogs.serviceId !== ui.selectedServiceId
        ) {
          void loadServiceLogs(ui.selectedServiceId, true);
        }
      }

      async function loadChatHistory(teamId, silent = false) {
        const team = teamById(teamId);
        const target = teamChatTarget(teamId);
        if (!team || !team.linkedJid || !target) {
          ui.chatHistory = [];
          renderDetailPanel();
          return;
        }

        ui.chatLoading = true;
        if (!silent) {
          renderDetailPanel();
        }
        try {
          const payload = await api(
            `/api/admin/chat/history?teamId=${encodeURIComponent(team.teamId)}`,
          );
          if (ui.selectedTeamId === team.teamId) {
            ui.chatHistory = payload.history || [];
          }
        } catch (error) {
          showToast(error.message || '채팅 이력을 가져오지 못했습니다.', 'error');
        } finally {
          ui.chatLoading = false;
          renderDetailPanel();
        }
      }

      async function loadServiceLogs(serviceId, silent = false) {
        if (!serviceId) {
          ui.serviceLogs = {
            serviceId: null,
            loading: false,
            error: '',
            stdout: '',
            stderr: '',
            stdoutPath: '',
            stderrPath: '',
            loadedAt: null,
          };
          if (!silent) renderDetailPanel();
          return;
        }

        if (ui.serviceLogs.loading && ui.serviceLogs.serviceId === serviceId) {
          return;
        }

        ui.serviceLogs = {
          ...ui.serviceLogs,
          serviceId,
          loading: true,
          error: '',
        };
        if (!silent) {
          renderDetailPanel();
        }

        try {
          const payload = await api(
            `/api/admin/services/logs?serviceId=${encodeURIComponent(serviceId)}`,
          );
          if (ui.selectedServiceId === serviceId) {
            ui.serviceLogs = {
              serviceId,
              loading: false,
              error: '',
              stdout: String(payload.stdout || ''),
              stderr: String(payload.stderr || ''),
              stdoutPath: String(payload.stdoutPath || ''),
              stderrPath: String(payload.stderrPath || ''),
              loadedAt: payload.loadedAt || null,
            };
          }
        } catch (error) {
          if (ui.selectedServiceId === serviceId) {
            ui.serviceLogs = {
              ...ui.serviceLogs,
              serviceId,
              loading: false,
              error: error.message || '로그를 가져오지 못했습니다.',
            };
          }
          if (!silent) {
            showToast(error.message || '로그를 가져오지 못했습니다.', 'error');
          }
        } finally {
          if (ui.selectedServiceId === serviceId) {
            ui.serviceLogs.loading = false;
            if (ui.activeDesk === 'hr' && ui.activeTab === 'employees') {
              renderDetailPanel();
            }
          }
        }
      }

      function manageTeam(teamId) {

      async function loadDashboardPreview(force = false) {
        if (ui.dashboardPreview.loading) {
          return;
        }
        ui.dashboardPreview.loading = true;
        ui.dashboardPreview.error = '';
        if (ui.detailMode === 'room' && ui.selectedRoomId === 'ops') {
          renderDetailPanel();
        }
        try {
          const payload = await api(
            `/api/admin/dashboard-preview${force ? '?force=1' : ''}`,

          if (ui.detailMode === 'room' && ui.selectedRoomId === 'ops') {
            renderDetailPanel();

      }

      function getObjectProperty(object, name, fallback = '') {
        const entry = object?.properties?.find(
          (property) => property.name === name,
        );
        return entry?.value ?? fallback;
      }

      function getOfficeWorldSize(state) {
        return {
          width:
            state?.worldWidth ||
            state?.map?.widthInPixels ||
            state?.scene?.scale?.width ||
            960,
          height:
            state?.worldHeight ||
            state?.map?.heightInPixels ||
            state?.scene?.scale?.height ||
            576,
        };
      }

      function pixelRectToPercent(rect, worldWidth, worldHeight) {
        return {
          left: (rect.x / Math.max(worldWidth, 1)) * 100,
          top: (rect.y / Math.max(worldHeight, 1)) * 100,
          width: (rect.width / Math.max(worldWidth, 1)) * 100,
          height: (rect.height / Math.max(worldHeight, 1)) * 100,
        };
      }

      function pixelPointToPercent(point, worldWidth, worldHeight) {
        return {
          left: (point.x / Math.max(worldWidth, 1)) * 100,
          top: (point.y / Math.max(worldHeight, 1)) * 100,
        };
      }

      function percentToPixels(value, total) {
        return (Number(value) / 100) * Math.max(total, 1);
      }

      function pixelsToPercent(value, total) {
        return (Number(value) / Math.max(total, 1)) * 100;
      }

      function getTileGrid(layoutData) {
        const worldWidth = Math.max(Number(layoutData?.worldWidth) || 960, 1);
        const worldHeight = Math.max(Number(layoutData?.worldHeight) || 576, 1);
        const tileWidth = Math.max(Number(layoutData?.tileWidth) || 16, 1);
        const tileHeight = Math.max(Number(layoutData?.tileHeight) || 16, 1);
        return {
          worldWidth,
          worldHeight,
          tileWidth,
          tileHeight,
          tilesX: Math.max(Math.round(worldWidth / tileWidth), 1),
          tilesY: Math.max(Math.round(worldHeight / tileHeight), 1),
          stepX: pixelsToPercent(tileWidth, worldWidth),
          stepY: pixelsToPercent(tileHeight, worldHeight),
        };
      }

      function snapPixelsToGrid(value, tileSize) {
        return (
          Math.round(Number(value) / Math.max(tileSize, 1)) *
          Math.max(tileSize, 1)
        );
      }

      function snapLayoutPositionPercent(value, axis, layoutData) {
        const grid = getTileGrid(layoutData);
        const total = axis === 'x' ? grid.worldWidth : grid.worldHeight;
        const tile = axis === 'x' ? grid.tileWidth : grid.tileHeight;
        const snappedPixels = snapPixelsToGrid(
          percentToPixels(value, total),
          tile,
        );
        return clampNumber(pixelsToPercent(snappedPixels, total), 0, 100);
      }

      function snapLayoutSizePercent(value, axis, layoutData, origin = 0) {
        const grid = getTileGrid(layoutData);
        const total = axis === 'x' ? grid.worldWidth : grid.worldHeight;
        const tile = axis === 'x' ? grid.tileWidth : grid.tileHeight;
        const originPixels = percentToPixels(origin, total);
        const maxPixels = Math.max(total - originPixels, tile);
        const snappedPixels = snapPixelsToGrid(
          percentToPixels(value, total),
          tile,
        );
        const clampedPixels = clampNumber(snappedPixels, tile, maxPixels);
        return clampNumber(pixelsToPercent(clampedPixels, total), 0, 100);
      }

      function snapLayoutRectToGrid(rect, layoutData) {
        const left = snapLayoutPositionPercent(rect.left, 'x', layoutData);
        const top = snapLayoutPositionPercent(rect.top, 'y', layoutData);
        const width = snapLayoutSizePercent(rect.width, 'x', layoutData, left);
        const height = snapLayoutSizePercent(rect.height, 'y', layoutData, top);
        return {
          ...rect,
          left,
          top,
          width,
          height,
        };
      }

      function percentToTileUnits(value, axis, layoutData) {
        const grid = getTileGrid(layoutData);
        const total = axis === 'x' ? grid.worldWidth : grid.worldHeight;
        const tile = axis === 'x' ? grid.tileWidth : grid.tileHeight;
        const maxTiles = axis === 'x' ? grid.tilesX : grid.tilesY;
        const tiles = Math.round(
          percentToPixels(value, total) / Math.max(tile, 1),
        );
        return clampNumber(tiles, 0, maxTiles);
      }

      function tileUnitsToPercent(value, axis, layoutData) {
        const grid = getTileGrid(layoutData);
        const total = axis === 'x' ? grid.worldWidth : grid.worldHeight;
        const tile = axis === 'x' ? grid.tileWidth : grid.tileHeight;
        const tiles = Math.max(Math.round(Number(value) || 0), 0);
        return pixelsToPercent(tiles * tile, total);
      }

      function layoutRectToTileUnits(rect, layoutData) {
        return {
          left: percentToTileUnits(rect.left, 'x', layoutData),
          top: percentToTileUnits(rect.top, 'y', layoutData),
          width: Math.max(percentToTileUnits(rect.width, 'x', layoutData), 1),
          height: Math.max(percentToTileUnits(rect.height, 'y', layoutData), 1),
        };
      }

      function slotOrderValue(slotId) {
        const match = String(slotId || '').match(/(\d+)/);
        return match ? Number(match[1]) : Number.MAX_SAFE_INTEGER;
      }

      function average(values, fallback = 0) {
        if (!values.length) return fallback;
        return values.reduce((sum, value) => sum + value, 0) / values.length;
      }

      function compactRoomTitle(room) {
        if (room.kind === 'team') {
          const hashMatch = String(room.name || '').match(/#[^ ]+/);
          if (hashMatch) return hashMatch[0];
        }
        const label = String(room.name || '')
          .replace(/^HKClaw\s+/i, '')
          .trim();
        return label.length > 18 ? `${label.slice(0, 17)}…` : label;
      }

      function compactRoomCopy(room) {
        if (room.kind === 'team') {
          return room.badge || 'No staff';
        }
        return room.copy || '';
      }

      function enhanceText(text, resolution = TEXT_RENDER_RESOLUTION) {
        if (typeof text?.setResolution === 'function') {
          text.setResolution(resolution);
        }
        if (typeof text?.setPadding === 'function') {
          text.setPadding(2, 1, 2, 2);
        }
        if (typeof text?.setShadow === 'function') {
          text.setShadow(0, 1, 'rgba(0,0,0,0.35)', 1, false, true);
        }
        return text;
      }

      function extractTiledLayoutData(state) {
        const map = state?.map;
        const { width: worldWidth, height: worldHeight } =
          getOfficeWorldSize(state);
        const tileWidth = Math.max(Number(map?.tileWidth) || 16, 1);
        const tileHeight = Math.max(Number(map?.tileHeight) || 16, 1);
        if (!map) {
          return {
            worldWidth,
            worldHeight,
            tileWidth,
            tileHeight,
            zones: [],
            teamSlots: [],
            anchors: {},
          };
        }

        const zones = (map.getObjectLayer('Zones')?.objects || [])
          .filter((object) => object.visible !== false)
          .map((object) => ({
            id: getObjectProperty(
              object,
              'roomId',
              object.name || object.type || 'zone',
            ),
            kind: getObjectProperty(
              object,
              'kind',
              object.type || object.name || 'zone',
            ),
            ...pixelRectToPercent(object, worldWidth, worldHeight),
          }));

        const teamSlots = (map.getObjectLayer('TeamSlots')?.objects || [])
          .filter((object) => object.visible !== false)
          .map((object) => ({
            slotId: getObjectProperty(
              object,
              'slotId',
              object.name || `slot-${object.id}`,
            ),
            ...pixelRectToPercent(object, worldWidth, worldHeight),
          }))
          .sort((left, right) => {
            const order =
              slotOrderValue(left.slotId) - slotOrderValue(right.slotId);
            if (order !== 0) return order;
            const row = left.top - right.top;
            if (Math.abs(row) > 0.25) return row;
            return left.left - right.left;
          });

        const anchors = Object.fromEntries(
          (map.getObjectLayer('Anchors')?.objects || [])
            .filter((object) => object.visible !== false)
            .map((object) => [
              getObjectProperty(
                object,
                'anchorId',
                object.name || `anchor-${object.id}`,
              ),
              pixelPointToPercent(object, worldWidth, worldHeight),
            ]),
        );

        return {
          worldWidth,
          worldHeight,
          tileWidth,
          tileHeight,
          zones,
          teamSlots,
          anchors,
        };
      }

      function buildFallbackTeamLayouts(teams, layoutData) {
        const layouts = [];
        if (!teams.length) return layouts;

        const cols = teams.length <= 2 ? 2 : 3;
        const rows = Math.ceil(teams.length / cols);
        const roomWidth = cols === 2 ? 22 : 16.5;
        const roomHeight = rows >= 3 ? 18 : 20;
        const gapX = cols === 2 ? 5 : 3.6;
        const gapY = 5;
        const totalWidth = cols * roomWidth + (cols - 1) * gapX;
        const totalHeight = rows * roomHeight + (rows - 1) * gapY;
        const startX = 50 - totalWidth / 2;
        const startY = 48 - totalHeight / 2;

        teams.forEach((team, index) => {
          const col = index % cols;
          const row = Math.floor(index / cols);
          const baseLayout = {
            teamId: team.teamId,
            left: startX + col * (roomWidth + gapX),
            top: startY + row * (roomHeight + gapY),
            width: roomWidth,
            height: roomHeight,
          };
          layouts.push(
            snapLayoutRectToGrid(
              {
                ...baseLayout,
                left:
                  typeof team.layoutLeft === 'number'
                    ? team.layoutLeft
                    : baseLayout.left,
                top:
                  typeof team.layoutTop === 'number'
                    ? team.layoutTop
                    : baseLayout.top,
                width:
                  typeof team.layoutWidth === 'number'
                    ? team.layoutWidth
                    : baseLayout.width,
                height:
                  typeof team.layoutHeight === 'number'
                    ? team.layoutHeight
                    : baseLayout.height,
              },
              layoutData,
            ),
          );
        });

        return layouts;
      }

      function buildTeamLayouts(teams, layoutData) {
        const tiledSlots = layoutData?.teamSlots || [];
        if (!tiledSlots.length) {
          return buildFallbackTeamLayouts(teams, layoutData);
        }
        const visibleTeams = teams.slice(0, tiledSlots.length);
        const layouts = visibleTeams.map((team, index) => {
          const slot = tiledSlots[index];
          return snapLayoutRectToGrid(
            {
              teamId: team.teamId,
              left:
                typeof team.layoutLeft === 'number'
                  ? team.layoutLeft
                  : slot.left,
              top:
                typeof team.layoutTop === 'number' ? team.layoutTop : slot.top,
              width:
                typeof team.layoutWidth === 'number'
                  ? team.layoutWidth
                  : slot.width,
              height:
                typeof team.layoutHeight === 'number'
                  ? team.layoutHeight
                  : slot.height,
              slotId: slot.slotId,
            },
            layoutData,
          );
        });

        if (teams.length <= visibleTeams.length) {
          return layouts;
        }

        const fallbackLayouts = buildFallbackTeamLayouts(
          teams.slice(visibleTeams.length),
          layoutData,
        );
        fallbackLayouts.forEach((layout, index) => {
          layouts.push({
            ...layout,
            teamId: teams[visibleTeams.length + index].teamId,
          });
        });
        return layouts;
      }

      function positionInRect(rect, index, total) {
        const cols = Math.max(1, Math.ceil(Math.sqrt(Math.max(total, 1))));
        const rows = Math.max(1, Math.ceil(total / cols));
        const col = index % cols;
        const row = Math.floor(index / cols);
        const padX = rect.width * 0.18;
        const padY = rect.height * 0.28;
        const usableWidth = Math.max(rect.width - padX * 2, 1);
        const usableHeight = Math.max(rect.height - padY * 2, 1);
        const x = rect.left + padX + usableWidth * ((col + 0.5) / cols);
        const y = rect.top + padY + usableHeight * ((row + 0.5) / rows);
        return { x, y };
      }

      function buildZoneRects(layoutData, roomLayouts = {}) {
        const savedRoomLayouts = roomLayouts || {};
        const applySavedLayout = (roomId, rect) => {
          const saved = savedRoomLayouts[roomId];
          return snapLayoutRectToGrid(
            {
              ...rect,
              left: typeof saved?.left === 'number' ? saved.left : rect.left,
              top: typeof saved?.top === 'number' ? saved.top : rect.top,
              width:
                typeof saved?.width === 'number' ? saved.width : rect.width,
              height:
                typeof saved?.height === 'number' ? saved.height : rect.height,
            },
            layoutData,
          );
        };
        const fallbackRects = {
          management: { left: 3.4, top: 13.9, width: 16.7, height: 27.8 },
          general: { left: 3.4, top: 44.8, width: 16.7, height: 18.2 },
          lounge: { left: 8, top: 71, width: 15, height: 10 },
          offsite: { left: 81, top: 14, width: 11, height: 10 },
          ops: { left: 81, top: 74, width: 11, height: 10 },
          hr: { left: 25, top: 80.5, width: 38.3, height: 14 },
        };
        Object.keys(fallbackRects).forEach((roomId) => {
          fallbackRects[roomId] = applySavedLayout(
            roomId,
            fallbackRects[roomId],
          );
        });
        const mergeRects = (leftRect, rightRect) => {
          if (!leftRect) return rightRect;
          if (!rightRect) return leftRect;

          const left = Math.min(leftRect.left, rightRect.left);
          const top = Math.min(leftRect.top, rightRect.top);
          const right = Math.max(
            leftRect.left + leftRect.width,
            rightRect.left + rightRect.width,
          );
          const bottom = Math.max(
            leftRect.top + leftRect.height,
            rightRect.top + rightRect.height,
          );
          return {
            left,
            top,
            width: right - left,
            height: bottom - top,
          };
        };
        const mergedZoneRects = {};
        (layoutData?.zones || []).forEach((zone) => {
          const roomId = normalizeRoomId(zone.id);
          if (!roomId) return;

          mergedZoneRects[roomId] = mergeRects(mergedZoneRects[roomId], {
            left: zone.left,
            top: zone.top,
            width: zone.width,
            height: zone.height,
          });
        });
        Object.entries(mergedZoneRects).forEach(([roomId, rect]) => {
          fallbackRects[roomId] = applySavedLayout(roomId, rect);
        });
        return fallbackRects;
      }

      function guardPostRect(zoneRects) {
        const base = zoneRects.ops || {
          left: 78,
          top: 70,
          width: 14,
          height: 14,
        };
        return {
          left: base.left + base.width * 0.24,
          top: base.top + base.height * 0.18,
          width: base.width * 0.48,
          height: base.height * 0.48,
        };
      }

      function buildWorkerPlacements(
        services,
        teams,
        teamLayouts,
        layoutContext,
      ) {
        const placements = [];
        const baseRects = layoutContext.zoneRects;
        const guardRect = guardPostRect(baseRects);
        const layoutByTeamId = new Map(
          teamLayouts.map((layout) => [layout.teamId, layout]),
        );
        const teamByLinkedJid = new Map(
          teams
            .filter((team) => team.linkedJid)
            .map((team) => [team.linkedJid, team]),
        );
        const zoneBuckets = new Map();

        services.forEach((service) => {
          let zone = 'lounge';

          if (service.role === 'dashboard') {
            zone = 'ops';
          } else if (ui.localBusyServiceIds.has(service.serviceId)) {
            const preferredTeam = serviceTeams(service.serviceId)[0];
            zone = preferredTeam ? `team:${preferredTeam.teamId}` : 'lounge';
          } else if (service.presence === 'offline') {
            zone = 'offsite';
          } else if (
            service.currentJid &&
            teamByLinkedJid.has(service.currentJid)
          ) {
            zone = `team:${teamByLinkedJid.get(service.currentJid).teamId}`;
          } else if (service.presence === 'working') {
            const fallbackTeam = serviceTeams(service.serviceId)[0];
            zone = fallbackTeam ? `team:${fallbackTeam.teamId}` : 'lounge';
          } else {
            zone = 'lounge';
          }

          if (!zoneBuckets.has(zone)) zoneBuckets.set(zone, []);
          zoneBuckets.get(zone).push(service);
        });

        zoneBuckets.forEach((bucket, zone) => {
          const rect = zone.startsWith('team:')
            ? (() => {
                const teamId = zone.slice('team:'.length);
                const layout = layoutByTeamId.get(teamId);
                return layout
                  ? {
                      left: layout.left + 1,
                      top: layout.top + 4,
                      width: layout.width - 2,
                      height: layout.height - 7,
                    }
                  : baseRects.hr;
              })()
            : zone === 'ops'
              ? guardRect
              : baseRects[zone] || baseRects.lounge;

          bucket.forEach((service, index) => {
            const point = positionInRect(rect, index, bucket.length);
            placements.push({
              service,
              left: point.x,
              top: point.y,
              zone,
            });
          });
        });

        return placements;
      }

      function getSpecialRooms(layoutData, zoneRects) {
        const metaByKind = {
          management: {
            name: 'Management',
            copy: '경영팀',
          },
          general: {
            name: 'General Affairs',
            copy: '총무팀',
          },
          hr: {
            name: 'Human Resources',
            copy: '인사팀',
          },
          offsite: {
            name: 'Offsite',
            copy: 'Offsite',
          },
          lounge: {
            name: 'Break Lounge',
            copy: '휴게실',
          },
          ops: {
            name: 'Situation Room',
            copy: '종합 상황실',
          },
        };

        const zoneIds = (layoutData?.zones || []).length
          ? [
              ...new Set([
                ...(layoutData?.zones || []).map((zone) =>
                  normalizeRoomId(zone.id),
                ),
                ...Object.keys(zoneRects),
              ]),
            ]
          : Object.keys(zoneRects);
        return zoneIds.filter(Boolean).map((zoneId) => ({
          id: zoneId,
          kind: zoneId,
          name: roomLabel(zoneId),
          copy: metaByKind[zoneId]?.copy || '지원 공간',
          ...zoneRects[zoneId],
        }));
      }

      function hexToNumber(hex, fallback = 0xffffff) {
        if (!hex) return fallback;
        const normalized = String(hex).trim().replace(/^#/, '');
        const parsed = Number.parseInt(normalized, 16);
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      function buildOfficeSnapshot() {
        const teams = ui.data?.teams || [];
        const services = ui.data?.services || [];
        const company = companySettings();
        const layoutData = officeGame?.mapLayout || null;
        const teamLayouts = buildTeamLayouts(teams, layoutData);
        const zoneRects = buildZoneRects(layoutData, company.roomLayouts || {});
        const transitAnchors = buildTransitAnchors(
          layoutData?.worldWidth || 960,
          layoutData?.worldHeight || 576,
          layoutData,
        );
        return {
          teams,
          teamLayouts,
          zoneRects,
          transitAnchors,
          workers: buildWorkerPlacements(services, teams, teamLayouts, {
            layoutData,
            zoneRects,
          }),
          specialRooms: getSpecialRooms(layoutData, zoneRects),
          generatedAt: ui.data?.generatedAt || '',
          worldWidth: layoutData?.worldWidth || 960,
          worldHeight: layoutData?.worldHeight || 576,
        };
      }

      function updateOfficeFooter(snapshot) {
        if (!officeGame?.footer) return;
        officeGame.footer.innerHTML = `
          <div class="hud-chip">Phaser 3.90.0</div>
          <div class="hud-chip">Tiled .tmj</div>
          <div class="hud-chip">Office map</div>
          <div class="hud-chip">${escapeHtml(snapshot.generatedAt || '')}</div>
        `;
      }

      function roomStyle(room) {
        if (room.kind === 'team') {
          return {
            fill: hexToNumber(room.color || '#ffbf69'),
            stroke: 0xffe3bf,
            alpha: room.active ? 0.14 : 0.08,
          };
        }
        if (room.kind === 'management') {
          return { fill: 0xb894ff, stroke: 0xe2d5ff, alpha: 0.13 };
        }
        if (room.kind === 'general') {
          return { fill: 0x86d8c9, stroke: 0xd9fff6, alpha: 0.12 };
        }
        if (room.kind === 'hr') {
          return { fill: 0xffbf69, stroke: 0xffebc2, alpha: 0.14 };
        }
        if (room.kind === 'lounge') {
          return { fill: 0x57d1b7, stroke: 0xc8fff2, alpha: 0.12 };
        }
        if (room.kind === 'offsite') {
          return { fill: 0xff8d7b, stroke: 0xffd3cc, alpha: 0.1 };
        }
        return { fill: 0x8bb6ff, stroke: 0xd9e6ff, alpha: 0.1 };
      }

      function pctRect(layout, width, height) {
        return {
          x: (layout.left / 100) * width,
          y: (layout.top / 100) * height,
          width: (layout.width / 100) * width,
          height: (layout.height / 100) * height,
        };
      }

      function pctPoint(left, top, width, height) {
        return {
          x: (left / 100) * width,
          y: (top / 100) * height,
        };
      }

      function buildTransitAnchors(width, height, layoutData) {
        const anchors = {
          center: pctPoint(50, 51, width, height),
          left: pctPoint(22.5, 50, width, height),
          right: pctPoint(77.5, 50, width, height),
        };

        Object.entries(layoutData?.anchors || {}).forEach(
          ([anchorId, point]) => {
            anchors[anchorId] = pctPoint(point.left, point.top, width, height);
          },
        );

        return anchors;
      }

      function routeAnchorForZone(zone, anchors) {
        if (zone === 'management' || zone === 'general') return anchors.left;
        if (zone === 'hr') return anchors.center;
        if (zone === 'lounge') return anchors.left;
        if (zone === 'offsite' || zone === 'ops') return anchors.right;
        return anchors.center;
      }

      function compactRoute(points) {
        const compacted = [];
        points.forEach((point) => {
          if (!point) return;
          const prev = compacted[compacted.length - 1];
          if (
            prev &&
            Math.abs(prev.x - point.x) < 2 &&
            Math.abs(prev.y - point.y) < 2
          ) {
            return;
          }
          compacted.push(point);
        });
        return compacted;
      }

      function fitOfficeCamera(state) {
        if (!state?.scene) return;
        const camera = state.scene.cameras.main;
        const { width, height } = getOfficeWorldSize(state);
        const viewportWidth = Math.max(state.scene.scale.width, 1);
        const viewportHeight = Math.max(state.scene.scale.height, 1);
        const zoom = clampNumber(
          Math.min(viewportWidth / width, viewportHeight / height),
          0.68,
          2.8,
        );
        camera.setZoom(zoom);
        camera.centerOn(width / 2, height / 2);
      }

      function paddedPercentRect(rect, padX, padY) {
        const width = clampNumber(rect.width + padX * 2, 12, 100);
        const height = clampNumber(rect.height + padY * 2, 12, 100);
        return {
          left: clampNumber(rect.left - padX, 0, Math.max(100 - width, 0)),
          top: clampNumber(rect.top - padY, 0, Math.max(100 - height, 0)),
          width,
          height,
        };
      }

      function percentRectToCameraRect(rect, snapshot, padX = 4, padY = 6) {
        return pctRect(
          paddedPercentRect(rect, padX, padY),
          snapshot.worldWidth,
          snapshot.worldHeight,
        );
      }

      function percentPointToCameraRect(point, snapshot) {
        return percentRectToCameraRect(
          {
            left: point.left - 7,
            top: point.top - 10,
            width: 14,
            height: 20,
          },
          snapshot,
          0,
          0,
        );
      }

      function cameraZoomForRect(state, rect) {
        const viewportWidth = Math.max(state.scene.scale.width * 0.82, 1);
        const viewportHeight = Math.max(state.scene.scale.height * 0.8, 1);
        return clampNumber(
          Math.min(
            viewportWidth / Math.max(rect.width, 64),
            viewportHeight / Math.max(rect.height, 64),
          ),
          0.84,
          2.35,
        );
      }

      function resolveOfficeCameraTarget(snapshot) {
        const targetKey = ui.cameraTargetKey;
        if (targetKey.startsWith('service:')) {
          const serviceId = targetKey.slice('service:'.length);
          const placement = snapshot.workers.find(
            (worker) => worker.service.serviceId === serviceId,
          );
          const actor = officeGame?.workerActors?.get(serviceId);
          if (placement) {
            return {
              key: targetKey,
              rect: percentPointToCameraRect(placement, snapshot),
              followTarget: actor?.root || null,
            };
          }
        }

        if (targetKey.startsWith('team:')) {
          const teamId = targetKey.slice('team:'.length);
          const layout = snapshot.teamLayouts.find(
            (entry) => entry.teamId === teamId,
          );
          if (layout) {
            return {
              key: targetKey,
              rect: percentRectToCameraRect(layout, snapshot, 3.5, 5),
            };
          }
        }

        if (targetKey.startsWith('room:')) {
          const roomId = targetKey.slice('room:'.length);
          const room = snapshot.specialRooms.find((entry) => entry.id === roomId);
          if (room) {
            return {
              key: targetKey,
              rect: percentRectToCameraRect(room, snapshot, 4, 6),
            };
          }
        }

        if (ui.detailMode === 'team' && ui.selectedTeamId) {
          const layout = snapshot.teamLayouts.find(
            (entry) => entry.teamId === ui.selectedTeamId,
          );
          if (layout) {
            return {
              key: `team:${ui.selectedTeamId}`,
              rect: percentRectToCameraRect(layout, snapshot, 3.5, 5),
            };
          }
        }

        if (ui.detailMode === 'room' && ui.selectedRoomId) {
          const room = snapshot.specialRooms.find(
            (entry) => entry.id === ui.selectedRoomId,
          );
          if (room) {
            return {
              key: `room:${ui.selectedRoomId}`,
              rect: percentRectToCameraRect(room, snapshot, 4, 6),
            };
          }
        }

        if (ui.detailMode === 'desk') {
          const roomId = roomIdForDesk(ui.activeDesk);
          const room = snapshot.specialRooms.find((entry) => entry.id === roomId);
          if (room) {
            return {
              key: `room:${roomId}`,
              rect: percentRectToCameraRect(room, snapshot, 4, 6),
            };
          }
        }

        return null;
      }

      function syncOfficeCamera(state, snapshot, force = false) {
        if (!state?.scene || !snapshot) return;
        const camera = state.scene.cameras.main;

        if (ui.cameraMode === 'overview') {
          if (state.cameraStateKey !== 'overview' || force) {
            camera.stopFollow();
            fitOfficeCamera(state);
            state.cameraStateKey = 'overview';
          }
          return;
        }

        const target = resolveOfficeCameraTarget(snapshot);
        if (!target) {
          camera.stopFollow();
          fitOfficeCamera(state);
          state.cameraStateKey = 'overview';
          return;
        }

        const zoom = cameraZoomForRect(state, target.rect);
        const centerX = target.rect.x + target.rect.width / 2;
        const centerY = target.rect.y + target.rect.height / 2;
        const shouldAnimate =
          !force &&
          Boolean(state.cameraStateKey) &&
          state.cameraStateKey !== target.key;

        if (target.followTarget) {
          camera.startFollow(target.followTarget, true, 0.12, 0.12);
        } else {
          camera.stopFollow();
        }

        if (shouldAnimate) {
          camera.zoomTo(zoom, 260, 'Quad.easeOut');
          if (!target.followTarget) {
            camera.pan(centerX, centerY, 260, 'Sine.easeOut');
          }
        } else {
          camera.setZoom(zoom);
          if (!target.followTarget) {
            camera.centerOn(centerX, centerY);
          }
        }

        state.cameraStateKey = target.key;
      }

      function ensureOfficeGame() {
        const office = document.getElementById('office');
        if (!office) return null;

        if (!window.Phaser) {
          office.innerHTML =
            '<div class="empty" style="position:absolute;inset:24px;display:grid;place-items:center;z-index:6;">Phaser failed to load.</div>';
          return null;
        }

        if (officeGame?.host === office) {
          return officeGame;
        }

        office.innerHTML =
          '<div class="stage-footer" id="office-footer"></div>';

        officeGame = {
          host: office,
          footer: office.querySelector('#office-footer'),
          scene: null,
          game: null,
          backdrop: null,
          roomLayer: null,
          workerLayer: null,
          roomActors: new Map(),
          workerActors: new Map(),
          snapshot: null,
          resizeObserver: null,
          map: null,
          mapLayout: null,
          mapLayers: [],
          worldWidth: 960,
          worldHeight: 576,
          cameraStateKey: '',
          topLabel: null,
          topCopy: null,
          cornerNote: null,
        };

        officeGame.game = new Phaser.Game({
          type: Phaser.AUTO,
          parent: office,
          width: Math.max(office.clientWidth, 640),
          height: Math.max(office.clientHeight, 420),
          transparent: true,
          resolution: CANVAS_RENDER_RESOLUTION,
          autoRound: false,
          roundPixels: false,
          pixelArt: false,
          antialias: true,
          scene: {
            preload() {
              const mapVersion = encodeURIComponent(ui.mapVersion || '0');
              const mapUrl =
                ui.data?.map?.tmjUrl ||
                '/admin-assets/hkclaw-office-rpg2000.tmj';
              const tilesetUrl =
                ui.data?.map?.tilesetUrl ||
                '/admin-assets/rpg2000-office-tiles.svg';
              this.load.tilemapTiledJSON(
                TILED_OFFICE_MAP_KEY,
                `${mapUrl}?v=${mapVersion}`,
              );
              this.load.image(
                TILED_OFFICE_TILESET_KEY,
                `${tilesetUrl}?v=${mapVersion}`,
              );
            },
            create() {
              officeGame.scene = this;
              officeGame.map = this.make.tilemap({ key: TILED_OFFICE_MAP_KEY });
              const tilesetName =
                ui.data?.map?.tilesetName || TILED_OFFICE_TILESET_KEY;
              const tileset = officeGame.map.addTilesetImage(
                tilesetName,
                TILED_OFFICE_TILESET_KEY,
              );
              officeGame.worldWidth =
                officeGame.map.widthInPixels || this.scale.width;
              officeGame.worldHeight =
                officeGame.map.heightInPixels || this.scale.height;
              this.cameras.main.setBackgroundColor('#10191f');
              this.cameras.main.setBounds(
                0,
                0,
                officeGame.worldWidth,
                officeGame.worldHeight,
              );
              this.cameras.main.roundPixels = false;

              officeGame.mapLayers = [];
              ['Ground', 'Carpet', 'Walls', 'Decor'].forEach(
                (layerName, index) => {
                  const layer = officeGame.map.createLayer(
                    layerName,
                    tileset,
                    0,
                    0,
                  );
                  if (!layer) return;
                  layer.setDepth(index * 8);
                  officeGame.mapLayers.push(layer);
                },
              );

              officeGame.backdrop = this.add
                .graphics()
                .setScrollFactor(0)
                .setDepth(90);
              officeGame.roomLayer = this.add.container(0, 0).setDepth(110);
              officeGame.workerLayer = this.add.container(0, 0).setDepth(140);
              officeGame.mapLayout = extractTiledLayoutData(officeGame);
              syncOfficeGame();
            },
          },
        });

        const resize = () => {
          if (!officeGame?.game || !officeGame?.scene) return;
          const width = Math.max(office.clientWidth, 640);
          const height = Math.max(office.clientHeight, 420);
          officeGame.game.scale.resize(width, height);
          officeGame.cameraStateKey = '';
          syncOfficeGame();
        };

        officeGame.resizeObserver = new ResizeObserver(() => resize());
        officeGame.resizeObserver.observe(office);

        return officeGame;
      }

      function buildRoomActorId(room) {
        if (room.teamTargetId) return `team:${room.teamTargetId}`;
        if (room.roomTargetId) return `room:${room.roomTargetId}`;
        return `${room.kind}:${room.id}`;
      }

      function buildRoomActorRenderKey(room) {
        return [
          room.kind,
          room.id,
          room.name || '',
          room.copy || '',
          room.badge || '',
          room.color || '',
          room.left,
          room.top,
          room.width,
          room.height,
          room.active ? '1' : '0',
          room.pulse ? '1' : '0',
          room.teamTargetId || '',
          room.roomTargetId || '',
        ].join('|');
      }

      function createRoomActor(state, room, onSelect, actorId, renderKey) {

            style.stroke,
            room.active ? 0.9 : 0.45,
          );
        const innerFrame = scene.add
          .rectangle(
            5,
            5,
            Math.max(rect.width - 10, 24),
            Math.max(rect.height - 10, 24),
            0x000000,
            0.06,

          .setStrokeStyle(1, 0xf6efdf, 0.08);
        const plaqueWidth = clampNumber(rect.width - 20, 94, 156);

        const props = [];

              .setOrigin(0.5),

              .rectangle(24, rect.height - 26, 14, 8, 0xffe7a6, 0.95)
              .setOrigin(0.5),

              .rectangle(44, rect.height - 24, 10, 14, 0x24475a, 0.9)
              .setOrigin(0.5),
          );
        }
        if (room.kind === 'general') {
          props.push(
            scene.add
              .rectangle(
                rect.width / 2,
                rect.height - 18,
                36,
                10,
                0x235a58,
                0.96,
              )
              .setOrigin(0.5),
            scene.add
              .rectangle(
                rect.width / 2 - 8,
                rect.height - 26,
                14,
                8,
                0xd8fff8,
                0.52,
              )
              .setOrigin(0.5),
            scene.add
              .rectangle(
                rect.width / 2 + 10,
                rect.height - 26,
                10,
                8,
                0xffe7a6,
                0.92,
              )
              .setOrigin(0.5),
          );
        }
        if (room.kind === 'management') {
          props.push(
            scene.add
              .rectangle(
                rect.width / 2,
                rect.height - 18,
                34,
                10,
                0x46385f,
                0.96,
              )
              .setOrigin(0.5),
            scene.add
              .rectangle(
                rect.width / 2 - 4,
                rect.height - 27,
                14,
                8,
                0xc5b0ff,
                0.55,

            scene.add
              .ellipse(
                rect.width / 2 + 14,
                rect.height - 24,
                10,
                10,
                0xffbf69,
                0.96,

            scene.add
              .rectangle(

                rect.height - 18,

                0x2a2334,
