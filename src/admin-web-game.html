            displayLinkedChannelName(
              selectedTeam.linkedChannelName,
              selectedTeam.linkedJid,
            ) || 'Local counter'
          } · folder=${selectedTeam.folder || 'unset'} · 직원 ${services.length}명`,
          targetsHtml,
          formId: 'team-chat-form',
          emptyMessage:
            '이 팀의 웹 대화 기록이 아직 없습니다. 메시지를 보내면 현재 선택된 직원이 처리합니다.',
          placeholder: `${selectedTeam.name} 팀에 지시를 입력하세요.`,
        });
      }

      function currentOfficeSnapshot() {
        return officeGame?.snapshot || buildOfficeSnapshot();
      }

      function renderOperationalRoomPanel(roomId) {
        const snapshot = currentOfficeSnapshot();
        const company = companySettings();
        const kicker = company.companyName
          ? `<div class="detail-kicker">${escapeHtml(company.companyName)}</div>`
          : '';
        const workers = (snapshot?.workers || [])
          .filter((worker) => worker.zone === roomId)
          .map((worker) => worker.service);
        const dashboardPreviewBlock =
          roomId === 'ops'
            ? (() => {
                if (ui.dashboardPreview.loading) {
                  return '<div class="empty">dashboard 출력 불러오는 중...</div>';
                }
                if (ui.dashboardPreview.error) {
                  return `<div class="empty">${escapeHtml(ui.dashboardPreview.error)}</div>`;
                }
                const content = String(
                  ui.dashboardPreview.content || '',
                ).trim();
                const generatedAt = ui.dashboardPreview.generatedAt
                  ? shortTime(ui.dashboardPreview.generatedAt)
                  : '';
                return `
                  <div class="stack">
                    <div class="panel-head">
                      <h2>Dashboard Mirror</h2>
                      <p>실제 dashboard 메시지와 같은 포맷을 여기서 그대로 보여줍니다.${
                        generatedAt
                          ? ` 마지막 갱신 ${escapeHtml(generatedAt)}`
                          : ''
                      }</p>
                    </div>
                    ${renderDashboardPreviewHtml(content)}
                  </div>
                `;
              })()
            : '';
        return `
          <div class="detail-shell">
            <div class="detail-header">
              ${kicker}
              <div class="detail-title">${escapeHtml(roomLabel(roomId))}</div>
            </div>
            <div class="detail-body">
              <div class="panel-head">
                <h2>${escapeHtml(roomLabel(roomId))}</h2>
              </div>
              <div class="stack">
                ${dashboardPreviewBlock}
                <div class="card-list">
                  ${
                    workers.length
                      ? workers
                          .map(
                            (service) => `
                              <button class="mini-card" data-action="select-service" data-service-id="${escapeHtml(
                                service.serviceId,
                              )}">
                                <div class="mini-card-head">
                                  <div>
                                    <div class="mini-card-title">${escapeHtml(service.assistantName)}</div>
                                    <div class="mini-card-copy">${escapeHtml(service.serviceId)} · ${escapeHtml(
                                      service.agentType,
                                    )}</div>
                                  </div>
                                  <div class="pill">${escapeHtml(titlePresence(service.presence))}</div>
                                </div>
                              </button>
                            `,
                          )
                          .join('')
                      : '<div class="empty">현재 여기엔 직원이 없다.</div>'
                  }
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function renderDetailPanel() {
        const panel = document.getElementById('detail-panel');
        const modal = document.getElementById('detail-modal');
        if (!panel || !modal) return;

        modal.classList.toggle('open', ui.modalOpen === true);
        modal.setAttribute('aria-hidden', ui.modalOpen === true ? 'false' : 'true');
        if (ui.modalOpen !== true) {
          panel.innerHTML = '';
          return;
        }

        if (!ui.data) {
          panel.innerHTML =
            '<div class="empty">채팅 패널을 불러오는 중입니다.</div>';
          return;
        }

        if (ui.detailMode === 'desk') {
          const company = companySettings();
          const deskKicker = company.companyName
            ? `<div class="detail-kicker">${escapeHtml(company.companyName)}</div>`
            : '';
          const body =
            ui.activeTab === 'team-create'
              ? renderTeamCreatePanel()
              : ui.activeTab === 'team-management'
                ? renderTeamManagementPanel()
                : ui.activeTab === 'hiring'
                  ? renderHiringPanel()
                  : renderEmployeesPanel();
          const boothTitle =
            ui.activeDesk === 'management'
              ? '주문 창구'
              : ui.activeDesk === 'map'
                  ? '맵'
                  : '직원';
          panel.innerHTML = `
            <div class="detail-shell">
              <div class="detail-header">
                ${deskKicker}
                <div class="detail-title">${escapeHtml(boothTitle)}</div>
              </div>
              <div class="detail-tabs">${renderDeskTabs(ui.activeDesk)}</div>
              <div class="detail-body">${body}</div>
            </div>
          `;
          return;
        }

        if (ui.detailMode === 'room' && ui.selectedRoomId) {
          panel.innerHTML = renderOperationalRoomPanel(ui.selectedRoomId);
          return;
        }

        panel.innerHTML = renderTeamDetailPanel();
      }

      function renderOffice() {
        const office = document.getElementById('office');
        if (!ui.data) {
          office.innerHTML =
            '<div class="empty" style="position:absolute;inset:24px;display:grid;place-items:center;z-index:6;">불러오는 중입니다.</div>';
          return;
        }
        syncOfficeGame();
      }

      function render() {
        const company = companySettings();
        const stageTitle = document.getElementById('stage-title');
        if (stageTitle) {
          stageTitle.textContent = company.companyName || '';
        }
        const stageCopy = document.getElementById('stage-copy');
        if (stageCopy) {
          const stageCopyParts = [
            company.officeTitle,
            company.officeSubtitle,
          ].filter(Boolean);
          stageCopy.textContent = stageCopyParts.join(' · ');
        }
        document.title = company.companyName || 'Office Admin';
        renderHeaderHud();
        renderOffice();
        renderDetailPanel();
        const detailPanel = document.getElementById('detail-panel');
        (detailPanel?.querySelectorAll('form') || []).forEach((form) => {
          if (!(form instanceof HTMLFormElement)) return;
          syncOriginPanels(form);
          syncRolePanels(form);
        });
        if (detailPanel) {
          syncDiscordChannelInputs(detailPanel);
        }
      }

      function buildServicePayload(form) {
        const formData = new FormData(form);
        const readValue = (name) => {
          const value = formData.get(name);
          return typeof value === 'string' ? value : '';
        };

        return {
          existingServiceId: readValue('existingServiceId') || undefined,
          assistantName: readValue('assistantName'),
          serviceId: readValue('serviceId') || undefined,
          agentType: readValue('agentType') || 'claude-code',
          role: readValue('role') || 'normal',
          statusChannelId:
            (readValue('role') || 'normal') === 'dashboard'
              ? readValue('statusChannelId')
              : '',
          discordBotToken: readValue('discordBotToken') || undefined,
          clearDiscordBotToken: formData.has('clearDiscordBotToken'),
          anthropicBaseUrl: readValue('anthropicBaseUrl'),
          anthropicAuthToken: readValue('anthropicAuthToken') || undefined,
          clearAnthropicAuthToken: formData.has('clearAnthropicAuthToken'),
          claudeCodeOauthToken: readValue('claudeCodeOauthToken') || undefined,
          clearClaudeCodeOauthToken: formData.has('clearClaudeCodeOauthToken'),
          claudeCodeOauthTokens:
            readValue('claudeCodeOauthTokens') || undefined,
          clearClaudeCodeOauthTokens: formData.has(
            'clearClaudeCodeOauthTokens',
          ),
          codexAuthJson: readValue('codexAuthJson') || undefined,
          clearCodexAuthJson: formData.has('clearCodexAuthJson'),
          geminiApiKey: readValue('geminiApiKey') || undefined,
          clearGeminiApiKey: formData.has('clearGeminiApiKey'),
          geminiModel: readValue('geminiModel'),
          geminiCliPath: readValue('geminiCliPath'),
          localLlmBaseUrl: readValue('localLlmBaseUrl'),
          localLlmModel: readValue('localLlmModel'),
          localLlmApiKey: readValue('localLlmApiKey') || undefined,
          clearLocalLlmApiKey: formData.has('clearLocalLlmApiKey'),
          openAiApiKey: readValue('openAiApiKey') || undefined,
          clearOpenAiApiKey: formData.has('clearOpenAiApiKey'),
          groqApiKey: readValue('groqApiKey') || undefined,
          clearGroqApiKey: formData.has('clearGroqApiKey'),
          groqTranscriptionModel: readValue('groqTranscriptionModel'),
          openAiTranscriptionModel: readValue('openAiTranscriptionModel'),
          transcriptionLanguage: readValue('transcriptionLanguage'),
          edgeTtsVoice: readValue('edgeTtsVoice'),
          edgeTtsLang: readValue('edgeTtsLang'),
          edgeTtsRate: readValue('edgeTtsRate'),
          codexModel: readValue('codexModel'),
          codexEffort: readValue('codexEffort'),
          fallbackEnabled: readValue('fallbackEnabled'),
          fallbackProviderName: readValue('fallbackProviderName'),
          fallbackBaseUrl: readValue('fallbackBaseUrl'),
          fallbackAuthToken: readValue('fallbackAuthToken') || undefined,
          clearFallbackAuthToken: formData.has('clearFallbackAuthToken'),
          fallbackModel: readValue('fallbackModel'),
          fallbackSmallModel: readValue('fallbackSmallModel'),
          fallbackCooldownMs: readValue('fallbackCooldownMs'),
        };
      }

      function readAssignmentJids(form) {
        const role = String(
          form.querySelector('[name="role"]')?.value || 'normal',
        );
        if (role === 'dashboard') {
          return [];
        }
        return [...new FormData(form).getAll('assignmentJids')]
          .map((value) => String(value || '').trim())
          .filter(Boolean);
      }

      async function syncServiceAssignmentsForm(serviceId, form) {
        const role = String(
          form.querySelector('[name="role"]')?.value || 'normal',
        );
        if (role === 'dashboard') {
          return;
        }
        await api('/api/admin/services/assignments', {
          method: 'POST',
          body: JSON.stringify({
            serviceId,
            jids: readAssignmentJids(form),
          }),
        });
      }

      function focusTeamManagement(teamId) {
        if (teamId !== undefined) {
          ui.selectedTeamId = teamId;
        }
        ui.detailMode = 'desk';
        ui.activeDesk = 'management';
        ui.activeTab = 'team-management';
        ui.selectedRoomId = null;
        ui.modalOpen = true;
      }

      function focusEmployeeManagement(serviceId) {
        if (serviceId !== undefined) {
          ui.selectedServiceId = serviceId;
        }
        ui.detailMode = 'desk';
        ui.activeDesk = 'hr';
        ui.activeTab = 'employees';
        ui.selectedRoomId = null;
        ui.modalOpen = true;
      }

      function queueStateRefresh(delayMs = 1600) {
        if (ui.refreshTimer) {
          window.clearTimeout(ui.refreshTimer);
        }
        ui.refreshTimer = window.setTimeout(() => {
          ui.refreshTimer = null;
          loadState({ skipChatSync: true }).catch((error) => {
            showToast(error.message || '상태 갱신 실패', 'error');
          });
        }, delayMs);
      }

      function formatServiceActionToast(command, scheduled) {
        const suffix = scheduled ? '예약했습니다.' : '실행했습니다.';
        if (command === 'restart') {
          return `서비스 재시작을 ${suffix}`;
        }
        if (command === 'start') {
          return `서비스 시작을 ${suffix}`;
        }
        if (command === 'stop') {
          return `서비스 정지를 ${suffix}`;
        }
        return scheduled
          ? '서비스 작업을 예약했습니다.'
          : '서비스 작업을 실행했습니다.';
      }

      async function handleTeamSubmit(form) {
        prepareDiscordChannelInputs(form);
        const formData = new FormData(form);
        const result = await api('/api/admin/teams/upsert', {
          method: 'POST',
          body: JSON.stringify({
            teamId: formData.get('teamId') || undefined,
            name: formData.get('name'),
            linkedJid: formData.get('linkedJid') || undefined,
            folder: formData.get('folder') || undefined,
            requiresMention: formData.has('requiresMention'),
            color: formData.get('color') || undefined,
          }),
        });
        focusTeamManagement(result.teamId || null);
            showToast('주문 창구 구성을 저장했습니다.', 'success');
        await loadState({ skipChatSync: true });
      }

      async function handleHireSubmit(form) {
        prepareDiscordChannelInputs(form);
        const result = await api('/api/admin/services/upsert', {
          method: 'POST',
          body: JSON.stringify(buildServicePayload(form)),
        });
        await syncServiceAssignmentsForm(result.serviceId, form);
        form.reset();
        syncOriginPanels(form);
        syncRolePanels(form);
        focusEmployeeManagement(result.serviceId || null);
        showToast(buildServiceSaveToast(result, 'hire'), 'success');
        await loadState({ skipChatSync: true });
        void loadServiceLogs(result.serviceId || null, true);
        queueStateRefresh();
      }

      async function handleEmployeeSubmit(form) {
        prepareDiscordChannelInputs(form);
        const result = await api('/api/admin/services/upsert', {
          method: 'POST',
          body: JSON.stringify(buildServicePayload(form)),
        });
        await syncServiceAssignmentsForm(result.serviceId, form);
        focusEmployeeManagement(result.serviceId || null);
        showToast(buildServiceSaveToast(result, 'update'), 'success');
        await loadState({ skipChatSync: true });
        void loadServiceLogs(result.serviceId || null, true);
        queueStateRefresh();
      }

      async function handleChatSubmit(form) {
        if (!ui.selectedTeamId) return;
        const field = form.querySelector('textarea[name="message"]');
        const message = field.value.trim();
        if (!message) return;

        ui.messageSending = true;
        const activeTarget = teamChatTarget(ui.selectedTeamId);
        if (activeTarget) {
          ui.localBusyServiceIds.add(activeTarget.serviceId);
        }
        render();

        try {
          const payload = await api('/api/admin/chat', {
            method: 'POST',
            body: JSON.stringify({
              teamId: ui.selectedTeamId,
              serviceId: activeTarget?.serviceId || undefined,
              message,
            }),
          });
          ui.chatHistory = payload.history || [];
          field.value = '';
            showToast('주문 창구 채팅을 전달했습니다.', 'success');
        } finally {
          ui.messageSending = false;
          if (activeTarget) {
            ui.localBusyServiceIds.delete(activeTarget.serviceId);
          }
          render();
        }
      }

      document.addEventListener('click', async (event) => {
        const target = event.target.closest('[data-action]');
        if (!target) return;

        const action = target.dataset.action;
        try {
          if (action === 'open-team-create') {
            openManagementDesk('team-create');
            return;
          }

          if (action === 'open-hiring') {
            openHrDesk('hiring');
            return;
          }

          if (action === 'close-modal') {
            closeDetailModal();
            return;
          }

          if (action === 'switch-tab') {
            selectTab(target.dataset.tab);
            return;
          }

          if (action === 'select-team') {
            selectTeam(target.dataset.teamId);
            return;
          }

          if (action === 'manage-team') {
            manageTeam(target.dataset.teamId);
            return;
          }

          if (action === 'select-service') {
            selectService(target.dataset.serviceId);
            return;
          }

          if (action === 'select-team-chat') {
            ui.selectedTeamChatServiceId = target.dataset.serviceId;
            renderDetailPanel();
            return;
          }

          if (action === 'open-chat') {
            selectService(target.dataset.serviceId);
            return;
          }

          if (action === 'refresh-chat') {
            if (ui.selectedTeamId) await loadChatHistory(ui.selectedTeamId);
            return;
          }

          if (action === 'refresh-service-logs') {
            await loadServiceLogs(target.dataset.serviceId, false);
            showToast('최근 로그를 새로 읽었습니다.', 'info');
            return;
          }

          if (action === 'delete-team') {
            if (
              !window.confirm(
                '이 주문 창구를 삭제하면 연결된 수동 설정이 정리됩니다. 계속할까요?',
              )
            ) {
              return;
            }
            await api('/api/admin/teams/delete', {
              method: 'POST',
              body: JSON.stringify({ teamId: target.dataset.teamId }),
            });
            if (ui.selectedTeamId === target.dataset.teamId) {
              ui.selectedTeamId = null;
            }
            showToast('주문 창구를 삭제했습니다.', 'success');
            await loadState({ skipChatSync: true });
            return;
          }

          if (action === 'delete-service') {
            if (
              !window.confirm(
                '이 직원을 삭제하면 배정과 서비스 구성이 함께 정리됩니다. 계속할까요?',
              )
            ) {
              return;
            }
            await api('/api/admin/services/delete', {
              method: 'POST',
              body: JSON.stringify({
                serviceId: target.dataset.serviceId,
              }),
            });
            await api('/api/admin/topology/reconcile', {
              method: 'POST',
            });
            if (ui.selectedServiceId === target.dataset.serviceId) {
              focusEmployeeManagement(null);
            }
            showToast('직원을 삭제했습니다.', 'success');
            await loadState({ skipChatSync: true });
            queueStateRefresh(1200);
            return;
          }

          if (action === 'toggle-assignment') {
            await api('/api/admin/assignments/toggle', {
              method: 'POST',
              body: JSON.stringify({
                jid: target.dataset.jid,
                serviceId: target.dataset.serviceId,
                enabled: target.dataset.enabled === 'true',
              }),
            });
            showToast(
              '주문 창구 배치를 변경했습니다. 대상 서비스가 재시작됩니다.',
              'success',
            );
            await loadState({ skipChatSync: true });
            queueStateRefresh(1200);
            return;
          }

          if (action === 'service-action') {
            const payload = await api('/api/admin/services/action', {
              method: 'POST',
              body: JSON.stringify({
                serviceId: target.dataset.serviceId,
                action: target.dataset.command,
              }),
            });
            showToast(
              formatServiceActionToast(
                target.dataset.command,
                payload?.scheduled === true,
              ),
              'success',
            );
            await loadState({ skipChatSync: true });
            queueStateRefresh(1200);
            return;
          }
        } catch (error) {
          showToast(error.message || '요청에 실패했습니다.', 'error');
        }
      });

      document.addEventListener('change', (event) => {
        const target = event.target;
        if (target instanceof HTMLInputElement) {
          if (target.matches('[data-discord-channel-input]')) {
            applyDiscordChannelInputState(target);
          }
          return;
        }
        if (target instanceof HTMLSelectElement) {
          if (target.name !== 'agentType' && target.name !== 'role') return;
          const form = target.closest('form');
          if (form) {
            syncOriginPanels(form);
            syncRolePanels(form);
          }
        }
      });

      document.addEventListener('input', (event) => {
        const target = event.target;
        if (!(target instanceof HTMLInputElement)) return;
        if (!target.matches('[data-discord-channel-input]')) return;
        applyDiscordChannelInputState(target);
      });

      document.addEventListener(
        'focusout',
        (event) => {
          const target = event.target;
          if (!(target instanceof HTMLInputElement)) return;
          if (!target.matches('[data-discord-channel-input]')) return;
          normalizeDiscordChannelInputElement(target);
        },
        true,
      );

      document.addEventListener('keydown', (event) => {
        if (event.key !== 'Escape') return;
        if (ui.modalOpen !== true) return;
        closeDetailModal();
      });

      document.addEventListener('submit', async (event) => {
        const form = event.target;
        if (!(form instanceof HTMLFormElement)) return;
        event.preventDefault();
        const submitter =
          event.submitter instanceof HTMLButtonElement
            ? event.submitter
            : form.querySelector('button[type="submit"], button:not([type])');
        setFormBusy(form, true, submitter);

        try {
          if (form.id === 'team-form') {
            await handleTeamSubmit(form);
            return;
          }
          if (form.id === 'hire-form') {
            await handleHireSubmit(form);
            return;
          }
          if (form.id === 'employee-form') {
            await handleEmployeeSubmit(form);
            return;
          }
          if (form.id === 'chat-form') {
            await handleChatSubmit(form);
            return;
          }
          if (form.id === 'team-chat-form') {
            await handleChatSubmit(form);
          }
        } catch (error) {
          showToast(error.message || '저장에 실패했습니다.', 'error');
          ui.messageSending = false;
          ui.localBusyServiceIds.clear();
          render();
        } finally {
          setFormBusy(form, false, submitter);
        }
      });

      async function boot() {
        await loadState();
        setInterval(() => {
          if (
            document.activeElement &&
            ['INPUT', 'TEXTAREA', 'SELECT'].includes(
              document.activeElement.tagName,
            )
          ) {
            return;
          }
          const shouldSyncChat = Boolean(teamChatTarget(ui.selectedTeamId));
          loadState({ skipChatSync: !shouldSyncChat }).catch((error) =>
            showToast(error.message || '상태 갱신 실패', 'error'),
          );
        }, 8000);
      }

      boot().catch((error) => {
        ui.modalOpen = true;
        document.getElementById('detail-panel').innerHTML =
          `<div class="empty">${escapeHtml(
            error.message || '불러오기 실패',
          )}</div>`;
        document.getElementById('detail-modal')?.classList.add('open');
      });
    </script>
  </body>
</html>
