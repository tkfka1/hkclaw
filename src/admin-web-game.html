        if (room.kind === 'ops') {
          props.push(
            scene.add
              .rectangle(
                rect.width / 2,
                rect.height - 20,
                36,
                8,
                0x2a3f54,
                0.96,
              )
              .setOrigin(0.5),
            scene.add
              .rectangle(
                rect.width / 2,
                rect.height - 28,
                18,
                10,
                0x8aaefc,
                0.42,
              )
              .setOrigin(0.5),
          );
        }
        const doorGlow = scene.add
          .rectangle(
            rect.width / 2,
            rect.height - 10,
            32,
            6,
            style.stroke,
            0.16,
          )
          .setOrigin(0.5);
        const layoutTargetKind = room.teamTargetId
          ? 'team'
          : room.roomTargetId
            ? 'room'
            : null;
        const layoutTargetId = room.teamTargetId || room.roomTargetId || null;
        const isLayoutTarget = Boolean(layoutTargetKind && layoutTargetId);
        const tileGrid = getTileGrid(state.mapLayout);
        let movedDuringDrag = false;
        let dragSaveTicket = 0;

        container.on('pointerdown', () => {
          if (isTeamLayoutMode() && isLayoutTarget) {
            ui.selectedLayoutTargetKey = layoutTargetKey(
              layoutTargetKind,
              layoutTargetId,
            );
            renderDetailPanel();
            return;
          }
          onSelect();
        });
        container.on('pointerover', () => {
          bg.setStrokeStyle(2, 0xffefcf, 0.96);
          plaque.setStrokeStyle(2, 0xffefcf, 0.9);
        });
        container.on('pointerout', () => {
          bg.setStrokeStyle(
            room.active ? 2 : 1,
            style.stroke,
            room.active ? 0.9 : 0.45,
          );
          plaque.setStrokeStyle(2, style.stroke, room.active ? 0.92 : 0.6);
        });

        if (isLayoutTarget) {
          scene.input.setDraggable(container);
          container.on('dragstart', () => {
            if (!isTeamLayoutMode()) {
              return;
            }
            ui.selectedLayoutTargetKey = layoutTargetKey(
              layoutTargetKind,
              layoutTargetId,
            );
            renderDetailPanel();
            movedDuringDrag = false;
            container.setDepth(190);
            bg.setStrokeStyle(2, 0xffefcf, 1);
            plaque.setStrokeStyle(2, 0xffefcf, 1);
          });
          container.on('drag', (_pointer, dragX, dragY) => {
            if (!isTeamLayoutMode()) {
              return;
            }
            const snappedX = snapPixelsToGrid(dragX, tileGrid.tileWidth);
            const snappedY = snapPixelsToGrid(dragY, tileGrid.tileHeight);
            const nextX = clampNumber(
              snappedX,
              0,
              Math.max(width - rect.width, 0),
            );
            const nextY = clampNumber(
              snappedY,
              0,
              Math.max(height - rect.height, 0),
            );
            container.setPosition(nextX, nextY);
            movedDuringDrag = true;
          });
          container.on('dragend', async () => {
            if (!isTeamLayoutMode()) {
              container.setDepth(110);
              return;
            }
            container.setDepth(110);
            bg.setStrokeStyle(
              room.active ? 2 : 1,
              style.stroke,
              room.active ? 0.9 : 0.45,
            );
            plaque.setStrokeStyle(2, style.stroke, room.active ? 0.92 : 0.6);
            if (!movedDuringDrag || !layoutTargetId) {
              return;
            }
            const ticket = ++dragSaveTicket;
            const left = clampNumber(
              pixelsToPercent(
                snapPixelsToGrid(container.x, tileGrid.tileWidth),
                Math.max(width, 1),
              ),
              0,
              100,
            );
            const top = clampNumber(
              pixelsToPercent(
                snapPixelsToGrid(container.y, tileGrid.tileHeight),
                Math.max(height, 1),
              ),
              0,
              100,
            );
            try {
              await api(
                room.teamTargetId
                  ? '/api/admin/teams/layout'
                  : '/api/admin/rooms/layout',
                {
                  method: 'POST',
                  body: JSON.stringify(
                    room.teamTargetId
                      ? {
                          teamId: room.teamTargetId,
                          left,
                          top,
                        }
                      : {
                          roomId: room.roomTargetId,
                          left,
                          top,
                        },
                  ),
                },
              );
              if (ticket === dragSaveTicket) {
                showToast('위치 저장', 'success');
                await loadState({ skipChatSync: true });
              }
            } catch (error) {
              showToast(error.message || '위치 저장 실패', 'error');
              await loadState({ skipChatSync: true });
            }
          });
        }

        let pulseTween = null;
        if (room.pulse) {
          pulseTween = scene.tweens.add({
            targets: [doorGlow, plaque],
            alpha: { from: 0.16, to: 0.34 },
            yoyo: true,
            repeat: -1,
            duration: 620,
            ease: 'Sine.inOut',
          });
        }

        container.add([
          bg,
          innerFrame,
          plaqueShadow,
          plaque,
          title,
          copy,
          kindBadgeBg,
          badge,
          ...props,
          doorGlow,
        ]);
        state.roomLayer.add(container);
        return {
          actorId,
          renderKey,
          destroy() {
            pulseTween?.stop();
            container.destroy();
          },
        };
      }

      function reconcileRoomActors(state, roomSpecs) {
        const nextActors = new Map();

        roomSpecs.forEach((spec) => {
          const existing = state.roomActors.get(spec.actorId);
          if (existing && existing.renderKey === spec.renderKey) {
            nextActors.set(spec.actorId, existing);
            return;
          }

          existing?.destroy();
          const actor = createRoomActor(
            state,
            spec.room,
            spec.onSelect,
            spec.actorId,
            spec.renderKey,
          );
          nextActors.set(spec.actorId, actor);
        });

        state.roomActors.forEach((actor, actorId) => {
          if (nextActors.has(actorId)) return;
          actor.destroy();
        });

        state.roomActors = nextActors;
      }

      function createWorkerActor(state, serviceId) {
        const service = serviceById(serviceId);
        const scene = state.scene;
        const root = scene.add.container(0, 0);
        const bob = scene.add.container(0, 0);
        const shadow = scene.add.ellipse(0, 18, 18, 6, 0x000000, 0.26);
        const legsLeft = scene.add.rectangle(-3, 15, 4, 8, 0x24313c, 1);
        const legsRight = scene.add.rectangle(3, 15, 4, 8, 0x24313c, 1);
        const bodyOutline = scene.add.rectangle(0, 5, 16, 14, 0x122029, 1);
        const body = scene.add.rectangle(
          0,
          5,
          12,
          11,
          hexToNumber(workerColor(service)),
          1,
        );
        const armsLeft = scene.add.rectangle(
          -8,
          5,
          3,
          10,
          hexToNumber(workerColor(service)),
          1,
        );
        const armsRight = scene.add.rectangle(
          8,
          5,
          3,
          10,
          hexToNumber(workerColor(service)),
          1,
        );
        const head = scene.add.rectangle(0, -5, 12, 11, 0xf2d1b0, 1);
        const hair = scene.add.rectangle(0, -9, 12, 4, 0x1f2a33, 1);
        const face = scene.add.rectangle(0, -4, 8, 3, 0xffffff, 0.18);
        const card = scene.add
          .rectangle(0, 36, 92, 32, 0x091116, 0.96)
          .setStrokeStyle(1, 0xcfe1ff, 0.26);
        const name = enhanceText(
          scene.add
            .text(0, 24, service?.assistantName || serviceId, {
              fontFamily:
                'system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans CJK KR", sans-serif',
              fontSize: '12px',
              fontStyle: '700',
              color: '#f6efdf',
              align: 'center',
            })
            .setOrigin(0.5, 0),
        );
        const meta = enhanceText(
          scene.add
            .text(0, 38, '', {
              fontFamily:
                'ui-monospace, "SFMono-Regular", "SF Mono", "Cascadia Mono", "Segoe UI Mono", "Roboto Mono", Consolas, monospace',
              fontSize: '9px',
              color: '#93aab0',
              align: 'center',
            })
            .setOrigin(0.5, 0),
        );
        const hit = scene.add
          .rectangle(0, 4, 34, 36, 0x000000, 0.001)
          .setInteractive({ useHandCursor: true });

        bob.add([
          legsLeft,
          legsRight,
          bodyOutline,
          body,
          armsLeft,
          armsRight,
          head,
          hair,
          face,
        ]);
        root.add([shadow, bob, card, name, meta, hit]);
        state.workerLayer.add(root);

        const actor = {
          serviceId,
          root,
          bob,
          card,
          body,
          bodyParts: [body, armsLeft, armsRight],
          name,
          meta,
          hit,
          initialized: false,
          currentZone: null,
          currentLeft: 0,
          currentTop: 0,
          lastStyleKey: '',
          lastPlacementKey: '',
          bobTween: scene.tweens.add({
            targets: bob,
            y: -4,
            yoyo: true,
            repeat: -1,
            duration: 760 + state.workerActors.size * 90,
            ease: 'Sine.inOut',
          }),
        };

        hit.on('pointerdown', () => {
          selectService(serviceId);
        });
        hit.on('pointerover', () => {
          root.setScale(1.03);
        });
        hit.on('pointerout', () => {
          root.setScale(1);
        });

        state.workerActors.set(serviceId, actor);
        return actor;
      }

      function syncWorkerInteractivity(
        actor,
        interactive = !isTeamLayoutMode(),
      ) {
        if (!actor?.hit?.input) {
          return;

        actor.hit.input.enabled = interactive;
        if (!interactive) {

      function buildWorkerStyleKey(service) {
        return [
          service.assistantName,
          service.presence,
          service.role,
          service.agentType,
          service.serviceId === ui.selectedServiceId ? '1' : '0',
          isTeamLayoutMode() ? '0' : '1',

      function styleWorkerActor(actor, service) {
        const styleKey = buildWorkerStyleKey(service);
        if (actor.lastStyleKey === styleKey) {
          return;
        }
        actor.lastStyleKey = styleKey;
        const selected = service.serviceId === ui.selectedServiceId;
        const interactive = !isTeamLayoutMode();
        const color = hexToNumber(workerColor(service));
        actor.bodyParts.forEach((part) => part.setFillStyle(color, 1));
        actor.name.setText(service.assistantName);
        actor.meta.setText(
          `${compactPresenceLabel(service.presence)} · ${compactRoleLabel(service.role)}`,
        );
        actor.card.setStrokeStyle(
          selected ? 2 : 1,
          selected ? 0xffbf69 : 0xcfe1ff,
          selected ? 1 : 0.36,
        );
        syncWorkerInteractivity(actor, interactive);
      }

      function buildWorkerPlacementKey(placement) {
        return [placement.zone, placement.left, placement.top].join('|');
      }

      function routeWorkerToPlacement(state, actor, placement) {
        const placementKey = buildWorkerPlacementKey(placement);
        if (actor.initialized && actor.lastPlacementKey === placementKey) {
          return;
        }
        const scene = state.scene;
        const { width, height } = getOfficeWorldSize(state);
        const destination = pctPoint(
          placement.left,
          placement.top,
          width,
          height,
        );

        if (!actor.initialized) {
          actor.root.setPosition(destination.x, destination.y);
          actor.initialized = true;
          actor.currentLeft = placement.left;
          actor.currentTop = placement.top;
          actor.currentZone = placement.zone;
          actor.lastPlacementKey = placementKey;
          actor.root.setDepth(Math.round(destination.y));
          return;
        }

        const from = { x: actor.root.x, y: actor.root.y };
        const distance = Phaser.Math.Distance.Between(
          from.x,
          from.y,
          destination.x,
          destination.y,
        );
        if (distance < 8 && actor.currentZone === placement.zone) {
          actor.currentLeft = placement.left;
          actor.currentTop = placement.top;
          actor.lastPlacementKey = placementKey;
          return;
        }

        const anchor = routeAnchorForZone(
          placement.zone,
          state.snapshot?.transitAnchors ||
            buildTransitAnchors(width, height, state.mapLayout),
        );
        const points = compactRoute([
          { x: from.x, y: anchor.y },
          anchor,
          { x: destination.x, y: anchor.y },
          destination,
        ]);

        scene.tweens.killTweensOf(actor.root);
        actor.root.setDepth(Math.round(destination.y));
        actor.currentLeft = placement.left;
        actor.currentTop = placement.top;
        actor.currentZone = placement.zone;
        actor.lastPlacementKey = placementKey;

        const runStep = (index) => {
          const point = points[index];
          if (!point) return;
          scene.tweens.add({
            targets: actor.root,
            x: point.x,
            y: point.y,
            duration: clampNumber(
              Phaser.Math.Distance.Between(
                actor.root.x,
                actor.root.y,
                point.x,
                point.y,
              ) * 2.1,
              140,
              420,
            ),
            ease: index === points.length - 1 ? 'Quad.out' : 'Linear',
            onUpdate: () => {
              actor.root.setDepth(Math.round(actor.root.y));
            },
            onComplete: () => runStep(index + 1),
          });
        };
        runStep(0);
      }

      function syncOfficeGame() {
        const state = ensureOfficeGame();
        if (!state || !state.scene || !ui.data) return;

        const snapshot = buildOfficeSnapshot();
        state.snapshot = snapshot;
        updateOfficeFooter(snapshot);
        drawOfficeBackdrop(state, snapshot);
        const zoneCounts = snapshot.workers.reduce((acc, worker) => {
          acc[worker.zone] = (acc[worker.zone] || 0) + 1;
          return acc;
        }, {});
        const roomSpecs = [];

        snapshot.specialRooms.forEach((room) => {
          const nextRoom = {
            ...room,
            badge: `${room.kind} · ${zoneCounts[room.id] || 0}`,
            active: isTeamLayoutMode()
              ? ui.selectedLayoutTargetKey === layoutTargetKey('room', room.id)
              : (ui.detailMode === 'desk' &&
                  ((room.id === 'management' &&
                    ui.activeDesk === 'management') ||
                    (room.id === 'general' && ui.activeDesk === 'general') ||
                    (room.id === 'hr' && ui.activeDesk === 'hr'))) ||
                (ui.detailMode === 'room' && ui.selectedRoomId === room.id),
            pulse:
              room.id === 'management' ||
              room.id === 'general' ||
              room.id === 'hr' ||
              (zoneCounts[room.id] || 0) > 0,
            roomTargetId: room.id,
          };
          roomSpecs.push({
            actorId: buildRoomActorId(nextRoom),
            renderKey: buildRoomActorRenderKey(nextRoom),
            room: nextRoom,
            onSelect: () => {
              if (room.id === 'management') {
                openManagementDesk('team-management');
                return;
              }
              if (room.id === 'general') {
                selectOperationalRoom(room.id);
                return;
              }
              if (room.id === 'hr') {
                openHrDesk('employees');
                return;
              }
              if (
                room.id === 'lounge' ||
                room.id === 'offsite' ||
                room.id === 'ops'
              ) {
                selectOperationalRoom(room.id);
              }
            },
          });
        });

        snapshot.teamLayouts.forEach((layout) => {
          const team = teamById(layout.teamId);
          if (!team) return;
          const nextRoom = {
            ...layout,
            kind: 'team',
            name: team.name,
            copy:
              displayLinkedChannelName(
                team.linkedChannelName,
                team.linkedJid,
              ) || '채널 미연결',
            color: team.color,
            active: isTeamLayoutMode()
              ? ui.selectedLayoutTargetKey ===
                layoutTargetKey('team', team.teamId)
              : ui.detailMode === 'team' && team.teamId === ui.selectedTeamId,
            badge: `${team.memberServiceIds.length} staff`,
            pulse: team.activeServiceIds.length > 0,
            teamTargetId: team.teamId,
          };
          roomSpecs.push({
            actorId: buildRoomActorId(nextRoom),
            renderKey: buildRoomActorRenderKey(nextRoom),
            room: nextRoom,
            onSelect: () => selectTeam(team.teamId),
          });
        });

        reconcileRoomActors(state, roomSpecs);

        const nextIds = new Set(
          snapshot.workers.map((worker) => worker.service.serviceId),
        );
        snapshot.workers.forEach((placement) => {
          const serviceId = placement.service.serviceId;
          const actor =
            state.workerActors.get(serviceId) ||
            createWorkerActor(state, serviceId);
          styleWorkerActor(actor, placement.service);
          routeWorkerToPlacement(state, actor, placement);
        });

        [...state.workerActors.keys()].forEach((serviceId) => {
          if (nextIds.has(serviceId)) return;
          const actor = state.workerActors.get(serviceId);
          actor?.bobTween?.stop();
          actor?.root?.destroy();
          state.workerActors.delete(serviceId);
        });

        syncOfficeCamera(state, snapshot);
      }

      function compactDiscordChannelLabel(name) {
        const trimmed = String(name || '').trim();
        if (!trimmed) return '';
        if (/^discord\s+#/i.test(trimmed)) {
          return trimmed.replace(/^discord\s+/i, '').trim();
        }
        if (trimmed.includes('#')) {
          return `#${trimmed.split('#').pop().trim()}`;
        }
        return trimmed.startsWith('#') ? trimmed : `#${trimmed}`;
      }

      function displayLinkedChannelName(name, jid) {
        const trimmed = String(name || '').trim();
        if (!trimmed) {
          return String(jid || '').trim();

        if (String(jid || '').startsWith('dc:')) {
          return compactDiscordChannelLabel(trimmed);

        return trimmed;
      }

        const basePaddingBottom = Number(header.dataset.basePaddingBottom) || 0;

      async function readUploadFile(input) {
        const file = input?.files?.[0];
        if (!file) return undefined;
        const bytes = new Uint8Array(await file.arrayBuffer());
        let binary = '';
        const chunkSize = 0x8000;
        for (let i = 0; i < bytes.length; i += chunkSize) {
          const slice = bytes.subarray(i, i + chunkSize);
          binary += String.fromCharCode(...slice);
        }
        return {
          name: file.name,
          contentBase64: btoa(binary),
        };
      }

      function describeServiceRuntime(service) {
        const runtime = service?.runtime || {};
        const mode = runtime.running ? 'running' : 'stopped';
        const active = runtime.activeState || 'unknown';
        const sub = runtime.subState || 'unknown';
        return `${mode} · ${active}/${sub}`;
      }

        return officeGame?.snapshot || buildOfficeSnapshot();

      function selectedLayoutTarget() {
        const key = ui.selectedLayoutTargetKey;
        if (!key) return null;
        const snapshot = currentOfficeSnapshot();

        if (key.startsWith('team:')) {
          const teamId = key.slice('team:'.length);
          const team = teamById(teamId);
          const layout = snapshot.teamLayouts.find(
            (entry) => entry.teamId === teamId,
          );
          if (!team || !layout) return null;
          return {
            kind: 'team',
            id: teamId,
            name: team.name || '',
            copy:
              displayLinkedChannelName(
                team.linkedChannelName,
                team.linkedJid,
              ) || '채널 미연결',
            left: layout.left,
            top: layout.top,
            width: layout.width,
            height: layout.height,
          };
        }

        if (key.startsWith('room:')) {
          const roomId = key.slice('room:'.length);
          const room = snapshot.specialRooms.find(
            (entry) => entry.id === roomId,
          );
          if (!room) return null;
          return {
            kind: 'room',
            id: roomId,
            name: roomLayoutConfig(roomId)?.name || '',
            fallbackName: roomLabel(roomId),
            copy: room.copy || '',
            left: room.left,
            top: room.top,
            width: room.width,
            height: room.height,
          };
        }

        return null;
      }

          existingServiceId: readValue('existingServiceId') || undefined,
          assistantName: readValue('assistantName'),
          serviceId: readValue('serviceId') || undefined,
          agentType: readValue('agentType') || 'claude-code',
          role: readValue('role') || 'normal',

      function formatServiceActionToast(command, scheduled) {
        const suffix = scheduled ? '예약했습니다.' : '실행했습니다.';
        if (command === 'restart') {
          return `서비스 재시작을 ${suffix}`;
        }
        if (command === 'start') {
          return `서비스 시작을 ${suffix}`;
        }
        if (command === 'stop') {
          return `서비스 정지를 ${suffix}`;
        }
        return scheduled
          ? '서비스 작업을 예약했습니다.'
          : '서비스 작업을 실행했습니다.';
      }

      function readRequiredNumberField(formData, name) {
        const value = Number(formData.get(name));
        if (!Number.isFinite(value)) {
          throw new Error(`${name} 값이 올바르지 않습니다.`);
        }
        return value;

      async function handleLayoutEditorSubmit(form) {
        const formData = new FormData(form);
        const targetKind = String(formData.get('targetKind') || '').trim();
        const targetId = String(formData.get('targetId') || '').trim();
        const name = String(formData.get('name') || '').trim();
        const layoutData = officeGame?.mapLayout || null;
        const leftTiles = readRequiredNumberField(formData, 'left');
        const topTiles = readRequiredNumberField(formData, 'top');
        const widthTiles = readRequiredNumberField(formData, 'width');
        const heightTiles = readRequiredNumberField(formData, 'height');
        const left = snapLayoutPositionPercent(
          tileUnitsToPercent(leftTiles, 'x', layoutData),
          'x',
          layoutData,
        );
        const top = snapLayoutPositionPercent(
          tileUnitsToPercent(topTiles, 'y', layoutData),
          'y',
          layoutData,
        );
        const width = snapLayoutSizePercent(
          tileUnitsToPercent(widthTiles, 'x', layoutData),
          'x',
          layoutData,
          left,
        );
        const height = snapLayoutSizePercent(
          tileUnitsToPercent(heightTiles, 'y', layoutData),
          'y',
          layoutData,
          top,
        );
        const payload = {
          left,
          top,
          width,
          height,
          ...(name ? { name } : {}),
        };

        if (targetKind === 'team') {
          if (!targetId) {
            throw new Error('teamId is required');
          }
          if (!name) {
            throw new Error('팀 이름을 입력하세요.');
          }
          await api('/api/admin/teams/layout', {
            method: 'POST',
            body: JSON.stringify({
              teamId: targetId,
              ...payload,
            }),
          });
            showToast('팀 배치를 저장했습니다.', 'success');
        } else if (targetKind === 'room') {
          if (!targetId) {
            throw new Error('roomId is required');
          }
          await api('/api/admin/rooms/layout', {
            method: 'POST',
            body: JSON.stringify({
              roomId: targetId,
              ...payload,
              ...(name ? { name } : { name: '' }),
            }),
          });
            showToast('공간 배치를 저장했습니다.', 'success');
        } else {
          throw new Error('선택된 배치 대상이 없습니다.');
        }

        await loadState({ skipChatSync: true });
      }

      async function handleChatSubmit(form) {
        if (!ui.selectedTeamId) return;
        const field = form.querySelector('textarea[name="message"]');
        const message = field.value.trim();
        if (!message) return;

        ui.messageSending = true;
        const activeTarget = teamChatTarget(ui.selectedTeamId);
        if (activeTarget) {
          ui.localBusyServiceIds.add(activeTarget.serviceId);
        }
        render();

        try {
          const payload = await api('/api/admin/chat', {
            method: 'POST',
            body: JSON.stringify({
              teamId: ui.selectedTeamId,
              serviceId: activeTarget?.serviceId || undefined,
              message,
            }),
          });
          ui.chatHistory = payload.history || [];
          field.value = '';
            showToast('팀 채팅을 전달했습니다.', 'success');
        } finally {
          ui.messageSending = false;
          if (activeTarget) {
            ui.localBusyServiceIds.delete(activeTarget.serviceId);
          }
          render();
        }
      }

          if (action === 'resolve-objective') {
            resolveObjective(target.dataset.objectiveId);
            return;
          }

          if (action === 'reset-hero-customization') {
            resetHeroCustomization(target.dataset.serviceId);
            return;
          }

          if (action === 'reset-campaign-state') {
            resetCampaignState();
            return;
          }

          if (action === 'cycle-hero') {
            cycleHero(Number(target.dataset.direction || 1));
            return;
          }

          if (action === 'select-service') {
            selectService(target.dataset.serviceId);
            return;
          }

          if (action === 'select-service-for-temperament') {
            ui.selectedServiceId = target.dataset.serviceId;
            ui.detailMode = 'desk';
            ui.activeDesk = 'hr';
            ui.activeTab = 'temperament-assignment';
            ui.selectedRoomId = null;
            render();
            return;
          }

          if (action === 'select-temperament') {
            selectTemperament(target.dataset.temperamentId);
            return;
          }

          if (action === 'new-temperament') {
            createTemperament();
            return;
          }

          if (action === 'delete-temperament') {
            await api('/api/admin/temperaments/delete', {
              method: 'POST',
              body: JSON.stringify({
                temperamentId: target.dataset.temperamentId,
              }),
            });
            ui.selectedTemperamentId = null;
            showToast('성향을 삭제했다.', 'success');
            await loadState({ skipChatSync: true });
            return;
          }

          if (action === 'select-team-chat') {
            ui.selectedTeamChatServiceId = target.dataset.serviceId;
            renderDetailPanel();
            return;
          }

          if (action === 'open-chat') {
            selectService(target.dataset.serviceId);
            return;
          }

          if (action === 'refresh-chat') {
            if (ui.selectedTeamId) await loadChatHistory(ui.selectedTeamId);
            return;
          }

          if (action === 'refresh-service-logs') {
            await loadServiceLogs(target.dataset.serviceId, false);
            showToast('최근 로그를 새로 읽었습니다.', 'info');
            return;
          }

          if (action === 'delete-team') {
            await api('/api/admin/teams/delete', {
              method: 'POST',
              body: JSON.stringify({ teamId: target.dataset.teamId }),
            });
            if (ui.selectedTeamId === target.dataset.teamId) {
              ui.selectedTeamId = null;
            }
            showToast('팀을 삭제했습니다.', 'success');
            await loadState({ skipChatSync: true });
            return;
          }

          if (action === 'delete-service') {
            if (
              !window.confirm(
                '이 직원을 삭제하면 배정과 서비스 구성이 함께 정리됩니다. 계속할까요?',
              )
            ) {
              return;
            }
            await api('/api/admin/services/delete', {
              method: 'POST',
              body: JSON.stringify({
                serviceId: target.dataset.serviceId,
              }),
            });
            await api('/api/admin/topology/reconcile', {
              method: 'POST',
            });
            if (ui.selectedServiceId === target.dataset.serviceId) {
              focusEmployeeManagement(null);
            }
            showToast('직원을 삭제했습니다.', 'success');
            await loadState({ skipChatSync: true });
            queueStateRefresh(1200);
            return;
          }

          if (action === 'toggle-assignment') {
            await api('/api/admin/assignments/toggle', {
              method: 'POST',
              body: JSON.stringify({
                jid: target.dataset.jid,
                serviceId: target.dataset.serviceId,
                enabled: target.dataset.enabled === 'true',
              }),
            });
            showToast(
              '팀 배치를 변경했습니다. 대상 서비스가 재시작됩니다.',
              'success',
            );
            await loadState({ skipChatSync: true });
            queueStateRefresh(1200);
            return;
          }

          if (action === 'service-action') {
            const payload = await api('/api/admin/services/action', {
              method: 'POST',
              body: JSON.stringify({
                serviceId: target.dataset.serviceId,
                action: target.dataset.command,
              }),
            });
            showToast(
              formatServiceActionToast(
                target.dataset.command,
                payload?.scheduled === true,
              ),
              'success',
            );
            await loadState({ skipChatSync: true });
            queueStateRefresh(1200);
            return;
          }
        } catch (error) {
          showToast(error.message || '요청에 실패했습니다.', 'error');
        }
      });

      document.addEventListener('change', (event) => {
        const target = event.target;
        if (target instanceof HTMLInputElement) {
          if (target.matches('[data-discord-channel-input]')) {
            applyDiscordChannelInputState(target);
          }
          return;
        }
        if (target instanceof HTMLSelectElement) {
          if (target.name !== 'agentType' && target.name !== 'role') return;
          const form = target.closest('form');
          if (form) {
            syncOriginPanels(form);
            syncRolePanels(form);
          }
        }
      });

      document.addEventListener('input', (event) => {
        const target = event.target;
        if (!(target instanceof HTMLInputElement)) return;
        if (target.matches('[data-discord-channel-input]')) {
          applyDiscordChannelInputState(target);
          return;
        }
        if (target.matches('[data-employee-filter-input]')) {
          ui.employeeFilterQuery = target.value;
          if (ui.activeDesk === 'hr') {
            renderDetailPanel();
          }
        }
      });

      document.addEventListener(
        'focusout',
        (event) => {
          const target = event.target;
          if (!(target instanceof HTMLInputElement)) return;
          if (!target.matches('[data-discord-channel-input]')) return;
          normalizeDiscordChannelInputElement(target);
        },
        true,
      );

      document.addEventListener('submit', async (event) => {
        const form = event.target;
        if (!(form instanceof HTMLFormElement)) return;
        event.preventDefault();
        const submitter =
          event.submitter instanceof HTMLButtonElement
            ? event.submitter
            : form.querySelector('button[type="submit"], button:not([type])');
        setFormBusy(form, true, submitter);

        try {
          if (form.id === 'team-form') {
            await handleTeamSubmit(form);
            return;
          }
          if (form.id === 'layout-editor-form') {
            await handleLayoutEditorSubmit(form);
            return;
          }
          if (form.id === 'company-form') {
            await handleCompanySettingsSubmit(form);
            return;
          }
          if (form.id === 'map-upload-form') {
            await handleMapUploadSubmit(form);
            return;
          }
          if (form.id === 'hire-form') {
            await handleHireSubmit(form);
            return;
          }
          if (form.id === 'employee-form') {
            await handleEmployeeSubmit(form);
            return;
          }
          if (form.id === 'temperament-definition-form') {
            await handleTemperamentDefinitionSubmit(form);
            return;
          }
          if (form.id === 'temperament-assignment-form') {
            await handleTemperamentAssignmentSubmit(form);
            return;
          }
          if (form.id === 'chat-form') {
            await handleChatSubmit(form);
            return;
          }
          if (form.id === 'team-chat-form') {
            await handleChatSubmit(form);
            return;
          }
          if (form.id === 'hero-customization-form') {
            await handleHeroCustomizationSubmit(form);
          }
        } catch (error) {
          showToast(error.message || '저장에 실패했습니다.', 'error');
          ui.messageSending = false;
          ui.localBusyServiceIds.clear();
          render();
        } finally {
          setFormBusy(form, false, submitter);
        }
      });

      function isInteractiveField(element) {
        return (
          element instanceof HTMLElement &&
          (element.isContentEditable ||
            ['INPUT', 'TEXTAREA', 'SELECT'].includes(element.tagName))
        );
      }

      window.addEventListener('keydown', (event) => {
        if (event.defaultPrevented) return;
        if (event.metaKey || event.ctrlKey || event.altKey) return;
        if (isInteractiveField(document.activeElement)) return;

        if (/^[1-4]$/.test(event.key)) {
          const index = Number(event.key) - 1;
          const party = partyServices();
          const service = party[index];
          if (service) {
            event.preventDefault();
            selectHero(service.serviceId);
          }
          return;
        }

        if (event.key === '0') {
          event.preventDefault();
          setCameraMode('overview');
          return;
        }

        if (event.key === '[' || event.key === ']') {
          event.preventDefault();
          cycleHero(event.key === '[' ? -1 : 1);
          return;
        }

        const lowered = event.key.toLowerCase();
        if (lowered === 'f') {
          event.preventDefault();
          setCameraMode('focus');
          return;
        }
        if (lowered === 'q') {
          event.preventDefault();
          openManagementDesk('team-management');
          return;
        }
        if (lowered === 'w') {
          event.preventDefault();
          openHrDesk('employees');
          return;
        }
        if (lowered === 'e') {
          event.preventDefault();
          openHrDesk('hiring');
          return;
        }
        if (lowered === 'r') {
          event.preventDefault();
          openGeneralDesk('team-layout');
          return;
        }
        if (lowered === 'm') {
          event.preventDefault();
          openMapDesk('map-upload');
        }
      });

      window.addEventListener('resize', () => {
        scheduleStageHeaderLayoutSync();
      });

      async function boot() {
        await loadState();
        setInterval(() => {
          if (
            document.activeElement &&
            ['INPUT', 'TEXTAREA', 'SELECT'].includes(
              document.activeElement.tagName,
            )
          ) {
            return;
          }
          const shouldSyncChat = Boolean(teamChatTarget(ui.selectedTeamId));
          loadState({ skipChatSync: !shouldSyncChat }).catch((error) =>
            showToast(error.message || '상태 갱신 실패', 'error'),
          );
        }, 8000);
      }

      boot().catch((error) => {
        document.getElementById('detail-panel').innerHTML =
          `<div class="empty">${escapeHtml(
            error.message || '불러오기 실패',
          )}</div>`;
      });
    </script>
  </body>
</html>
