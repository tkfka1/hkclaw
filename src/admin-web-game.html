<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Office Admin</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=IBM+Plex+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&display=swap');

      :root {
        --bg-1: #08131a;
        --bg-2: #10222d;
        --panel: rgba(8, 17, 23, 0.88);
        --panel-2: rgba(12, 24, 32, 0.94);
        --line: rgba(255, 255, 255, 0.09);
        --line-strong: rgba(255, 255, 255, 0.16);
        --text: #f6efdf;
        --muted: #93aab0;
        --gold: #ffbf69;
        --mint: #57d1b7;
        --blue: #7db5ff;
        --red: #ff8d7b;
        --purple: #b894ff;
        --pixel: 'Silkscreen', 'IBM Plex Mono', monospace;
        --sans: 'IBM Plex Sans KR', 'Apple SD Gothic Neo', sans-serif;
        --service-sans:
          'Noto Sans KR', 'Noto Sans', 'Apple SD Gothic Neo', sans-serif;
        --mono: 'IBM Plex Mono', monospace;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(
            circle at top,
            rgba(87, 209, 183, 0.14),
            transparent 28%
          ),
          linear-gradient(180deg, #142430 0%, #0d1a21 38%, #071017 100%);
        color: var(--text);
        font-family: var(--sans);
      }

      body {
        overflow: hidden;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        width: 100vw;
        height: 100vh;
      }

      .sidebar {
        position: relative;
        display: flex;
        flex-direction: column;
        min-height: 0;
        padding: 10px 8px;
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 26%),
          var(--panel);
        backdrop-filter: blur(18px);
        overflow: hidden;
        transition:
          transform 180ms ease,
          opacity 180ms ease,
          padding 180ms ease,
          border-color 180ms ease;
      }

      .app.sidebar-collapsed .sidebar {
        transform: translateX(-100%);
        opacity: 0;
        pointer-events: none;
        padding: 0;
        border-right-color: transparent;
      }

      .sidebar::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            circle at top left,
            rgba(255, 191, 105, 0.08),
            transparent 28%
          ),
          radial-gradient(
            circle at bottom left,
            rgba(87, 209, 183, 0.06),
            transparent 28%
          );
        pointer-events: none;
      }

      .sidebar > * {
        position: relative;
      }

      .brand {
        padding: 12px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background:
          linear-gradient(135deg, rgba(255, 191, 105, 0.12), transparent 50%),
          rgba(255, 255, 255, 0.03);
        box-shadow: var(--shadow);
      }

      .brand-kicker {
        color: var(--gold);
        font: 700 11px/1.2 var(--pixel);
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .brand h1 {
        margin: 8px 0 5px;
        font: 700 18px/1.1 var(--pixel);
        color: var(--text);
        letter-spacing: 0.02em;
      }

      .brand p {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.35;
      }

      .tabs {
        display: grid;
        grid-template-columns: 1fr;
        gap: 4px;
        margin-top: 8px;
      }

      .tab {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 9px 8px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
        text-align: left;
        font: 700 10px/1.2 var(--pixel);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        transition:
          transform 140ms ease,
          border-color 140ms ease,
          color 140ms ease,
          background 140ms ease;
      }

      .tab:hover {
        transform: translateY(-1px);
      }

      .tab.active {
        color: #081118;
        border-color: rgba(255, 191, 105, 0.28);
        background: linear-gradient(135deg, var(--gold), #ffd59c);
      }

      .sidebar-panel {
        flex: 1 1 auto;
        min-height: 0;
        margin-top: 8px;
        padding: 10px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 24%),
          var(--panel-2);
        box-shadow: var(--shadow);
        overflow-y: auto;
        overflow-x: hidden;
        padding-bottom: 28px;
      }

      .panel-head h2 {
        margin: 0;
        font: 700 14px/1.2 var(--pixel);
      }

      .panel-head p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.35;
      }

      .stack {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .field label {
        color: var(--muted);
        font: 500 11px/1.2 var(--mono);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .check-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font: 500 11px/1.2 var(--mono);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .check-label input[type='checkbox'] {
        width: auto;
        margin: 0;
      }

      .check-grid {
        display: grid;
        gap: 8px;
      }

      .is-hidden {
        display: none !important;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 10px 11px;
        background: rgba(4, 9, 13, 0.78);
        color: var(--text);
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      input[readonly] {
        opacity: 0.72;
      }

      .button-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 5px;
      }

      .button,
      button {
        border: 0;
        border-radius: 12px;
        padding: 10px 12px;
        background: linear-gradient(135deg, var(--gold), #ffd59c);
        color: #081118;
        font: 700 10px/1.2 var(--pixel);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        box-shadow: 0 10px 22px rgba(255, 191, 105, 0.2);
      }

      .button.secondary,
      button.secondary {
        background: rgba(255, 255, 255, 0.07);
        color: var(--text);
        box-shadow: none;
      }

      .button.danger,
      button.danger {
        background: linear-gradient(135deg, #ff8d7b, #ffc0b5);
        color: #190906;
      }

      .button.small,
      button.small {
        padding: 9px 11px;
        border-radius: 12px;
        font-size: 10px;
      }

      button:disabled {
        opacity: 0.55;
        cursor: wait;
      }

      .card-list {
        display: grid;
        gap: 6px;
      }

      .mini-card {
        display: grid;
        width: 100%;
        padding: 9px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.02);
        color: var(--text);
        font: inherit;
        text-align: left;
        box-shadow: none;
        transition:
          border-color 120ms ease,
          background 120ms ease;
      }

      .mini-card.active {
        border-color: rgba(255, 191, 105, 0.26);
        background: rgba(255, 191, 105, 0.06);
      }

      .mini-card-head {
        display: grid;
        gap: 6px;
        align-items: flex-start;
      }

      .mini-card-head .pill {
        justify-self: start;
      }

      .mini-card-title {
        margin: 0;
        font-weight: 700;
      }

      .mini-card-copy {
        margin-top: 3px;
        color: var(--muted);
        font-size: 10px;
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 8px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 26px;
        padding: 6px 9px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.07);
        color: var(--muted);
        font: 500 11px/1.1 var(--mono);
      }

      .pill.role-normal {
        background: rgba(255, 191, 105, 0.14);
        color: var(--gold);
      }

      .pill.role-dashboard {
        background: rgba(125, 181, 255, 0.15);
        color: var(--blue);
      }

      .pill.presence-offline {
        background: rgba(255, 141, 123, 0.15);
        color: var(--red);
      }

      .pill.presence-resting {
        background: rgba(87, 209, 183, 0.14);
        color: var(--mint);
      }

      .pill.presence-working {
        background: rgba(255, 191, 105, 0.15);
        color: var(--gold);
      }

      .pill.presence-monitoring {
        background: rgba(125, 181, 255, 0.14);
        color: var(--blue);
      }

      .note {
        padding: 10px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
      }

      .input-hint {
        color: var(--muted);
        font: 500 11px/1.45 var(--mono);
      }

      .input-hint.valid {
        color: var(--mint);
      }

      .input-hint.error {
        color: #ff8d7b;
      }

      .discord-channel-input.valid {
        border-color: rgba(88, 212, 186, 0.4);
      }

      .discord-channel-input.invalid {
        border-color: rgba(255, 141, 123, 0.65);
      }

      .assignment-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 9px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
      }

      .assignment-row strong {
        display: block;
      }

      .assignment-row span {
        color: var(--muted);
        font-size: 12px;
      }

      .chat-shell {
        display: grid;
        gap: 12px;
      }

      .chat-targets {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .chat-target {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 9px 10px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--muted);
        font: 600 11px/1.2 var(--mono);
        text-align: left;
      }

      .chat-target.active {
        color: #081118;
        border-color: rgba(255, 191, 105, 0.22);
        background: linear-gradient(135deg, var(--gold), #ffd59c);
      }

      .chat-log {
        min-height: 200px;
        max-height: 40vh;
        overflow: auto;
        display: grid;
        gap: 10px;
        padding: 10px;
        border-radius: 18px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 30%),
          rgba(4, 10, 14, 0.76);
        border: 1px solid var(--line);
      }

      .bubble {
        max-width: 92%;
        padding: 11px 12px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.06);
      }

      .bubble.user {
        margin-left: auto;
        background: rgba(255, 191, 105, 0.15);
      }

      .bubble.assistant {
        border-top-left-radius: 6px;
      }

      .bubble.error {
        border-top-left-radius: 6px;
        background: rgba(255, 141, 123, 0.14);
      }

      .bubble-meta {
        color: var(--muted);
        font: 500 10px/1.2 var(--mono);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .bubble-text {
        margin-top: 8px;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.65;
        font-size: 13px;
      }

      .chat-form {
        display: grid;
        gap: 10px;
      }

      .stage-wrap {
        position: relative;
        min-width: 0;
        height: 100vh;
        padding: 14px;
      }

      .detail-card {
        display: flex;
        flex-direction: column;
        min-height: 0;
        height: 100%;
        padding: 14px 14px 10px;
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 22%),
          var(--panel-2);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .detail-modal {
        position: fixed;
        inset: 0;
        z-index: 120;
        display: none;
        align-items: flex-start;
        justify-content: center;
        overflow-y: auto;
        padding: 14px 18px 18px;
      }

      .detail-modal.open {
        display: flex;
      }

      .modal-backdrop {
        position: absolute;
        inset: 0;
        border: 0;
        background: rgba(3, 8, 12, 0.72);
        backdrop-filter: blur(8px);
        cursor: pointer;
      }

      .modal-card {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        width: min(980px, calc(100vw - 36px));
        height: min(90vh, 920px);
        min-height: 0;
      }

      .modal-bar {
        display: flex;
        justify-content: flex-end;
        padding: 0 0 10px;
      }

      .detail-panel {
        display: flex;
        flex: 1 1 auto;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        font-family: var(--service-sans);
      }

      .detail-shell {
        display: flex;
        flex: 1 1 auto;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
        height: 100%;
      }

      .detail-tabs {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .detail-tab {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 11px 12px;
        background: rgba(255, 255, 255, 0.05);
        color: #d7e3ea;
        text-align: left;
        font: 700 13px/1.3 var(--service-sans);
        letter-spacing: 0;
        text-transform: none;
        box-shadow: none;
      }

      .detail-tab.active {
        color: #081118;
        border-color: rgba(255, 191, 105, 0.3);
        background: linear-gradient(135deg, var(--gold), #ffd59c);
      }

      .detail-header {
        display: grid;
        gap: 6px;
        padding: 2px 2px 0;
      }

      .detail-kicker {
        color: var(--gold);
        font: 700 12px/1.3 var(--service-sans);
        letter-spacing: 0.01em;
        text-transform: none;
      }

      .detail-title {
        font: 700 25px/1.15 var(--service-sans);
        letter-spacing: -0.03em;
      }

      .detail-copy {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .detail-body {
        display: grid;
        flex: 1 1 auto;
        gap: 12px;
        align-content: start;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding-right: 6px;
        padding-bottom: 10px;
        scrollbar-gutter: stable;
        overscroll-behavior: contain;
      }

      .detail-panel .panel-head h2 {
        font: 700 18px/1.3 var(--service-sans);
        letter-spacing: -0.02em;
      }

      .detail-panel .panel-head p {
        margin-top: 6px;
        font: 400 13px/1.5 var(--service-sans);
      }

      .detail-panel .field label,
      .detail-panel .check-label {
        color: #d4dde2;
        font: 600 12px/1.4 var(--service-sans);
        text-transform: none;
        letter-spacing: 0;
      }

      .detail-panel input,
      .detail-panel select,
      .detail-panel textarea {
        padding: 9px 11px;
        border-radius: 11px;
        font: 500 14px/1.45 var(--service-sans);
      }

      .detail-panel .button,
      .detail-panel button {
        border-radius: 12px;
        padding: 10px 12px;
        font: 700 13px/1.3 var(--service-sans);
        text-transform: none;
        letter-spacing: 0;
      }

      .detail-panel .button.small,
      .detail-panel button.small {
        font-size: 12px;
      }

      .detail-panel .mini-card {
        padding: 10px;
        border-radius: 12px;
      }

      .detail-panel .mini-card-title {
        font: 700 14px/1.35 var(--service-sans);
        letter-spacing: -0.01em;
      }

      .detail-panel .mini-card-copy,
      .detail-panel .note,
      .detail-panel .assignment-row span,
      .detail-panel .bubble-text {
        font: 400 13px/1.5 var(--service-sans);
      }

      .detail-panel .pill,
      .detail-panel .chat-target,
      .detail-panel .bubble-meta {
        font: 600 12px/1.3 var(--service-sans);
        letter-spacing: 0;
        text-transform: none;
      }

      .detail-panel .chat-log {
        min-height: 180px;
        max-height: min(34vh, 360px);
      }

      .detail-panel .chat-target {
        padding: 10px 11px;
      }

      .detail-panel code {
        font-family: var(--mono);
      }

      .dashboard-preview {
        padding: 12px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(2, 8, 12, 0.74);
        color: var(--text);
        font: 500 11px/1.55 var(--sans);
      }

      .dashboard-preview p {
        margin: 0;
      }

      .dashboard-preview p + p {
        margin-top: 10px;
      }

      .dashboard-preview strong {
        color: var(--text);
      }

      .dashboard-preview em {
        color: var(--muted);
        font-style: normal;
      }

      .dashboard-preview-code {
        margin: 10px 0 0;
        padding: 10px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font: 500 11px/1.55 var(--mono);
        overflow-x: auto;
        white-space: pre-wrap;
      }

      .dashboard-preview.is-empty {
        color: var(--muted);
      }

      .stage-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 16px;
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          linear-gradient(135deg, rgba(87, 209, 183, 0.1), transparent 42%),
          rgba(7, 14, 18, 0.84);
        box-shadow: var(--shadow);
      }

      .stage-header-left {
        display: flex;
        align-items: center;
        min-width: 0;
      }

      .stage-title {
        font: 700 18px/1.2 var(--pixel);
      }

      .stage-copy {
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      .stage-header-right {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .hud-chip {
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--muted);
        font: 600 11px/1.2 var(--mono);
      }

      button.hud-chip-action {
        padding: 8px 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        font: 600 11px/1.2 var(--mono);
        letter-spacing: 0;
        text-transform: none;
        box-shadow: none;
      }

      button.hud-chip-action.active {
        border-color: rgba(255, 191, 105, 0.42);
        background: rgba(255, 191, 105, 0.18);
      }

      .office {
        position: relative;
        width: 100%;
        height: calc(100vh - 116px);
        margin-top: 16px;
        overflow: hidden;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          radial-gradient(
            circle at top,
            rgba(255, 255, 255, 0.05),
            transparent 34%
          ),
          linear-gradient(180deg, #172b38 0%, #13222c 40%, #101922 100%);
        box-shadow: var(--shadow);
      }

      .office canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        z-index: 1;
      }

      .office::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 34px 34px;
        opacity: 0.16;
        pointer-events: none;
      }

      .office::after {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            circle at 50% 50%,
            rgba(255, 191, 105, 0.06),
            transparent 28%
          ),
          radial-gradient(
            circle at 18% 78%,
            rgba(87, 209, 183, 0.08),
            transparent 24%
          ),
          radial-gradient(
            circle at 82% 22%,
            rgba(125, 181, 255, 0.08),
            transparent 24%
          );
        opacity: 0.45;
        pointer-events: none;
      }

      .walkway {
        position: absolute;
        border-radius: 24px;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.06),
            rgba(255, 255, 255, 0.02)
          ),
          rgba(255, 255, 255, 0.03);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .walkway.center {
        left: 26%;
        right: 26%;
        top: 46%;
        height: 10%;
      }

      .walkway.left {
        left: 19%;
        top: 16%;
        width: 7%;
        height: 68%;
      }

      .walkway.right {
        right: 19%;
        top: 16%;
        width: 7%;
        height: 68%;
      }

      .room {
        position: absolute;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 14px;
        color: var(--text);
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.05), transparent 44%),
          rgba(9, 18, 24, 0.92);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          0 18px 32px rgba(0, 0, 0, 0.24);
        text-align: left;
        transition:
          transform 150ms ease,
          border-color 150ms ease;
      }

      .room:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.18);
      }

      .room.active {
        border-color: rgba(255, 191, 105, 0.34);
        box-shadow:

          0 18px 32px rgba(0, 0, 0, 0.24),
          0 0 0 2px rgba(255, 191, 105, 0.12);
      }

      .room .room-kicker {
        color: var(--muted);
        font: 600 10px/1.2 var(--mono);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .room .room-title {
        margin-top: 10px;
        font: 700 14px/1.4 var(--pixel);
      }

      .room .room-copy {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .room .room-desks {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 10px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .desk {
        height: 16px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
      }

      .room.team {
        background:
          linear-gradient(
            135deg,
            color-mix(in srgb, var(--team-color) 18%, transparent),
            transparent 48%
          ),
          rgba(9, 18, 24, 0.94);
      }

      .room.hr {
        background:
          linear-gradient(135deg, rgba(125, 181, 255, 0.16), transparent 44%),
          rgba(9, 18, 24, 0.94);
      }

      .room.lounge {
        background:
          linear-gradient(135deg, rgba(87, 209, 183, 0.18), transparent 44%),
          rgba(9, 18, 24, 0.94);
      }

      .room.offsite {
        background:
          linear-gradient(135deg, rgba(255, 141, 123, 0.16), transparent 44%),

      }

      .room.ops {
        background:
          linear-gradient(135deg, rgba(125, 181, 255, 0.16), transparent 44%),

      .worker {
        position: absolute;
        width: 112px;
        border: 0;
        background: transparent;
        text-align: center;
        color: var(--text);
        transform: translate(-50%, -50%);
        transition:
          left 520ms ease,

      }

      .worker:hover {
        transform: translate(-50%, calc(-50% - 2px));
      }

      .worker.selected .worker-card {
        box-shadow:
          0 14px 24px rgba(0, 0, 0, 0.25),
          0 0 0 2px rgba(255, 191, 105, 0.2);
      }

      .worker-card {
        position: relative;
        width: 80px;
        margin: 0 auto;
        padding-top: 4px;
      }

      .worker-avatar {
        position: relative;
        width: 80px;
        height: 92px;
        margin: 0 auto;

      .worker-head {

      .worker-hair {
        position: absolute;
        top: 9px;
        left: 50%;
        width: 32px;

        margin-left: -16px;
        border-radius: 16px 16px 10px 10px;
        background: color-mix(in srgb, var(--worker-color) 54%, #182128);
      }

      .worker-body {
        position: absolute;
        left: 50%;
        top: 40px;

      .worker-legs {

      .worker-badge {

        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(7, 14, 18, 0.92);

        font: 700 10px/1 var(--pixel);

        align-items: center;
        justify-content: center;

      .worker-name {
        margin-top: 10px;
        font: 700 11px/1.4 var(--pixel);

      .worker-meta {

        font: 500 10px/1.4 var(--mono);

      .stage-footer {
        position: absolute;
        right: 16px;
        bottom: 16px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        z-index: 5;
        pointer-events: none;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
        z-index: 100;
        min-width: 260px;
        max-width: min(560px, calc(100vw - 40px));
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(7, 14, 18, 0.94);

        box-shadow: var(--shadow);
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 180ms ease,
          transform 180ms ease;
      }

      .toast.success {
        border-color: rgba(87, 209, 183, 0.34);
        background: rgba(8, 25, 21, 0.96);

      .toast.error {
        border-color: rgba(255, 141, 123, 0.36);

      }

      .toast.info {
        border-color: rgba(125, 181, 255, 0.34);
        background: rgba(10, 18, 31, 0.96);
      }

      .toast.visible {
        opacity: 1;
        transform: translateX(-50%) translateY(-2px);

      .service-log-grid {

      }

      .service-log-card {
        min-width: 0;
        padding: 12px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(3, 10, 14, 0.82);
      }

      .service-log-head {
        display: grid;
        gap: 4px;
        margin-bottom: 8px;
      }

      .service-log-title {
        font: 700 12px/1.3 var(--mono);
        color: var(--text);
      }

      .service-log-path {
        color: var(--muted);
        font: 500 11px/1.45 var(--mono);
        word-break: break-all;
      }

      .service-log-pre {
        min-height: 180px;
        max-height: 320px;
        margin: 0;
        padding: 10px;
        overflow: auto;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font: 500 11px/1.55 var(--mono);
        white-space: pre-wrap;
        word-break: break-word;
      }

      .empty {
        padding: 18px;
        border-radius: 18px;
        border: 1px dashed rgba(255, 255, 255, 0.12);
        color: var(--muted);
        text-align: center;
        line-height: 1.6;
      }

      @keyframes workerFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-3px);
        }
      }

      @media (max-width: 1100px) {
        .service-log-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 880px) {
        body {
          overflow: auto;
        }

        .app {
          height: auto;
          min-height: 100vh;
        }

        .office {
          height: 72vh;
        }

        .modal-card {
          width: min(100vw - 20px, 980px);
          height: min(92vh, 920px);
        }

        .field-grid {
          grid-template-columns: 1fr;
        }

        .detail-card {
          height: auto;
          overflow: visible;
        }

        .detail-shell,
        .detail-body {
          height: auto;
          min-height: 0;
          overflow: visible;
        }

        .detail-tabs {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <main class="stage-wrap">
        <div class="stage-header">
          <div class="stage-header-left">
            <div>
              <div class="stage-title" id="stage-title"></div>
              <div class="stage-copy" id="stage-copy"></div>
            </div>
          </div>
          <div class="stage-header-right" id="header-hud"></div>
        </div>
        <div class="office" id="office"></div>
      </main>
    </div>

    <div class="detail-modal" id="detail-modal" aria-hidden="true">
      <button
        type="button"
        class="modal-backdrop"
        data-action="close-modal"
        aria-label="관리 패널 닫기"
      ></button>
      <div class="modal-card" role="dialog" aria-modal="true">
        <div class="modal-bar">
          <button type="button" class="hud-chip-action" data-action="close-modal">
            닫기
          </button>
        </div>
        <div class="detail-card detail-panel" id="detail-panel"></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/vendor/phaser.min.js"></script>
    <script>
      const ui = {
        data: null,
        derived: emptyDerivedState(),
        detailMode: null,
        activeDesk: 'management',
        activeTab: 'team-management',
        selectedTeamId: null,
        selectedServiceId: null,
        selectedRoomId: null,
        selectedTeamChatServiceId: null,
        selectedLayoutTargetKey: null,
        modalOpen: false,
        chatHistory: [],
        chatLoading: false,
        messageSending: false,
        localBusyServiceIds: new Set(),
        dashboardPreview: {
          content: '',
          generatedAt: null,
          loading: false,
          error: '',
        },
        serviceLogs: {
          serviceId: null,
          loading: false,
          error: '',
          stdout: '',
          stderr: '',
          stdoutPath: '',
          stderrPath: '',
          loadedAt: null,
        },
        toastTimer: null,
        refreshTimer: null,
        mapVersion: null,
      };

      let officeGame = null;
      const TILED_OFFICE_MAP_KEY = 'hkclaw-office-map';
      const TILED_OFFICE_TILESET_KEY = 'rpg2000-office-tiles';
      const CANVAS_RENDER_RESOLUTION = Math.max(
        window.devicePixelRatio || 1,
        1,
      );
      const TEXT_RENDER_RESOLUTION = Math.max(
        Math.ceil((window.devicePixelRatio || 1) * 2),
        3,
      );

      function clampNumber(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      const TAB_DEFS = [
        { id: 'team-create', label: '주문 창구 추가', desk: 'management' },
        { id: 'team-management', label: '주문 창구 관리', desk: 'management' },
        { id: 'hiring', label: '직원 추가', desk: 'hr' },
        { id: 'employees', label: '직원 관리', desk: 'hr' },
      ];

      const COLOR_OPTIONS = [
        '#ffbf69',
        '#57d1b7',
        '#7db5ff',
        '#ff8d7b',
        '#b894ff',
        '#f2d58b',
      ];

      function emptyDerivedState() {
        return {
          services: [],
          counters: [],
          teams: [],
          channels: [],
          discordChannels: [],
          servicesById: new Map(),
          countersByJid: new Map(),
          teamsById: new Map(),
          channelsByJid: new Map(),
          nonDashboardServices: [],
          serviceCountersByServiceId: new Map(),
          serviceTeamsByServiceId: new Map(),
          teamChatServicesByTeamId: new Map(),
          teamLayoutTargetKeys: new Set(),
          runningServiceCount: 0,
          workingServiceCount: 0,
        };
      }

      function buildDerivedState(data) {
        if (!data) {
          return emptyDerivedState();
        }

        const services = data.services || [];
        const counters = data.counters || [];
        const teams = data.teams || [];
        const channels = data.channels || [];
        const servicesById = new Map(
          services.map((service) => [service.serviceId, service]),
        );
        const countersByJid = new Map(
          counters.map((counter) => [counter.jid, counter]),
        );
        const teamsById = new Map(teams.map((team) => [team.teamId, team]));
        const channelsByJid = new Map(
          channels.map((channel) => [channel.jid, channel]),
        );
        const discordChannels = channels.filter(
          (channel) => channel.channel === 'discord',
        );
        const nonDashboardServices = services.filter(
          (service) => service.role !== 'dashboard',
        );
        const serviceCountersByServiceId = new Map();
        const serviceTeamsByServiceId = new Map();
        const teamChatServicesByTeamId = new Map();

        counters.forEach((counter) => {
          const memberServiceIds = [
            ...new Set([
              ...(Array.isArray(counter.memberServiceIds)
                ? counter.memberServiceIds
                : []),
              ...((counter.assignments || [])
                .filter((assignment) => assignment.kind === 'group')
                .map((assignment) => assignment.serviceId) || []),
            ]),
          ];

          memberServiceIds.forEach((serviceId) => {
            const assignedCounters =
              serviceCountersByServiceId.get(serviceId) || [];
            assignedCounters.push(counter);
            serviceCountersByServiceId.set(serviceId, assignedCounters);
          });
        });

        teams.forEach((team) => {
          (Array.isArray(team.assignedServiceIds)
            ? team.assignedServiceIds
            : Array.isArray(team.memberServiceIds)
              ? team.memberServiceIds
            : []
          ).forEach((serviceId) => {
            const serviceTeams = serviceTeamsByServiceId.get(serviceId) || [];
            serviceTeams.push(team);
            serviceTeamsByServiceId.set(serviceId, serviceTeams);
          });
        });

        teams.forEach((team) => {
          const channelAssignments =
            channelsByJid.get(team.linkedJid || '')?.assignments || [];
          const assignedServiceIds = channelAssignments
            .filter((assignment) => assignment.kind === 'group')
            .map((assignment) => assignment.serviceId);
          const sourceServiceIds = assignedServiceIds.length
            ? assignedServiceIds
            : Array.isArray(team.assignedServiceIds)
              ? team.assignedServiceIds
              : Array.isArray(team.memberServiceIds)
                ? team.memberServiceIds
              : [];
          const seenServiceIds = new Set();
          const resolvedServices = [];

          sourceServiceIds.forEach((serviceId) => {
            if (seenServiceIds.has(serviceId)) return;
            seenServiceIds.add(serviceId);
            const service = servicesById.get(serviceId);
            if (service && service.role !== 'dashboard') {
              resolvedServices.push(service);
            }
          });

          teamChatServicesByTeamId.set(team.teamId, resolvedServices);
        });

        return {
          services,
          counters,
          teams,
          channels,
          discordChannels,
          servicesById,
          countersByJid,
          teamsById,
          channelsByJid,
          nonDashboardServices,
          serviceCountersByServiceId,
          serviceTeamsByServiceId,
          teamChatServicesByTeamId,
          teamLayoutTargetKeys: new Set(
            teams.map((team) => layoutTargetKey('team', team.teamId)),
          ),
          runningServiceCount: services.filter(
            (service) => service.runtime.running,
          ).length,
          workingServiceCount: services.filter(
            (service) => service.presence === 'working',
          ).length,
        };
      }

      function rebuildDerivedState() {
        ui.derived = buildDerivedState(ui.data);
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function shortTime(value) {
        if (!value) return 'unknown';
        try {
          return new Date(value).toLocaleTimeString('ko-KR', {
            hour: '2-digit',
            minute: '2-digit',
          });
        } catch {
          return value;
        }
      }

      function renderDashboardPreviewHtml(content) {
        const normalized = String(content || '')
          .replace(/\r\n/g, '\n')
          .trim();
        if (!normalized) {
          return '<div class="dashboard-preview is-empty">출력할 dashboard 내용이 아직 없습니다.</div>';
        }

        const parts = normalized.split(/```/);
        return `
          <div class="dashboard-preview">
            ${parts
              .map((part, index) =>
                index % 2 === 1
                  ? `<pre class="dashboard-preview-code">${escapeHtml(part.trim())}</pre>`
                  : part
                      .split(/\n{2,}/)
                      .map((block) => block.trim())
                      .filter(Boolean)
                      .map((block) => {
                        const escaped = escapeHtml(block)
                          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                          .replace(/\*(.+?)\*/g, '<em>$1</em>')
                          .replace(/_(.+?)_/g, '<em>$1</em>')
                          .replace(/\n/g, '<br />');
                        return `<p>${escaped}</p>`;
                      })
                      .join(''),
              )
              .join('')}
          </div>
        `;
      }

      function titleRole(role) {
        return (
          {
            normal: 'normal',
            dashboard: 'situation',
          }[role] || role
        );
      }

      function titlePresence(presence) {
        return (
          {
            offline: 'offline',
            resting: 'resting',
            working: 'working',
            monitoring: 'guarding',
          }[presence] || presence
        );
      }

      function compactRoleLabel(role) {
        return (
          {
            normal: 'norm',
            dashboard: 'guard',
          }[role] || role
        );
      }

      function compactPresenceLabel(presence) {
        return (
          {
            offline: 'off',
            resting: 'idle',
            working: 'work',
            monitoring: 'guard',
          }[presence] || presence
        );
      }

      function counterFlowLabel(flow) {
        return (
          {
            idle: '대기',
            'customer-arrived': '손님 도착',
            'order-taking': '주문 접수',
            cooking: '조리 중',
            'handoff-ready': '전달 준비',
            served: '응대 완료',
          }[flow] || flow
        );
      }

      function roleOptionLabel(role) {
        return (
          {
            normal: 'normal / 일반직원',
            dashboard: 'dashboard / 종합 상황실',
          }[role] || role
        );
      }

      function manageableServices() {
        return ui.derived?.services || [];
      }

      function renderChatMessages(emptyText) {
        if (ui.chatLoading) {
          return '<div class="empty">불러오는 중...</div>';
        }

        if (!ui.chatHistory.length) {
          return `<div class="empty">${escapeHtml(emptyText)}</div>`;
        }

        return ui.chatHistory
          .map(
            (message) => `
              <div class="bubble ${escapeHtml(message.role)}">
                <div class="bubble-meta">${escapeHtml(
                  [
                    message.role,
                    message.senderName,
                    shortTime(message.createdAt),
                  ]
                    .filter(Boolean)
                    .join(' · '),
                )}</div>
                <div class="bubble-text">${escapeHtml(message.content)}</div>
              </div>
            `,
          )
          .join('');
      }

      function secretPlaceholder(configured) {
        return configured ? 'configured' : 'unset';
      }

      function checkedAttr(value) {
        return value ? 'checked' : '';
      }

      function parseDiscordChannelInput(value) {
        const trimmed = String(value || '').trim();
        if (!trimmed) return null;
        if (/^\d+$/.test(trimmed)) return trimmed;

        const jidMatch = trimmed.match(/^dc:(\d+)$/);
        if (jidMatch) return jidMatch[1];

        const mentionMatch = trimmed.match(/^<#(\d+)>$/);
        if (mentionMatch) return mentionMatch[1];

        const urlMatch = trimmed.match(
          /(?:https?:\/\/)?(?:canary\.|ptb\.)?discord(?:app)?\.com\/channels\/\d+\/(\d+)/,
        );
        if (urlMatch) return urlMatch[1];

        return null;
      }

      function normalizeDiscordChannelInputValue(value, mode) {
        const channelId = parseDiscordChannelInput(value);
        if (!channelId) return null;
        return mode === 'jid' ? `dc:${channelId}` : channelId;
      }

      function discordChannelInputHelp(mode, required) {
        const accepted =
          mode === 'jid'
            ? '허용: dc:123, 123, <#123>, Discord 채널 URL'
            : '허용: 123, dc:123, <#123>, Discord 채널 URL';
        return required ? `필수 · ${accepted}` : accepted;
      }

      function applyDiscordChannelInputState(input) {
        if (!(input instanceof HTMLInputElement)) return;
        const mode =
          input.dataset.discordChannelInput === 'jid'
            ? 'jid'
            : input.dataset.discordChannelInput === 'channel-id'
              ? 'channel-id'
              : null;
        if (!mode) return;

        const hint = input
          .closest('.field')
          ?.querySelector('[data-channel-hint]');
        const trimmed = input.value.trim();
        const normalized = normalizeDiscordChannelInputValue(trimmed, mode);

        input.classList.remove('valid', 'invalid');
        if (!trimmed) {
          input.setCustomValidity('');
          if (hint) {
            hint.textContent = discordChannelInputHelp(mode, input.required);
            hint.className = 'input-hint';
          }
          return;
        }

        if (normalized) {
          input.setCustomValidity('');
          input.classList.add('valid');
          if (hint) {
            hint.textContent = `저장 시 ${normalized}`;
            hint.className = 'input-hint valid';
          }
          return;
        }

        input.setCustomValidity('Discord 채널 형식을 확인하세요.');
        input.classList.add('invalid');
        if (hint) {
          hint.textContent = `형식 인식 실패 · ${discordChannelInputHelp(
            mode,
            input.required,
          )}`;
          hint.className = 'input-hint error';
        }
      }

      function normalizeDiscordChannelInputElement(input) {
        if (!(input instanceof HTMLInputElement)) return;
        const mode =
          input.dataset.discordChannelInput === 'jid'
            ? 'jid'
            : input.dataset.discordChannelInput === 'channel-id'
              ? 'channel-id'
              : null;
        if (!mode) return;

        const normalized = normalizeDiscordChannelInputValue(input.value, mode);
        if (normalized) {
          input.value = normalized;
        }
        applyDiscordChannelInputState(input);
      }

      function syncDiscordChannelInputs(root = document) {
        root

      function syncOriginPanels(form) {
        if (!(form instanceof HTMLFormElement)) return;
        const selectedAgentType = String(
          form.querySelector('[name="agentType"]')?.value || '',
        );
        const agentType = [
          'claude-code',
          'codex',
          'gemini-cli',
          'local-llm',
        ].includes(selectedAgentType)
          ? selectedAgentType
          : 'claude-code';
        form.querySelectorAll('[data-origin-block]').forEach((block) => {
          block.classList.toggle(
            'is-hidden',
            block.dataset.originBlock !== agentType,
          );
        });
        const summary = form.querySelector('[data-origin-summary]');
        if (summary) {
          summary.value = originSummaryText(agentType);
        }
      }

      function syncRolePanels(form) {
        if (!(form instanceof HTMLFormElement)) return;
        const role =
          form.querySelector('[name="role"]')?.value === 'dashboard'
            ? 'dashboard'
            : 'normal';
        form.querySelectorAll('[data-role-block]').forEach((block) => {
          block.classList.toggle('is-hidden', block.dataset.roleBlock !== role);
        });
        form
          .querySelectorAll('[data-discord-channel-input="channel-id"]')
          .forEach((input) => {
            if (!(input instanceof HTMLInputElement)) return;
            input.required = role === 'dashboard';
            applyDiscordChannelInputState(input);
          });
      }

      async function api(path, options = {}) {
        const init = { ...options };
        if (init.body && !init.headers) {
          init.headers = { 'content-type': 'application/json' };
        }
        const response = await fetch(path, init);
        const payload = await response
          .json()
          .catch(() => ({ error: `HTTP ${response.status}` }));
        if (!response.ok) {
          throw new Error(payload.error || `HTTP ${response.status}`);
        }
        return payload;
      }

      function showToast(message, tone = 'info') {
        const el = document.getElementById('toast');
        el.textContent = message;
        el.classList.remove('success', 'error', 'info');
        el.classList.add(tone);
        el.classList.add('visible');
        if (ui.toastTimer) clearTimeout(ui.toastTimer);
        ui.toastTimer = setTimeout(() => {
          el.classList.remove('visible');
        }, 2600);
      }

      function buildServiceSaveToast(result, mode = 'update') {
        const prefix =
          mode === 'hire'
            ? '직원을 저장했습니다.'
            : '직원 설정을 저장했습니다.';
        if (result?.restartScheduled) {
          return `${prefix} 대상 서비스 재시작을 함께 적용했습니다. 반영까지 몇 초 걸릴 수 있습니다.`;
        }
        if (result?.runtime?.running) {
          return `${prefix} 실행 중 서비스 상태를 확인했습니다.`;
        }
        return `${prefix} 반영 상태는 아래 실행 정보에서 확인해 주세요.`;
      }

      function getSubmitBusyLabel(formId) {
        if (formId === 'chat-form' || formId === 'team-chat-form') {
          return '전송 중...';
        }
        return '저장 중...';
      }

      function setFormBusy(form, isBusy, submitter) {
        const buttons = Array.from(form.querySelectorAll('button'));
        buttons.forEach((button) => {
          if (!(button instanceof HTMLButtonElement)) return;
          if (!button.dataset.originalLabel) {
            button.dataset.originalLabel = button.textContent || '';
          }
          button.disabled = isBusy;
        });
        if (
          submitter instanceof HTMLButtonElement &&
          submitter.dataset.originalLabel
        ) {
          submitter.textContent = isBusy
            ? getSubmitBusyLabel(form.id)
            : submitter.dataset.originalLabel;
        }
      }

      function ensureSelection() {
        if (!ui.data) return;
        const derived = ui.derived || emptyDerivedState();

        if (!ui.selectedTeamId || !derived.teamsById.has(ui.selectedTeamId)) {
          ui.selectedTeamId = derived.teams[0]?.teamId || null;
        }

        const preferredService =
          serviceById(ui.selectedServiceId) ||
          derived.nonDashboardServices[0] ||
          derived.services[0] ||
          null;
        ui.selectedServiceId = preferredService?.serviceId || null;

        const preferredTeamService = teamChatTarget(ui.selectedTeamId);
        ui.selectedTeamChatServiceId = preferredTeamService?.serviceId || null;

        if (
          ui.selectedRoomId &&
          !['lounge', 'offsite', 'ops'].includes(ui.selectedRoomId)
        ) {
          ui.selectedRoomId = null;
        }

        if (
          ui.selectedLayoutTargetKey?.startsWith('team:') &&
          !derived.teamLayoutTargetKeys.has(ui.selectedLayoutTargetKey)
        ) {
          ui.selectedLayoutTargetKey = null;
        }
      }

      function destroyOfficeGame() {
        if (!officeGame) return;
        officeGame.resizeObserver?.disconnect?.();
        officeGame.game?.destroy?.(true);
        officeGame = null;
        const office = document.getElementById('office');
        if (office) {
          office.innerHTML = '';
        }
      }

      async function loadState(options = {}) {
        const payload = await api('/api/admin/state');
        const nextMapVersion = payload.map?.version || null;
        if (
          ui.mapVersion &&
          nextMapVersion &&
          ui.mapVersion !== nextMapVersion
        ) {
          destroyOfficeGame();
        }
        ui.mapVersion = nextMapVersion;
        ui.data = payload;
        rebuildDerivedState();
        ensureSelection();
        render();

        if (ui.detailMode === 'room' && ui.selectedRoomId === 'ops') {
          void loadDashboardPreview();
        }

        if (
          !options.skipChatSync &&
          ui.selectedTeamId &&
          teamChatTarget(ui.selectedTeamId)
        ) {
          await loadChatHistory(ui.selectedTeamId, true);
        }

        if (
          ui.activeDesk === 'hr' &&
          ui.activeTab === 'employees' &&
          ui.selectedServiceId &&
          ui.serviceLogs.serviceId !== ui.selectedServiceId
        ) {
          void loadServiceLogs(ui.selectedServiceId, true);
        }
      }

      async function loadChatHistory(teamId, silent = false) {
        const team = teamById(teamId);
        const target = teamChatTarget(teamId);
        if (!team || !team.linkedJid || !target) {
          ui.chatHistory = [];
          renderDetailPanel();
          return;
        }

        ui.chatLoading = true;
        if (!silent) {
          renderDetailPanel();
        }
        try {
          const payload = await api(
            `/api/admin/chat/history?teamId=${encodeURIComponent(team.teamId)}`,
          );
          if (ui.selectedTeamId === team.teamId) {
            ui.chatHistory = payload.history || [];
          }
        } catch (error) {
          showToast(error.message || '채팅 이력을 가져오지 못했습니다.', 'error');
        } finally {
          ui.chatLoading = false;
          renderDetailPanel();
        }
      }

      async function loadServiceLogs(serviceId, silent = false) {
        if (!serviceId) {
          ui.serviceLogs = {
            serviceId: null,
            loading: false,
            error: '',
            stdout: '',
            stderr: '',
            stdoutPath: '',
            stderrPath: '',
            loadedAt: null,
          };
          if (!silent) renderDetailPanel();
          return;
        }

        if (ui.serviceLogs.loading && ui.serviceLogs.serviceId === serviceId) {
          return;
        }

        ui.serviceLogs = {
          ...ui.serviceLogs,
          serviceId,
          loading: true,
          error: '',
        };
        if (!silent) {
          renderDetailPanel();
        }

        try {
          const payload = await api(
            `/api/admin/services/logs?serviceId=${encodeURIComponent(serviceId)}`,
          );
          if (ui.selectedServiceId === serviceId) {
            ui.serviceLogs = {
              serviceId,
              loading: false,
              error: '',
              stdout: String(payload.stdout || ''),
              stderr: String(payload.stderr || ''),
              stdoutPath: String(payload.stdoutPath || ''),
              stderrPath: String(payload.stderrPath || ''),
              loadedAt: payload.loadedAt || null,
            };
          }
        } catch (error) {
          if (ui.selectedServiceId === serviceId) {
            ui.serviceLogs = {
              ...ui.serviceLogs,
              serviceId,
              loading: false,
              error: error.message || '로그를 가져오지 못했습니다.',
            };
          }
          if (!silent) {
            showToast(error.message || '로그를 가져오지 못했습니다.', 'error');
          }
        } finally {
          if (ui.selectedServiceId === serviceId) {
            ui.serviceLogs.loading = false;
            if (ui.activeDesk === 'hr' && ui.activeTab === 'employees') {
              renderDetailPanel();
            }
          }
        }
      }

      function selectTab(tabId) {
        const tab = TAB_DEFS.find((entry) => entry.id === tabId);
        if (tab) {
          ui.activeDesk = tab.desk;
        }
        ui.activeTab = tabId;
        ui.detailMode = 'desk';
        ui.selectedRoomId = null;
        ui.modalOpen = true;
        render();
      }

      function closeDetailModal() {
        ui.modalOpen = false;
        renderDetailPanel();
      }

      function openDesk(desk, tabId) {
        const defaultTab = tabsForDesk(desk)[0]?.id || 'team-management';
        ui.detailMode = 'desk';
        ui.activeDesk = desk;
        ui.activeTab = tabId || defaultTab;
        ui.selectedRoomId = null;
        ui.modalOpen = true;
        render();
      }

      function openManagementDesk(tabId = 'team-management') {
        openDesk('management', tabId);
      }

      function openHrDesk(tabId = 'employees') {
        openDesk('hr', tabId);
      }

      function selectTeam(teamId) {
        if (isTeamLayoutMode()) {
          return;
        }
        ui.selectedTeamId = teamId;
        ui.detailMode = 'team';
        ui.selectedRoomId = null;
        ui.modalOpen = true;
        const target = teamChatTarget(teamId);
        if (target) {
          if (ui.selectedTeamChatServiceId !== target.serviceId) {
            ui.chatHistory = [];
          }
          ui.selectedTeamChatServiceId = target.serviceId;
        } else {
          ui.chatHistory = [];
        }
        render();
        if (target) {
          loadChatHistory(teamId);
        }
      }

      function manageTeam(teamId) {
        ui.selectedTeamId = teamId;
        ui.detailMode = 'desk';
        ui.activeDesk = 'management';
        ui.activeTab = 'team-management';
        ui.selectedRoomId = null;
        ui.modalOpen = true;
        render();
      }

      function selectService(serviceId) {
        ui.selectedServiceId = serviceId;

        ui.activeDesk = 'hr';
        ui.activeTab = 'employees';
        ui.selectedRoomId = null;
        ui.modalOpen = true;
        render();
        void loadServiceLogs(serviceId, true);

      function selectOperationalRoom(roomId) {
        ui.detailMode = 'room';
        ui.selectedRoomId = roomId;
        ui.modalOpen = true;
        render();
        if (roomId === 'ops') {
          void loadDashboardPreview();
