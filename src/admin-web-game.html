      async function loadDashboardPreview(force = false) {
        if (ui.dashboardPreview.loading) {
          return;
        }
        ui.dashboardPreview.loading = true;
        ui.dashboardPreview.error = '';
        if (ui.detailMode === 'room' && ui.selectedRoomId === 'ops') {
          renderDetailPanel();
        }
        try {
          const payload = await api(
            `/api/admin/dashboard-preview${force ? '?force=1' : ''}`,
          );
          ui.dashboardPreview.content = String(payload.content || '');
          ui.dashboardPreview.generatedAt = payload.generatedAt || null;
        } catch (error) {
          ui.dashboardPreview.error =
            error instanceof Error ? error.message : String(error);
        } finally {
          ui.dashboardPreview.loading = false;
          if (ui.detailMode === 'room' && ui.selectedRoomId === 'ops') {
            renderDetailPanel();
          }
        }
      }

      function getObjectProperty(object, name, fallback = '') {
        const entry = object?.properties?.find(
          (property) => property.name === name,
        );
        return entry?.value ?? fallback;
      }

      function getOfficeWorldSize(state) {
        return {
          width:
            state?.worldWidth ||
            state?.map?.widthInPixels ||
            state?.scene?.scale?.width ||
            960,
          height:
            state?.worldHeight ||
            state?.map?.heightInPixels ||
            state?.scene?.scale?.height ||
            576,
        };
      }

      function pixelRectToPercent(rect, worldWidth, worldHeight) {
        return {
          left: (rect.x / Math.max(worldWidth, 1)) * 100,
          top: (rect.y / Math.max(worldHeight, 1)) * 100,
          width: (rect.width / Math.max(worldWidth, 1)) * 100,
          height: (rect.height / Math.max(worldHeight, 1)) * 100,
        };
      }

      function pixelPointToPercent(point, worldWidth, worldHeight) {
        return {
          left: (point.x / Math.max(worldWidth, 1)) * 100,
          top: (point.y / Math.max(worldHeight, 1)) * 100,
        };
      }

      function percentToPixels(value, total) {
        return (Number(value) / 100) * Math.max(total, 1);
      }

      function pixelsToPercent(value, total) {
        return (Number(value) / Math.max(total, 1)) * 100;
      }

      function getTileGrid(layoutData) {
        const worldWidth = Math.max(Number(layoutData?.worldWidth) || 960, 1);
        const worldHeight = Math.max(Number(layoutData?.worldHeight) || 576, 1);
        const tileWidth = Math.max(Number(layoutData?.tileWidth) || 16, 1);
        const tileHeight = Math.max(Number(layoutData?.tileHeight) || 16, 1);
        return {
          worldWidth,
          worldHeight,
          tileWidth,
          tileHeight,
          tilesX: Math.max(Math.round(worldWidth / tileWidth), 1),
          tilesY: Math.max(Math.round(worldHeight / tileHeight), 1),
          stepX: pixelsToPercent(tileWidth, worldWidth),
          stepY: pixelsToPercent(tileHeight, worldHeight),
        };
      }

      function snapPixelsToGrid(value, tileSize) {
        return (
          Math.round(Number(value) / Math.max(tileSize, 1)) *
          Math.max(tileSize, 1)
        );
      }

      function snapLayoutPositionPercent(value, axis, layoutData) {
        const grid = getTileGrid(layoutData);
        const total = axis === 'x' ? grid.worldWidth : grid.worldHeight;
        const tile = axis === 'x' ? grid.tileWidth : grid.tileHeight;
        const snappedPixels = snapPixelsToGrid(
          percentToPixels(value, total),
          tile,
        );
        return clampNumber(pixelsToPercent(snappedPixels, total), 0, 100);
      }

      function snapLayoutSizePercent(value, axis, layoutData, origin = 0) {
        const grid = getTileGrid(layoutData);
        const total = axis === 'x' ? grid.worldWidth : grid.worldHeight;
        const tile = axis === 'x' ? grid.tileWidth : grid.tileHeight;
        const originPixels = percentToPixels(origin, total);
        const maxPixels = Math.max(total - originPixels, tile);
        const snappedPixels = snapPixelsToGrid(
          percentToPixels(value, total),
          tile,
        );
        const clampedPixels = clampNumber(snappedPixels, tile, maxPixels);
        return clampNumber(pixelsToPercent(clampedPixels, total), 0, 100);
      }

      function snapLayoutRectToGrid(rect, layoutData) {
        const left = snapLayoutPositionPercent(rect.left, 'x', layoutData);
        const top = snapLayoutPositionPercent(rect.top, 'y', layoutData);
        const width = snapLayoutSizePercent(rect.width, 'x', layoutData, left);
        const height = snapLayoutSizePercent(rect.height, 'y', layoutData, top);
        return {
          ...rect,
          left,
          top,
          width,
          height,
        };
      }

      function percentToTileUnits(value, axis, layoutData) {
        const grid = getTileGrid(layoutData);
        const total = axis === 'x' ? grid.worldWidth : grid.worldHeight;
        const tile = axis === 'x' ? grid.tileWidth : grid.tileHeight;
        const maxTiles = axis === 'x' ? grid.tilesX : grid.tilesY;
        const tiles = Math.round(
          percentToPixels(value, total) / Math.max(tile, 1),
        );
        return clampNumber(tiles, 0, maxTiles);
      }

      function tileUnitsToPercent(value, axis, layoutData) {
        const grid = getTileGrid(layoutData);
        const total = axis === 'x' ? grid.worldWidth : grid.worldHeight;
        const tile = axis === 'x' ? grid.tileWidth : grid.tileHeight;
        const tiles = Math.max(Math.round(Number(value) || 0), 0);
        return pixelsToPercent(tiles * tile, total);
      }

      function layoutRectToTileUnits(rect, layoutData) {
        return {
          left: percentToTileUnits(rect.left, 'x', layoutData),
          top: percentToTileUnits(rect.top, 'y', layoutData),
          width: Math.max(percentToTileUnits(rect.width, 'x', layoutData), 1),
          height: Math.max(percentToTileUnits(rect.height, 'y', layoutData), 1),
        };
      }

      function slotOrderValue(slotId) {
        const match = String(slotId || '').match(/(\d+)/);
        return match ? Number(match[1]) : Number.MAX_SAFE_INTEGER;
      }

      function average(values, fallback = 0) {
        if (!values.length) return fallback;
        return values.reduce((sum, value) => sum + value, 0) / values.length;
      }

      function compactRoomTitle(room) {
        if (room.kind === 'team') {
          const hashMatch = String(room.name || '').match(/#[^ ]+/);
          if (hashMatch) return hashMatch[0];
        }
        if (room.kind === 'counter') {
          const hashMatch = String(room.copy || '').match(/#[^ ]+/);
          if (hashMatch) return hashMatch[0];
        }
        const label = String(room.name || '')
          .replace(/^HKClaw\s+/i, '')
          .trim();
        return label.length > 18 ? `${label.slice(0, 17)}…` : label;
      }

      function compactRoomCopy(room) {
        if (room.kind === 'team') {
          return room.badge || 'No staff';
        }
        if (room.kind === 'counter') {
          return room.badge || 'Counter';
        }
        return room.copy || '';
      }

      function enhanceText(text, resolution = TEXT_RENDER_RESOLUTION) {
        if (typeof text?.setResolution === 'function') {
          text.setResolution(resolution);
        }
        if (typeof text?.setPadding === 'function') {
          text.setPadding(2, 1, 2, 2);
        }
        if (typeof text?.setShadow === 'function') {
          text.setShadow(0, 1, 'rgba(0,0,0,0.35)', 1, false, true);
        }
        return text;
      }

      function extractTiledLayoutData(state) {
        const map = state?.map;
        const { width: worldWidth, height: worldHeight } =
          getOfficeWorldSize(state);
        const tileWidth = Math.max(Number(map?.tileWidth) || 16, 1);
        const tileHeight = Math.max(Number(map?.tileHeight) || 16, 1);
        if (!map) {
          return {
            worldWidth,
            worldHeight,
            tileWidth,
            tileHeight,
            zones: [],
            teamSlots: [],
            anchors: {},
          };
        }

        const zones = (map.getObjectLayer('Zones')?.objects || [])
          .filter((object) => object.visible !== false)
          .map((object) => ({
            id: getObjectProperty(
              object,
              'roomId',
              object.name || object.type || 'zone',
            ),
            kind: getObjectProperty(
              object,
              'kind',
              object.type || object.name || 'zone',
            ),
            ...pixelRectToPercent(object, worldWidth, worldHeight),
          }));

        const teamSlots = (map.getObjectLayer('TeamSlots')?.objects || [])
          .filter((object) => object.visible !== false)
          .map((object) => ({
            slotId: getObjectProperty(
              object,
              'slotId',
              object.name || `slot-${object.id}`,
            ),
            ...pixelRectToPercent(object, worldWidth, worldHeight),
          }))
          .sort((left, right) => {
            const order =
              slotOrderValue(left.slotId) - slotOrderValue(right.slotId);
            if (order !== 0) return order;
            const row = left.top - right.top;
            if (Math.abs(row) > 0.25) return row;
            return left.left - right.left;
          });

        const anchors = Object.fromEntries(
          (map.getObjectLayer('Anchors')?.objects || [])
            .filter((object) => object.visible !== false)
            .map((object) => [
              getObjectProperty(
                object,
                'anchorId',
                object.name || `anchor-${object.id}`,
              ),
              pixelPointToPercent(object, worldWidth, worldHeight),
            ]),
        );

        return {
          worldWidth,
          worldHeight,
          tileWidth,
          tileHeight,
          zones,
          teamSlots,
          anchors,
        };
      }

      function buildFallbackTeamLayouts(teams, layoutData) {
        const layouts = [];
        if (!teams.length) return layouts;

        const cols = teams.length <= 2 ? 2 : 3;
        const rows = Math.ceil(teams.length / cols);
        const roomWidth = cols === 2 ? 22 : 16.5;
        const roomHeight = rows >= 3 ? 18 : 20;
        const gapX = cols === 2 ? 5 : 3.6;
        const gapY = 5;
        const totalWidth = cols * roomWidth + (cols - 1) * gapX;
        const totalHeight = rows * roomHeight + (rows - 1) * gapY;
        const startX = 50 - totalWidth / 2;
        const startY = 48 - totalHeight / 2;

        teams.forEach((team, index) => {
          const col = index % cols;
          const row = Math.floor(index / cols);
          const baseLayout = {
            teamId: team.teamId,
            left: startX + col * (roomWidth + gapX),
            top: startY + row * (roomHeight + gapY),
            width: roomWidth,
            height: roomHeight,
          };
          layouts.push(
            snapLayoutRectToGrid(
              {
                ...baseLayout,
                left:
                  typeof team.layoutLeft === 'number'
                    ? team.layoutLeft
                    : baseLayout.left,
                top:
                  typeof team.layoutTop === 'number'
                    ? team.layoutTop
                    : baseLayout.top,
                width:
                  typeof team.layoutWidth === 'number'
                    ? team.layoutWidth
                    : baseLayout.width,
                height:
                  typeof team.layoutHeight === 'number'
                    ? team.layoutHeight
                    : baseLayout.height,
              },
              layoutData,
            ),
          );
        });

        return layouts;
      }

      function buildTeamLayouts(teams, layoutData) {
        const tiledSlots = layoutData?.teamSlots || [];
        if (!tiledSlots.length) {
          return buildFallbackTeamLayouts(teams, layoutData);
        }
        const visibleTeams = teams.slice(0, tiledSlots.length);
        const layouts = visibleTeams.map((team, index) => {
          const slot = tiledSlots[index];
          return snapLayoutRectToGrid(
            {
              teamId: team.teamId,
              left:
                typeof team.layoutLeft === 'number'
                  ? team.layoutLeft
                  : slot.left,
              top:
                typeof team.layoutTop === 'number' ? team.layoutTop : slot.top,
              width:
                typeof team.layoutWidth === 'number'
                  ? team.layoutWidth
                  : slot.width,
              height:
                typeof team.layoutHeight === 'number'
                  ? team.layoutHeight
                  : slot.height,
              slotId: slot.slotId,
            },
            layoutData,
          );
        });

        if (teams.length <= visibleTeams.length) {
          return layouts;
        }

        const fallbackLayouts = buildFallbackTeamLayouts(
          teams.slice(visibleTeams.length),
          layoutData,
        );
        fallbackLayouts.forEach((layout, index) => {
          layouts.push({
            ...layout,
            teamId: teams[visibleTeams.length + index].teamId,
          });
        });
        return layouts;
      }

      function buildFallbackCounterLayouts(counters, layoutData) {
        return buildFallbackTeamLayouts(
          counters.map((counter) => ({
            teamId: counter.counterId,
            layoutLeft: counter.layoutLeft,
            layoutTop: counter.layoutTop,
            layoutWidth: counter.layoutWidth,
            layoutHeight: counter.layoutHeight,
          })),
          layoutData,
        ).map((layout) => ({
          ...layout,
          counterId: layout.teamId,
        }));
      }

      function buildCounterLayouts(counters, layoutData) {
        const tiledSlots = layoutData?.teamSlots || [];
        if (!tiledSlots.length) {
          return buildFallbackCounterLayouts(counters, layoutData);
        }
        const visibleCounters = counters.slice(0, tiledSlots.length);
        const layouts = visibleCounters.map((counter, index) => {
          const slot = tiledSlots[index];
          return snapLayoutRectToGrid(
            {
              counterId: counter.counterId,
              left:
                typeof counter.layoutLeft === 'number'
                  ? counter.layoutLeft
                  : slot.left,
              top:
                typeof counter.layoutTop === 'number'
                  ? counter.layoutTop
                  : slot.top,
              width:
                typeof counter.layoutWidth === 'number'
                  ? counter.layoutWidth
                  : slot.width,
              height:
                typeof counter.layoutHeight === 'number'
                  ? counter.layoutHeight
                  : slot.height,
              slotId: slot.slotId,
            },
            layoutData,
          );
        });

        if (counters.length <= visibleCounters.length) {
          return layouts;
        }

        const fallbackLayouts = buildFallbackCounterLayouts(
          counters.slice(visibleCounters.length),
          layoutData,
        );
        fallbackLayouts.forEach((layout, index) => {
          layouts.push({
            ...layout,
            counterId: counters[visibleCounters.length + index].counterId,
          });
        });
        return layouts;
      }

      function positionInRect(rect, index, total) {
        const cols = Math.max(1, Math.ceil(Math.sqrt(Math.max(total, 1))));
        const rows = Math.max(1, Math.ceil(total / cols));
        const col = index % cols;
        const row = Math.floor(index / cols);
        const padX = rect.width * 0.18;
        const padY = rect.height * 0.28;
        const usableWidth = Math.max(rect.width - padX * 2, 1);
        const usableHeight = Math.max(rect.height - padY * 2, 1);
        const x = rect.left + padX + usableWidth * ((col + 0.5) / cols);
        const y = rect.top + padY + usableHeight * ((row + 0.5) / rows);
        return { x, y };
      }

      function buildZoneRects(layoutData, roomLayouts = {}) {
        const savedRoomLayouts = roomLayouts || {};
        const applySavedLayout = (roomId, rect) => {
          const saved = savedRoomLayouts[roomId];
          return snapLayoutRectToGrid(
            {
              ...rect,
              left: typeof saved?.left === 'number' ? saved.left : rect.left,
              top: typeof saved?.top === 'number' ? saved.top : rect.top,
              width:
                typeof saved?.width === 'number' ? saved.width : rect.width,
              height:
                typeof saved?.height === 'number' ? saved.height : rect.height,
            },
            layoutData,
          );
        };
        const fallbackRects = {
          lounge: { left: 10, top: 13.9, width: 15, height: 19.4 },
          hr: { left: 10, top: 38.9, width: 15, height: 19.4 },
          management: { left: 75, top: 13.9, width: 15, height: 19.4 },
          ops: { left: 75, top: 38.9, width: 15, height: 19.4 },
          offsite: { left: 42.5, top: 63.9, width: 15, height: 19.4 },
        };
        Object.keys(fallbackRects).forEach((roomId) => {
          fallbackRects[roomId] = applySavedLayout(
            roomId,
            fallbackRects[roomId],
          );
        });
        const mergeRects = (leftRect, rightRect) => {
          if (!leftRect) return rightRect;
          if (!rightRect) return leftRect;

          const left = Math.min(leftRect.left, rightRect.left);
          const top = Math.min(leftRect.top, rightRect.top);
          const right = Math.max(
            leftRect.left + leftRect.width,
            rightRect.left + rightRect.width,
          );
          const bottom = Math.max(
            leftRect.top + leftRect.height,
            rightRect.top + rightRect.height,
          );
          return {
            left,
            top,
            width: right - left,
            height: bottom - top,
          };
        };
        const mergedZoneRects = {};
        (layoutData?.zones || []).forEach((zone) => {
          const roomId = normalizeRoomId(zone.id);
          if (!roomId) return;

          mergedZoneRects[roomId] = mergeRects(mergedZoneRects[roomId], {
            left: zone.left,
            top: zone.top,
            width: zone.width,
            height: zone.height,
          });
        });
        Object.entries(mergedZoneRects).forEach(([roomId, rect]) => {
          fallbackRects[roomId] = applySavedLayout(roomId, rect);
        });
        return fallbackRects;
      }

      function guardPostRect(zoneRects) {
        const base = zoneRects.ops || {
          left: 78,
          top: 70,
          width: 14,
          height: 14,
        };
        return {
          left: base.left + base.width * 0.24,
          top: base.top + base.height * 0.18,
          width: base.width * 0.48,
          height: base.height * 0.48,
        };
      }

      function buildWorkerPlacements(
        services,
        counters,
        counterLayouts,
        layoutContext,
      ) {
        const placements = [];
        const baseRects = layoutContext.zoneRects;
        const guardRect = guardPostRect(baseRects);
        const layoutByCounterId = new Map(
          counterLayouts.map((layout) => [layout.counterId, layout]),
        );
        const counterByJid = new Map(
          counters
            .filter((counter) => counter.jid)
            .map((counter) => [counter.jid, counter]),
        );
        const zoneBuckets = new Map();

        services.forEach((service) => {
          let zone = 'lounge';
          const assignedCounters = serviceCounters(service.serviceId);
          const preferredCounter =
            assignedCounters.find((counter) => counter.jid === service.currentJid) ||
            assignedCounters[0] ||
            null;

          if (service.role === 'dashboard') {
            zone = 'ops';
          } else if (ui.localBusyServiceIds.has(service.serviceId)) {
            zone = preferredCounter ? `counter:${preferredCounter.counterId}` : 'lounge';
          } else if (service.presence === 'offline') {
            zone = 'offsite';
          } else if (
            service.currentJid &&
            counterByJid.has(service.currentJid)
          ) {
            zone = `counter:${counterByJid.get(service.currentJid).counterId}`;
          } else if (service.presence === 'working') {
            zone = preferredCounter ? `counter:${preferredCounter.counterId}` : 'lounge';
          } else {
            zone = 'lounge';
          }

          if (!zoneBuckets.has(zone)) zoneBuckets.set(zone, []);
          zoneBuckets.get(zone).push(service);
        });

        zoneBuckets.forEach((bucket, zone) => {
          const rect = zone.startsWith('counter:')
            ? (() => {
                const counterId = zone.slice('counter:'.length);
                const layout = layoutByCounterId.get(counterId);
                return layout
                  ? {
                      left: layout.left + 1,
                      top: layout.top + 4,
                      width: layout.width - 2,
                      height: layout.height - 7,
                    }
                  : baseRects.hr;
              })()
            : zone === 'ops'
              ? guardRect
              : baseRects[zone] || baseRects.lounge;

          bucket.forEach((service, index) => {
            const point = positionInRect(rect, index, bucket.length);
            placements.push({
              service,
              left: point.x,
              top: point.y,
              zone,
            });
          });
        });

        return placements;
      }

      function getSpecialRooms(layoutData, zoneRects) {
        const metaByKind = {
          management: {
            name: 'Manager',
            copy: '주문 창구 설정',
          },
          hr: {
            name: 'Staff',
            copy: '직원 관리',
          },
          offsite: {
            name: 'Offsite',
            copy: 'Offsite',
          },
          lounge: {
            name: 'Break Lounge',
            copy: '휴게실',
          },
          ops: {
            name: 'Situation Room',
            copy: '종합 상황실',
          },
        };

        const zoneIds = (layoutData?.zones || []).length
          ? [
              ...new Set([
                ...(layoutData?.zones || []).map((zone) =>
                  normalizeRoomId(zone.id),
                ),
                ...Object.keys(zoneRects),
              ]),
            ]
          : Object.keys(zoneRects);
        return zoneIds.filter(Boolean).map((zoneId) => ({
          id: zoneId,
          kind: zoneId,
          name: roomLabel(zoneId),
          copy: metaByKind[zoneId]?.copy || '지원 공간',
          ...zoneRects[zoneId],
        }));
      }

      function hexToNumber(hex, fallback = 0xffffff) {
        if (!hex) return fallback;
        const normalized = String(hex).trim().replace(/^#/, '');
        const parsed = Number.parseInt(normalized, 16);
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      function buildOfficeSnapshot() {
        const teams = ui.data?.teams || [];
        const counters = ui.data?.counters || [];
        const services = ui.data?.services || [];
        const company = companySettings();
        const layoutData = officeGame?.mapLayout || null;
        const teamLayouts = buildTeamLayouts(teams, layoutData);
        const counterLayouts = buildCounterLayouts(counters, layoutData);
        const zoneRects = buildZoneRects(layoutData, company.roomLayouts || {});
        const transitAnchors = buildTransitAnchors(
          layoutData?.worldWidth || 960,
          layoutData?.worldHeight || 576,
          layoutData,
        );
        return {
          teams,
          teamLayouts,
          counters,
          counterLayouts,
          zoneRects,
          transitAnchors,
          workers: buildWorkerPlacements(services, counters, counterLayouts, {
            layoutData,
            zoneRects,
          }),
          specialRooms: getSpecialRooms(layoutData, zoneRects),
          generatedAt: ui.data?.generatedAt || '',
          worldWidth: layoutData?.worldWidth || 960,
          worldHeight: layoutData?.worldHeight || 576,
        };
      }

      function updateOfficeFooter(snapshot) {
        if (!officeGame?.footer) return;
        officeGame.footer.innerHTML = `
          <div class="hud-chip">Phaser 3.90.0</div>
          <div class="hud-chip">Tiled .tmj</div>
          <div class="hud-chip">Fast-food floor</div>
          <div class="hud-chip">${escapeHtml(snapshot.generatedAt || '')}</div>
        `;
      }

      function roomStyle(room) {
        if (room.kind === 'team') {
          return {
            fill: hexToNumber(room.color || '#ffbf69'),
            stroke: 0xffe3bf,
            alpha: room.active ? 0.14 : 0.08,
          };
        }
        if (room.kind === 'counter') {
          return {
            fill: hexToNumber(room.color || '#ffbf69'),
            stroke: 0xfff0d1,
            alpha: room.active ? 0.18 : 0.11,
          };
        }
        if (room.kind === 'management') {
          return { fill: 0xb894ff, stroke: 0xe2d5ff, alpha: 0.13 };
        }
        if (room.kind === 'hr') {
          return { fill: 0xffbf69, stroke: 0xffebc2, alpha: 0.14 };
        }
        if (room.kind === 'lounge') {
          return { fill: 0x57d1b7, stroke: 0xc8fff2, alpha: 0.12 };
        }
        if (room.kind === 'offsite') {
          return { fill: 0xff8d7b, stroke: 0xffd3cc, alpha: 0.1 };
        }
        return { fill: 0x8bb6ff, stroke: 0xd9e6ff, alpha: 0.1 };
      }

      function pctRect(layout, width, height) {
        return {
          x: (layout.left / 100) * width,
          y: (layout.top / 100) * height,
          width: (layout.width / 100) * width,
          height: (layout.height / 100) * height,
        };
      }

      function pctPoint(left, top, width, height) {
        return {
          x: (left / 100) * width,
          y: (top / 100) * height,
        };
      }

      function buildTransitAnchors(width, height, layoutData) {
        const anchors = {
          center: pctPoint(50, 51, width, height),
          left: pctPoint(22.5, 50, width, height),
          right: pctPoint(77.5, 50, width, height),
        };

        Object.entries(layoutData?.anchors || {}).forEach(
          ([anchorId, point]) => {
            anchors[anchorId] = pctPoint(point.left, point.top, width, height);
          },
        );

        return anchors;
      }

      function routeAnchorForZone(zone, anchors) {
        if (zone === 'management' || zone === 'ops') return anchors.right;
        if (zone === 'lounge' || zone === 'hr') return anchors.left;
        if (zone === 'offsite') return anchors.center;
        return anchors.center;
      }

      function compactRoute(points) {
        const compacted = [];
        points.forEach((point) => {
          if (!point) return;
          const prev = compacted[compacted.length - 1];
          if (
            prev &&
            Math.abs(prev.x - point.x) < 2 &&
            Math.abs(prev.y - point.y) < 2
          ) {
            return;
          }
          compacted.push(point);
        });
        return compacted;
      }

      function fitOfficeCamera(state) {
        if (!state?.scene) return;
        const camera = state.scene.cameras.main;
        const { width, height } = getOfficeWorldSize(state);
        const viewportWidth = Math.max(state.scene.scale.width, 1);
        const viewportHeight = Math.max(state.scene.scale.height, 1);
        const zoom = clampNumber(
          Math.min(viewportWidth / width, viewportHeight / height),
          0.68,
          2.8,
        );
        camera.setZoom(zoom);
        camera.centerOn(width / 2, height / 2);
      }

      function ensureOfficeGame() {
        const office = document.getElementById('office');
        if (!office) return null;

        if (!window.Phaser) {
          office.innerHTML =
            '<div class="empty" style="position:absolute;inset:24px;display:grid;place-items:center;z-index:6;">Phaser failed to load.</div>';
          return null;
        }

        if (officeGame?.host === office) {
          return officeGame;
        }

        office.innerHTML =
          '<div class="stage-footer" id="office-footer"></div>';

        officeGame = {
          host: office,
          footer: office.querySelector('#office-footer'),
          scene: null,
          game: null,
          backdrop: null,
          roomLayer: null,
          workerLayer: null,
          roomActors: new Map(),
          workerActors: new Map(),
          snapshot: null,
          resizeObserver: null,
          map: null,
          mapLayout: null,
          mapLayers: [],
          worldWidth: 960,
          worldHeight: 576,
          topLabel: null,
          topCopy: null,
          cornerNote: null,
        };

        officeGame.game = new Phaser.Game({
          type: Phaser.AUTO,
          parent: office,
          width: Math.max(office.clientWidth, 640),
          height: Math.max(office.clientHeight, 420),
          transparent: true,
          resolution: CANVAS_RENDER_RESOLUTION,
          autoRound: false,
          roundPixels: false,
          pixelArt: false,
          antialias: true,
          scene: {
            preload() {
              const mapVersion = encodeURIComponent(ui.mapVersion || '0');
              const mapUrl =
                ui.data?.map?.tmjUrl ||
                '/admin-assets/hkclaw-office-rpg2000.tmj';
              const tilesetUrl =
                ui.data?.map?.tilesetUrl ||
                '/admin-assets/rpg2000-office-tiles.svg';
              this.load.tilemapTiledJSON(
                TILED_OFFICE_MAP_KEY,
                `${mapUrl}?v=${mapVersion}`,
              );
              this.load.image(
                TILED_OFFICE_TILESET_KEY,
                `${tilesetUrl}?v=${mapVersion}`,
              );
            },
            create() {
              officeGame.scene = this;
              officeGame.map = this.make.tilemap({ key: TILED_OFFICE_MAP_KEY });
              const tilesetName =
                ui.data?.map?.tilesetName || TILED_OFFICE_TILESET_KEY;
              const tileset = officeGame.map.addTilesetImage(
                tilesetName,
                TILED_OFFICE_TILESET_KEY,
              );
              officeGame.worldWidth =
                officeGame.map.widthInPixels || this.scale.width;
              officeGame.worldHeight =
                officeGame.map.heightInPixels || this.scale.height;
              this.cameras.main.setBackgroundColor('#10191f');
              this.cameras.main.setBounds(
                0,
                0,
                officeGame.worldWidth,
                officeGame.worldHeight,
              );
              this.cameras.main.roundPixels = false;

              officeGame.mapLayers = [];
              ['Ground', 'Carpet', 'Walls', 'Decor'].forEach(
                (layerName, index) => {
                  const layer = officeGame.map.createLayer(
                    layerName,
                    tileset,
                    0,
                    0,
                  );
                  if (!layer) return;
                  layer.setDepth(index * 8);
                  officeGame.mapLayers.push(layer);
                },
              );

              officeGame.backdrop = this.add
                .graphics()
                .setScrollFactor(0)
                .setDepth(90);
              officeGame.roomLayer = this.add.container(0, 0).setDepth(110);
              officeGame.workerLayer = this.add.container(0, 0).setDepth(140);
              officeGame.mapLayout = extractTiledLayoutData(officeGame);
              fitOfficeCamera(officeGame);
              syncOfficeGame();
            },
          },
        });

        const resize = () => {
          if (!officeGame?.game || !officeGame?.scene) return;
          const width = Math.max(office.clientWidth, 640);
          const height = Math.max(office.clientHeight, 420);
          officeGame.game.scale.resize(width, height);
          fitOfficeCamera(officeGame);
          syncOfficeGame();
        };

        officeGame.resizeObserver = new ResizeObserver(() => resize());
        officeGame.resizeObserver.observe(office);

        return officeGame;
      }

        graphics.fillStyle(0x18212a, 0.88);
        graphics.fillRect(0, 0, width, 58);
        graphics.fillStyle(0x11171c, 0.82);
        graphics.fillRect(0, height - 22, width, 22);
        graphics.lineStyle(4, 0xe9d6af, 0.14);
        graphics.strokeRect(10, 10, width - 20, height - 20);
        graphics.lineStyle(2, 0x3e4d59, 0.6);
        graphics.strokeRect(18, 18, width - 36, height - 36);

        for (let y = 0; y < height; y += 4) {

          state.cornerNote = null;
        }

      function buildRoomActorId(room) {
        if (room.teamTargetId) return `team:${room.teamTargetId}`;

        return [
          room.kind,
          room.id,
          room.name || '',
          room.copy || '',
          room.badge || '',
          room.color || '',
          room.left,

            style.stroke,

          );

          .rectangle(

            5,

            Math.max(rect.height - 10, 24),
            0x000000,
            0.06,
          )

        const plaqueWidth = clampNumber(rect.width - 20, 94, 156);
        const plaqueShadow = scene.add
          .rectangle(14, 12, plaqueWidth, 42, 0x000000, 0.32)

        const plaque = scene.add
          .rectangle(10, 8, plaqueWidth, 42, 0x18212a, 0.96)

        const title = enhanceText(

            fontSize: '14px',
            fontStyle: '700',
            color: '#f6efdf',

          }),

        const copy = enhanceText(

            fontSize: '10px',
            color: '#9ab2bb',
            wordWrap: { width: Math.max(plaqueWidth - 36, 64) },

        const kindBadgeBg = scene.add
          .rectangle(plaqueWidth - 18, 21, 28, 14, style.fill, 0.22)

        const badge = enhanceText(

            .text(

                fontSize: '8px',
                color: '#dce9f3',
              },
            )
            .setOrigin(0.5, 0),
        );
        const props = [];
        if (room.kind === 'hr') {
          props.push(
            scene.add
              .rectangle(24, rect.height - 20, 22, 10, 0x6a4a2f, 0.95)
              .setOrigin(0.5),
            scene.add
              .rectangle(24, rect.height - 26, 14, 8, 0xffe7a6, 0.95)
              .setOrigin(0.5),
            scene.add
              .rectangle(44, rect.height - 24, 10, 14, 0x24475a, 0.9)
              .setOrigin(0.5),
          );
        }
        if (room.kind === 'management') {
          props.push(
            scene.add
              .rectangle(
                rect.width / 2,
                rect.height - 18,
                34,
                10,
                0x46385f,
                0.96,
              )
              .setOrigin(0.5),
            scene.add
              .rectangle(
                rect.width / 2 - 4,
                rect.height - 27,
                14,
                8,
                0xc5b0ff,
                0.55,
              )
              .setOrigin(0.5),
            scene.add
              .ellipse(
                rect.width / 2 + 14,
                rect.height - 24,
                10,
                10,
                0xffbf69,
                0.96,
              )
              .setOrigin(0.5),
            scene.add
              .rectangle(
                rect.width / 2 + 20,
                rect.height - 18,
                4,
                10,
                0x2a2334,
                0.94,
              )
              .setOrigin(0.5),
          );
        }
        if (room.kind === 'ops') {
          props.push(
            scene.add
              .rectangle(
                rect.width / 2,
                rect.height - 20,
                36,
                8,
                0x2a3f54,
                0.96,
              )
              .setOrigin(0.5),
            scene.add
              .rectangle(
                rect.width / 2,
                rect.height - 28,
                18,
                10,
                0x8aaefc,
                0.42,
              )
              .setOrigin(0.5),
          );
        }
        const doorGlow = scene.add
          .rectangle(
            rect.width / 2,
            rect.height - 10,
            32,
            6,
            style.stroke,
            0.16,
          )
          .setOrigin(0.5);
        const layoutTargetKind = room.teamTargetId
          ? 'team'
          : room.roomTargetId
            ? 'room'
            : null;
        const layoutTargetId = room.teamTargetId || room.roomTargetId || null;
        const isLayoutTarget = Boolean(layoutTargetKind && layoutTargetId);
        const tileGrid = getTileGrid(state.mapLayout);
        let movedDuringDrag = false;
        let dragSaveTicket = 0;

        container.on('pointerdown', () => {
          if (isTeamLayoutMode() && isLayoutTarget) {
            ui.selectedLayoutTargetKey = layoutTargetKey(
              layoutTargetKind,
              layoutTargetId,
            );
            renderDetailPanel();
            return;
          }
          onSelect();
        });
        container.on('pointerover', () => {
          bg.setStrokeStyle(2, 0xffefcf, 0.96);
          plaque.setStrokeStyle(2, 0xffefcf, 0.9);
        });
        container.on('pointerout', () => {
          bg.setStrokeStyle(
            room.active ? 2 : 1,
            style.stroke,
            room.active ? 0.9 : 0.45,
          );
          plaque.setStrokeStyle(2, style.stroke, room.active ? 0.92 : 0.6);
        });

        if (isLayoutTarget) {
          scene.input.setDraggable(container);
          container.on('dragstart', () => {
            if (!isTeamLayoutMode()) {
              return;
            }
            ui.selectedLayoutTargetKey = layoutTargetKey(
              layoutTargetKind,
              layoutTargetId,
            );
            renderDetailPanel();
            movedDuringDrag = false;
            container.setDepth(190);
            bg.setStrokeStyle(2, 0xffefcf, 1);
            plaque.setStrokeStyle(2, 0xffefcf, 1);
          });
          container.on('drag', (_pointer, dragX, dragY) => {
            if (!isTeamLayoutMode()) {
              return;
            }
            const snappedX = snapPixelsToGrid(dragX, tileGrid.tileWidth);
            const snappedY = snapPixelsToGrid(dragY, tileGrid.tileHeight);
            const nextX = clampNumber(
              snappedX,
              0,
              Math.max(width - rect.width, 0),
            );
            const nextY = clampNumber(
              snappedY,
              0,
              Math.max(height - rect.height, 0),
            );
            container.setPosition(nextX, nextY);
            movedDuringDrag = true;
          });
          container.on('dragend', async () => {
            if (!isTeamLayoutMode()) {
              container.setDepth(110);
              return;
            }
            container.setDepth(110);
            bg.setStrokeStyle(
              room.active ? 2 : 1,
              style.stroke,
              room.active ? 0.9 : 0.45,
            );
            plaque.setStrokeStyle(2, style.stroke, room.active ? 0.92 : 0.6);
            if (!movedDuringDrag || !layoutTargetId) {
              return;
            }
            const ticket = ++dragSaveTicket;
            const left = clampNumber(
              pixelsToPercent(
                snapPixelsToGrid(container.x, tileGrid.tileWidth),
                Math.max(width, 1),
              ),
              0,
              100,
            );
            const top = clampNumber(
              pixelsToPercent(
                snapPixelsToGrid(container.y, tileGrid.tileHeight),
                Math.max(height, 1),
              ),
              0,
              100,
            );
            try {
              await api(
                room.teamTargetId
                  ? '/api/admin/teams/layout'
                  : '/api/admin/rooms/layout',
                {
                  method: 'POST',
                  body: JSON.stringify(
                    room.teamTargetId
                      ? {
                          teamId: room.teamTargetId,
                          left,
                          top,
                        }
                      : {
                          roomId: room.roomTargetId,
                          left,
                          top,
                        },
                  ),
                },
              );
              if (ticket === dragSaveTicket) {
                showToast('위치 저장', 'success');
                await loadState({ skipChatSync: true });
              }
            } catch (error) {
              showToast(error.message || '위치 저장 실패', 'error');
              await loadState({ skipChatSync: true });
            }
          });
        }

        let pulseTween = null;
        if (room.pulse) {
          pulseTween = scene.tweens.add({
            targets: [doorGlow, plaque],
            alpha: { from: 0.16, to: 0.34 },
            yoyo: true,
            repeat: -1,
            duration: 620,
            ease: 'Sine.inOut',
          });
        }

        container.add([
          bg,
          innerFrame,
          plaqueShadow,
          plaque,
          title,
          copy,
          kindBadgeBg,
          badge,
          ...props,
          doorGlow,
        ]);
        state.roomLayer.add(container);
        return {
          actorId,
          renderKey,
          destroy() {
            pulseTween?.stop();
            container.destroy();
          },
        };
      }

      function reconcileRoomActors(state, roomSpecs) {
        const nextActors = new Map();

        roomSpecs.forEach((spec) => {
          const existing = state.roomActors.get(spec.actorId);
          if (existing && existing.renderKey === spec.renderKey) {
            nextActors.set(spec.actorId, existing);
            return;
          }

          existing?.destroy();
          const actor = createRoomActor(
            state,
            spec.room,
            spec.onSelect,
            spec.actorId,
            spec.renderKey,
          );
          nextActors.set(spec.actorId, actor);
        });

        state.roomActors.forEach((actor, actorId) => {
          if (nextActors.has(actorId)) return;
          actor.destroy();
        });

        state.roomActors = nextActors;
      }

            .setOrigin(0.5, 0),

        const meta = enhanceText(

            .text(0, 38, '', {

      function syncWorkerInteractivity(
        actor,
        interactive = !isTeamLayoutMode(),
      ) {
        if (!actor?.hit?.input) {
          return;
        }

        actor.hit.input.enabled = interactive;
        if (!interactive) {
          actor.root.setScale(1);
        }
      }

      function buildWorkerStyleKey(service) {
        return [
          service.assistantName,
          service.presence,
          service.role,
          service.agentType,
          service.serviceId === ui.selectedServiceId ? '1' : '0',
          isTeamLayoutMode() ? '0' : '1',
        ].join('|');
      }

      function styleWorkerActor(actor, service) {
        const styleKey = buildWorkerStyleKey(service);
        if (actor.lastStyleKey === styleKey) {
          return;
        }
        actor.lastStyleKey = styleKey;
        const selected = service.serviceId === ui.selectedServiceId;
        const interactive = !isTeamLayoutMode();
        const color = hexToNumber(workerColor(service));
        actor.bodyParts.forEach((part) => part.setFillStyle(color, 1));
        actor.name.setText(service.assistantName);
        actor.meta.setText(
          `${compactPresenceLabel(service.presence)} · ${compactRoleLabel(service.role)}`,
        );
        actor.card.setStrokeStyle(
          selected ? 2 : 1,
          selected ? 0xffbf69 : 0xcfe1ff,
          selected ? 1 : 0.36,
        );
        syncWorkerInteractivity(actor, interactive);
      }

      function buildWorkerPlacementKey(placement) {
        return [placement.zone, placement.left, placement.top].join('|');
      }

      function routeWorkerToPlacement(state, actor, placement) {
        const placementKey = buildWorkerPlacementKey(placement);
        if (actor.initialized && actor.lastPlacementKey === placementKey) {
          return;
        }
        const scene = state.scene;
        const { width, height } = getOfficeWorldSize(state);
        const destination = pctPoint(
          placement.left,
          placement.top,
          width,
          height,
        );

        if (!actor.initialized) {
          actor.root.setPosition(destination.x, destination.y);
          actor.initialized = true;
          actor.currentLeft = placement.left;
          actor.currentTop = placement.top;
          actor.currentZone = placement.zone;
          actor.lastPlacementKey = placementKey;
          actor.root.setDepth(Math.round(destination.y));
          return;
        }

        const from = { x: actor.root.x, y: actor.root.y };
        const distance = Phaser.Math.Distance.Between(
          from.x,
          from.y,
          destination.x,
          destination.y,
        );
        if (distance < 8 && actor.currentZone === placement.zone) {
          actor.currentLeft = placement.left;
          actor.currentTop = placement.top;
          actor.lastPlacementKey = placementKey;
          return;
        }

        const anchor = routeAnchorForZone(
          placement.zone,
          state.snapshot?.transitAnchors ||
            buildTransitAnchors(width, height, state.mapLayout),
        );
        const points = compactRoute([
          { x: from.x, y: anchor.y },
          anchor,
          { x: destination.x, y: anchor.y },
          destination,
        ]);

        scene.tweens.killTweensOf(actor.root);
        actor.root.setDepth(Math.round(destination.y));
        actor.currentLeft = placement.left;
        actor.currentTop = placement.top;
        actor.currentZone = placement.zone;
        actor.lastPlacementKey = placementKey;

        const runStep = (index) => {
          const point = points[index];
          if (!point) return;
          scene.tweens.add({
            targets: actor.root,
            x: point.x,
            y: point.y,
            duration: clampNumber(
              Phaser.Math.Distance.Between(
                actor.root.x,
                actor.root.y,
                point.x,
                point.y,
              ) * 2.1,
              140,
              420,
            ),
            ease: index === points.length - 1 ? 'Quad.out' : 'Linear',
            onUpdate: () => {
              actor.root.setDepth(Math.round(actor.root.y));
            },
            onComplete: () => runStep(index + 1),
          });
        };
        runStep(0);
      }

      function syncOfficeGame() {
        const state = ensureOfficeGame();
        if (!state || !state.scene || !ui.data) return;

        const snapshot = buildOfficeSnapshot();
        state.snapshot = snapshot;
        updateOfficeFooter(snapshot);
        drawOfficeBackdrop(state, snapshot);
        const zoneCounts = snapshot.workers.reduce((acc, worker) => {
          acc[worker.zone] = (acc[worker.zone] || 0) + 1;
          return acc;
        }, {});
        const roomSpecs = [];

        snapshot.specialRooms.forEach((room) => {
          const nextRoom = {
            ...room,
            badge: `${room.kind} · ${zoneCounts[room.id] || 0}`,
            active: isTeamLayoutMode()
              ? ui.selectedLayoutTargetKey === layoutTargetKey('room', room.id)
              : (ui.detailMode === 'desk' &&
                  ((room.id === 'management' &&
                    ui.activeDesk === 'management') ||
                    (room.id === 'hr' && ui.activeDesk === 'hr'))) ||
                (ui.detailMode === 'room' && ui.selectedRoomId === room.id),
            pulse:
              room.id === 'management' ||
              room.id === 'hr' ||
              (zoneCounts[room.id] || 0) > 0,
            roomTargetId: room.id,
          };
          roomSpecs.push({
            actorId: buildRoomActorId(nextRoom),
            renderKey: buildRoomActorRenderKey(nextRoom),
            room: nextRoom,
            onSelect: () => {
              if (room.id === 'management') {
                openManagementDesk('team-management');
                return;
              }
              if (room.id === 'hr') {
                openHrDesk('employees');
                return;
              }
              if (
                room.id === 'lounge' ||
                room.id === 'offsite' ||
                room.id === 'ops'
              ) {
                selectOperationalRoom(room.id);
              }
            },
          });
        });

        snapshot.counterLayouts.forEach((layout) => {
          const counter = (snapshot.counters || []).find(
            (entry) => entry.counterId === layout.counterId,
          );
          if (!counter) return;
          const nextRoom = {
            ...layout,
            kind: 'counter',
            name: counter.stationName,
            copy:
              displayLinkedChannelName(
                counter.name,
                counter.jid,
              ) || '채널 미연결',
            color: counter.color,
            active:
              counter.teamId &&
              isTeamLayoutMode()
                ? ui.selectedLayoutTargetKey ===
                  layoutTargetKey('team', counter.teamId)
                : counter.teamId
                  ? ui.detailMode === 'team' &&
                    counter.teamId === ui.selectedTeamId
                  : false,
            badge: `${(Array.isArray(counter.assignedServiceIds)
              ? counter.assignedServiceIds.length
              : counter.memberServiceIds.length)} assigned · ${counterFlowLabel(
              counter.customerFlow,
            )}`,
            pulse:
              counter.customerFlow !== 'idle' ||
              counter.activeServiceIds.length > 0,
            teamTargetId: counter.teamId,
          };
          roomSpecs.push({
            actorId: buildRoomActorId(nextRoom),
            renderKey: buildRoomActorRenderKey(nextRoom),
            room: nextRoom,
            onSelect: () => {
              if (counter.teamId) {
                selectTeam(counter.teamId);
                return;
              }
              openManagementDesk('team-create');
            },
          });
        });

        reconcileRoomActors(state, roomSpecs);

        const nextIds = new Set(
          snapshot.workers.map((worker) => worker.service.serviceId),
        );
        snapshot.workers.forEach((placement) => {
          const serviceId = placement.service.serviceId;
          const actor =
            state.workerActors.get(serviceId) ||
            createWorkerActor(state, serviceId);
          styleWorkerActor(actor, placement.service);
          routeWorkerToPlacement(state, actor, placement);
        });

        [...state.workerActors.keys()].forEach((serviceId) => {
          if (nextIds.has(serviceId)) return;
          const actor = state.workerActors.get(serviceId);
          actor?.bobTween?.stop();
          actor?.root?.destroy();
          state.workerActors.delete(serviceId);
        });
      }

      function compactDiscordChannelLabel(name) {
        const trimmed = String(name || '').trim();
        if (!trimmed) return '';
        if (/^discord\s+#/i.test(trimmed)) {
          return trimmed.replace(/^discord\s+/i, '').trim();
        }
        if (trimmed.includes('#')) {
          return `#${trimmed.split('#').pop().trim()}`;
        }
        return trimmed.startsWith('#') ? trimmed : `#${trimmed}`;
      }

      function displayLinkedChannelName(name, jid) {
        const trimmed = String(name || '').trim();
        if (!trimmed) {
          return String(jid || '').trim();
        }
        if (String(jid || '').startsWith('dc:')) {
          return compactDiscordChannelLabel(trimmed);
        }
        return trimmed;
      }

      }

      function describeServiceRuntime(service) {
        const runtime = service?.runtime || {};
        const mode = runtime.running ? 'running' : 'stopped';
        const active = runtime.activeState || 'unknown';
        const sub = runtime.subState || 'unknown';
        return `${mode} · ${active}/${sub}`;
      }

      function renderDeleteServiceButton(service) {
        if (
          !service ||
          service.source === 'primary' ||
          service.serviceId === ui.data?.currentServiceId
        ) {
          return '';
        }
        return `<button type="button" class="danger" data-action="delete-service" data-service-id="${escapeHtml(
          service.serviceId,
        )}">직원 삭제</button>`;
      }

      function renderServiceControlButtons(service, options = {}) {
        if (!service) return '';
        const includeDelete = options.includeDelete === true;
        return `
          <button type="button" class="secondary" data-action="service-action" data-service-id="${escapeHtml(
            service.serviceId,
          )}" data-command="restart">재시작</button>
          <button type="button" class="secondary" data-action="service-action" data-service-id="${escapeHtml(
            service.serviceId,
          )}" data-command="start">시작</button>
          <button type="button" class="danger" data-action="service-action" data-service-id="${escapeHtml(
            service.serviceId,
          )}" data-command="stop">정지</button>
          ${includeDelete ? renderDeleteServiceButton(service) : ''}
        `;
      }

                <div class="note">${escapeHtml(counterNames)}</div>

                <div class="note">직원 설정 저장 후에는 서비스 재시작이 필요합니다. 이 화면은 저장 시 재시작도 함께 시도하지만, 토큰이나 모델 변경 후 반영이 늦으면 위 재시작 버튼을 다시 눌러 주세요.</div>
                <div class="button-row">
                  ${renderServiceControlButtons(selectedService)}

                <div class="field-grid">
                  <div class="field">
                    <label>직원 이름</label>
                    <input name="assistantName" value="${escapeHtml(
                      selectedService.assistantName,
                    )}" required />
                  </div>
                  <div class="field">
                    <label>직원 ID</label>
                    <input name="serviceId" value="${escapeHtml(
                      selectedService.serviceId,
                    )}" readonly />
                  </div>
                </div>
                <div class="field-grid">
                  <div class="field">
                    <label>출신</label>
                    ${renderAgentTypeSelect(selectedService.agentType)}
                  </div>
                  <div class="field">
                    <label>직원 역할</label>
                    ${renderRoleSelect(selectedService.role || 'normal')}
                  </div>
                </div>
                <div class="field-grid">
                  <div class="field ${
                    selectedService.role === 'dashboard' ? '' : 'is-hidden'
                  }" data-role-block="dashboard">
                    <label>Status Channel ID</label>
                    <input
                      name="statusChannelId"
                      class="discord-channel-input"
                      data-discord-channel-input="channel-id"
                      value="${escapeHtml(selectedService.config.statusChannelId || '')}"
                    />
                    <div class="input-hint" data-channel-hint>필수 · 허용: 123, dc:123, <#123>, Discord 채널 URL</div>
                  </div>
                  <div class="field">
                    <label>Bot Token</label>
                    <input
                      name="discordBotToken"

                      value="${escapeHtml(selectedService.config.botTokenValue || '')}"

                </div>
                ${renderServiceOriginConfig({

                <div class="button-row">

        return `
          <div class="panel-head">
            <h2>직원 관리</h2>
          </div>
          <div class="stack">
            ${selectedService ? `${editForm}${employeeList}` : `${employeeList}${editForm}`}

            <div class="stack">

          return `
            <div class="stack">
              <div class="panel-head">
                <h2>${escapeHtml(options.title || '대화')}</h2>
                <p>${escapeHtml(options.copy || '종합 상황실 전용 역할입니다.')}</p>

              ${options.actionsHtml || ''}

                <textarea
                  name="message"

                ></textarea>
                <div class="button-row">
                  <button type="submit" ${ui.messageSending ? 'disabled' : ''}>메시지 전송</button>

                    ui.messageSending ? 'disabled' : ''
                  }>새로고침</button>
                </div>
              </form>

          </div>

      function renderTeamDetailPanel() {
        const selectedTeam = teamById(ui.selectedTeamId);
        if (!selectedTeam) {
          return `
            <div class="stack">
              <div class="panel-head">
                <h2>주문 창구 채팅</h2>
                <p>맵이나 목록에서 주문 창구를 고르세요.</p>
              </div>
              <div class="empty">주문 창구를 선택하면 채팅 이력이 열립니다.</div>
            </div>
          `;
        }

        const services = teamChatServices(selectedTeam.teamId);
        if (!selectedTeam.linkedJid) {
          return `
            <div class="stack">
              <div class="panel-head">
                <h2>${escapeHtml(selectedTeam.name)} 채팅</h2>
                <p>이 팀은 아직 디스코드 채널과 연결되지 않았습니다.</p>
              </div>
              <div class="empty">주문 창구 설정에서 디스코드 채널과 폴더를 먼저 지정하세요.</div>
            </div>
          `;
        }
        if (!services.length) {
          return `
            <div class="stack">
              <div class="panel-head">
                <h2>${escapeHtml(selectedTeam.name)} 채팅</h2>
                <p>${escapeHtml(
                  displayLinkedChannelName(
                    selectedTeam.linkedChannelName,
                    selectedTeam.linkedJid,
                  ) || 'Local counter',
                )}</p>
              </div>
              <div class="note">이 주문 창구에 배정된 직원이 아직 없습니다.</div>
              <div class="empty">주문 창구에 직원을 배정하면 여기서 바로 채팅 흐름을 볼 수 있습니다.</div>
            </div>
          `;
        }

        const activeTarget = teamChatTarget(selectedTeam.teamId) || services[0];
        const targetsHtml = `
          <div class="chat-targets">
            ${services
              .map((service) => {
                const active =
                  service.serviceId === activeTarget.serviceId ? 'active' : '';
                return `<button class="chat-target ${active}" data-action="select-team-chat" data-service-id="${escapeHtml(
                  service.serviceId,
                )}">${escapeHtml(service.assistantName)} · ${escapeHtml(titleRole(service.role))}</button>`;

        return renderServiceConversation(activeTarget, {
