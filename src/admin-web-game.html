<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Office Admin</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <style>
      :root {
        --bg-1: #08131a;
        --bg-2: #10222d;
        --bg-3: #183343;
        --panel: rgba(8, 17, 23, 0.88);
        --panel-2: rgba(12, 24, 32, 0.94);
        --line: rgba(255, 255, 255, 0.09);
        --line-strong: rgba(255, 255, 255, 0.16);
        --text: #f6efdf;
        --muted: #93aab0;
        --muted-strong: #bfd0d6;
        --gold: #ffbf69;
        --mint: #57d1b7;
        --blue: #7db5ff;
        --red: #ff8d7b;
        --purple: #b894ff;
        --sunrise: #ffd7a6;
        --pixel:
          ui-monospace, 'SFMono-Regular', 'SF Mono', 'Cascadia Mono',
          'Segoe UI Mono', 'Roboto Mono', Consolas, monospace;
        --sans:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic',
          'Noto Sans CJK KR', sans-serif;
        --service-sans:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic',
          'Noto Sans CJK KR', sans-serif;
        --mono:
          ui-monospace, 'SFMono-Regular', 'SF Mono', 'Cascadia Mono',
          'Segoe UI Mono', 'Roboto Mono', Consolas, monospace;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        position: relative;
        background:
          radial-gradient(
            circle at top,
            rgba(87, 209, 183, 0.14),
            transparent 26%
          ),
          radial-gradient(
            circle at 82% 12%,
            rgba(255, 191, 105, 0.14),
            transparent 24%
          ),
          linear-gradient(180deg, #142430 0%, #0d1a21 38%, #071017 100%);
        color: var(--text);
        font-family: var(--sans);
      }

      body {
        overflow: hidden;
      }

      body::before,
      body::after {
        content: '';
        position: fixed;
        inset: auto;
        width: 34vw;
        height: 34vw;
        border-radius: 999px;
        filter: blur(28px);
        opacity: 0.18;
        pointer-events: none;
        z-index: 0;
      }

      body::before {
        top: -10vw;
        left: -8vw;
        background: radial-gradient(circle, rgba(87, 209, 183, 0.72), transparent 66%);
      }

      body::after {
        right: -10vw;
        bottom: -12vw;
        background: radial-gradient(circle, rgba(255, 191, 105, 0.72), transparent 66%);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 420px;
        width: 100vw;
        height: 100vh;
        gap: 0;
        z-index: 1;
      }

      .sidebar {
        position: relative;
        display: flex;
        flex-direction: column;
        min-height: 0;
        padding: 10px 8px;
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 26%),
          var(--panel);
        backdrop-filter: blur(18px);
        overflow: hidden;
        transition:
          transform 180ms ease,
          opacity 180ms ease,
          padding 180ms ease,
          border-color 180ms ease;
      }

      .app.sidebar-collapsed .sidebar {
        transform: translateX(-100%);
        opacity: 0;
        pointer-events: none;
        padding: 0;
        border-right-color: transparent;
      }

      .sidebar::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            circle at top left,
            rgba(255, 191, 105, 0.08),
            transparent 28%
          ),
          radial-gradient(
            circle at bottom left,
            rgba(87, 209, 183, 0.06),
            transparent 28%
          );
        pointer-events: none;
      }

      .sidebar > * {
        position: relative;
      }

      .brand {
        padding: 12px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background:
          linear-gradient(135deg, rgba(255, 191, 105, 0.12), transparent 50%),
          rgba(255, 255, 255, 0.03);
        box-shadow: var(--shadow);
      }

      .brand-kicker {
        color: var(--gold);
        font: 700 11px/1.2 var(--pixel);
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .brand h1 {
        margin: 8px 0 5px;
        font: 700 18px/1.1 var(--pixel);
        color: var(--text);
        letter-spacing: 0.02em;
      }

      .brand p {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.35;
      }

      .tabs {
        display: grid;
        grid-template-columns: 1fr;
        gap: 4px;
        margin-top: 8px;
      }

      .tab {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 9px 8px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
        text-align: left;
        font: 700 10px/1.2 var(--pixel);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        transition:
          transform 140ms ease,
          border-color 140ms ease,
          color 140ms ease,
          background 140ms ease;
      }

      .tab:hover {
        transform: translateY(-1px);
      }

      .tab.active {
        color: #081118;
        border-color: rgba(255, 191, 105, 0.28);
        background: linear-gradient(135deg, var(--gold), #ffd59c);
      }

      .sidebar-panel {
        flex: 1 1 auto;
        min-height: 0;
        margin-top: 8px;
        padding: 10px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 24%),
          var(--panel-2);
        box-shadow: var(--shadow);
        overflow-y: auto;
        overflow-x: hidden;
        padding-bottom: 28px;
      }

      .panel-head h2 {
        margin: 0;
        font: 700 14px/1.2 var(--pixel);
      }

      .panel-head p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.35;
      }

      .stack {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .field label {
        color: var(--muted);
        font: 500 11px/1.2 var(--mono);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .check-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font: 500 11px/1.2 var(--mono);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .check-label input[type='checkbox'] {
        width: auto;
        margin: 0;
      }

      .is-hidden {
        display: none !important;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 10px 11px;
        background: rgba(4, 9, 13, 0.78);
        color: var(--text);
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      input[readonly] {
        opacity: 0.72;
      }

      .button-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 5px;
      }

      .button,
      button {
        border: 0;
        border-radius: 12px;
        padding: 10px 12px;
        background: linear-gradient(135deg, var(--gold), #ffd59c);
        color: #081118;
        font: 700 10px/1.2 var(--pixel);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        box-shadow: 0 10px 22px rgba(255, 191, 105, 0.2);
      }

      .button.secondary,
      button.secondary {
        background: rgba(255, 255, 255, 0.07);
        color: var(--text);
        box-shadow: none;
      }

      .button.danger,
      button.danger {
        background: linear-gradient(135deg, #ff8d7b, #ffc0b5);
        color: #190906;
      }

      .button.small,
      button.small {
        padding: 9px 11px;
        border-radius: 12px;
        font-size: 10px;
      }

      button:disabled {
        opacity: 0.55;
        cursor: wait;
      }

      .card-list {
        display: grid;
        gap: 6px;
      }

      .mini-card {
        display: grid;
        width: 100%;
        padding: 9px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.02);
        color: var(--text);
        font: inherit;
        text-align: left;
        box-shadow: none;
        transition:
          border-color 120ms ease,
          background 120ms ease;
      }

      .mini-card.active {
        border-color: rgba(255, 191, 105, 0.26);
        background: rgba(255, 191, 105, 0.06);
      }

      .mini-card-head {
        display: grid;
        gap: 6px;
        align-items: flex-start;
      }

      .mini-card-head .pill {
        justify-self: start;
      }

      .mini-card-title {
        margin: 0;
        font-weight: 700;
      }

      .mini-card-copy {
        margin-top: 3px;
        color: var(--muted);
        font-size: 10px;
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 8px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 26px;
        padding: 6px 9px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.07);
        color: var(--muted);
        font: 500 11px/1.1 var(--mono);
      }

      .pill.role-normal {
        background: rgba(255, 191, 105, 0.14);
        color: var(--gold);
      }

      .pill.role-dashboard {
        background: rgba(125, 181, 255, 0.15);
        color: var(--blue);
      }

      .pill.presence-offline {
        background: rgba(255, 141, 123, 0.15);
        color: var(--red);
      }

      .pill.presence-resting {
        background: rgba(87, 209, 183, 0.14);
        color: var(--mint);
      }

      .pill.presence-working {
        background: rgba(255, 191, 105, 0.15);
        color: var(--gold);
      }

      .pill.presence-monitoring {
        background: rgba(125, 181, 255, 0.14);
        color: var(--blue);
      }

      .note {
        padding: 10px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
      }

      .input-hint {
        color: var(--muted);
        font: 500 11px/1.45 var(--mono);
      }

      .input-hint.valid {
        color: var(--mint);
      }

      .input-hint.error {
        color: #ff8d7b;
      }

      .discord-channel-input.valid {
        border-color: rgba(88, 212, 186, 0.4);
      }

      .discord-channel-input.invalid {
        border-color: rgba(255, 141, 123, 0.65);
      }

      .assignment-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 9px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
      }

      .assignment-row strong {
        display: block;
      }

      .assignment-row span {
        color: var(--muted);
        font-size: 12px;
      }

      .chat-shell {
        display: grid;
        gap: 12px;
      }

      .chat-targets {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .chat-target {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 9px 10px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--muted);
        font: 600 11px/1.2 var(--mono);
        text-align: left;
      }

      .chat-target.active {
        color: #081118;
        border-color: rgba(255, 191, 105, 0.22);
        background: linear-gradient(135deg, var(--gold), #ffd59c);
      }

      .chat-log {
        min-height: 200px;
        max-height: 40vh;
        overflow: auto;
        display: grid;
        gap: 10px;
        padding: 10px;
        border-radius: 18px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 30%),
          rgba(4, 10, 14, 0.76);
        border: 1px solid var(--line);
      }

      .bubble {
        max-width: 92%;
        padding: 11px 12px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.06);
      }

      .bubble.user {
        margin-left: auto;
        background: rgba(255, 191, 105, 0.15);
      }

      .bubble.assistant {
        border-top-left-radius: 6px;
      }

      .bubble.error {
        border-top-left-radius: 6px;
        background: rgba(255, 141, 123, 0.14);
      }

      .bubble-meta {
        color: var(--muted);
        font: 500 10px/1.2 var(--mono);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .bubble-text {
        margin-top: 8px;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.65;
        font-size: 13px;
      }

      .chat-form {
        display: grid;
        gap: 10px;
      }

      .stage-wrap {
        position: relative;
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        height: 100vh;
        padding: 18px;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-gutter: stable;
      }

      .detail-panel {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        padding: 14px 14px 14px 0;
        overflow: hidden;
        font-family: var(--service-sans);
      }

      .detail-card {
        display: flex;
        flex-direction: column;
        min-height: 0;
        height: 100%;
        padding: 16px 16px 12px;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 24%),
          radial-gradient(circle at top right, rgba(125, 181, 255, 0.08), transparent 28%),
          var(--panel-2);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .detail-shell {
        display: flex;
        flex: 1 1 auto;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
        height: 100%;
      }

      .detail-tabs {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .detail-tab {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 11px 12px;
        background: rgba(255, 255, 255, 0.05);
        color: #d7e3ea;
        text-align: left;
        font: 700 13px/1.3 var(--service-sans);
        letter-spacing: 0;
        text-transform: none;
        box-shadow: none;
      }

      .detail-tab.active {
        color: #081118;
        border-color: rgba(255, 191, 105, 0.3);
        background: linear-gradient(135deg, var(--gold), #ffd59c);
      }

      .detail-header {
        display: grid;
        gap: 6px;
        padding: 4px 2px 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      }

      .detail-kicker {
        color: var(--gold);
        font: 700 12px/1.3 var(--service-sans);
        letter-spacing: 0.01em;
        text-transform: none;
      }

      .detail-title {
        font: 700 25px/1.15 var(--service-sans);
        letter-spacing: -0.03em;
      }

      .detail-copy {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .detail-body {
        display: grid;
        flex: 1 1 auto;
        gap: 12px;
        align-content: start;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding-right: 6px;
        padding-bottom: 10px;
        scrollbar-gutter: stable;
        overscroll-behavior: contain;
      }

      .detail-panel .panel-head h2 {
        font: 700 18px/1.3 var(--service-sans);
        letter-spacing: -0.02em;
      }

      .detail-panel .panel-head p {
        margin-top: 6px;
        font: 400 13px/1.5 var(--service-sans);
      }

      .detail-panel .field label,
      .detail-panel .check-label {
        color: #d4dde2;
        font: 600 12px/1.4 var(--service-sans);
        text-transform: none;
        letter-spacing: 0;
      }

      .detail-panel input,
      .detail-panel select,
      .detail-panel textarea {
        padding: 9px 11px;
        border-radius: 11px;
        font: 500 14px/1.45 var(--service-sans);
      }

      .detail-panel .button,
      .detail-panel button {
        border-radius: 12px;
        padding: 10px 12px;
        font: 700 13px/1.3 var(--service-sans);
        text-transform: none;
        letter-spacing: 0;
      }

      .detail-panel .button.small,
      .detail-panel button.small {
        font-size: 12px;
      }

      .detail-panel .mini-card {
        padding: 10px;
        border-radius: 12px;
      }

      .detail-panel .mini-card-title {
        font: 700 14px/1.35 var(--service-sans);
        letter-spacing: -0.01em;
      }

      .detail-panel .mini-card-copy,
      .detail-panel .note,
      .detail-panel .assignment-row span,
      .detail-panel .bubble-text {
        font: 400 13px/1.5 var(--service-sans);
      }

      .detail-panel .pill,
      .detail-panel .chat-target,
      .detail-panel .bubble-meta {
        font: 600 12px/1.3 var(--service-sans);
        letter-spacing: 0;
        text-transform: none;
      }

      .detail-panel .chat-log {
        min-height: 180px;
        max-height: min(34vh, 360px);
      }

      .detail-panel .chat-target {
        padding: 10px 11px;
      }

      .detail-panel code {
        font-family: var(--mono);
      }

      .dashboard-preview {
        padding: 12px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(2, 8, 12, 0.74);
        color: var(--text);
        font: 500 11px/1.55 var(--sans);
      }

      .dashboard-preview p {
        margin: 0;
      }

      .dashboard-preview p + p {
        margin-top: 10px;
      }

      .dashboard-preview strong {
        color: var(--text);
      }

      .dashboard-preview em {
        color: var(--muted);
        font-style: normal;
      }

      .dashboard-preview-code {
        margin: 10px 0 0;
        padding: 10px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font: 500 11px/1.55 var(--mono);
        overflow-x: auto;
        white-space: pre-wrap;
      }

      .dashboard-preview.is-empty {
        color: var(--muted);
      }

      .stage-header {
        position: relative;
        display: block;
        padding: 18px 20px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background:
          radial-gradient(circle at top left, rgba(87, 209, 183, 0.14), transparent 34%),
          linear-gradient(135deg, rgba(255, 191, 105, 0.08), transparent 54%),
          rgba(7, 14, 18, 0.84);
        box-shadow: var(--shadow);
        overflow: hidden;
        z-index: 3;
      }

      .stage-header::after {
        content: '';
        position: absolute;
        inset: auto -10% -55% auto;
        width: 320px;
        height: 320px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(125, 181, 255, 0.16), transparent 64%);
        pointer-events: none;
      }

      .stage-overview {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1.45fr) minmax(0, 1fr);
        gap: 14px;
        margin-top: 12px;
        z-index: 3;
      }

      .overview-card {
        min-width: 0;
        padding: 18px 20px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 28%),
          radial-gradient(circle at top right, rgba(255, 191, 105, 0.1), transparent 24%),
          rgba(8, 17, 23, 0.84);
        box-shadow: var(--shadow);
      }

      .overview-kicker {
        color: var(--muted);
        font: 600 11px/1.2 var(--mono);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .overview-title {
        margin-top: 8px;
        font: 700 26px/1.02 var(--service-sans);
        letter-spacing: -0.04em;
      }

      .overview-copy {
        margin-top: 8px;
        color: var(--muted);
        font: 400 14px/1.6 var(--service-sans);
      }

      .overview-ribbon {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 16px;
      }

      .overview-ribbon-card {
        padding: 12px 13px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
      }

      .overview-ribbon-label {
        color: var(--muted);
        font: 600 10px/1.2 var(--mono);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .overview-ribbon-value {
        margin-top: 8px;
        color: var(--muted-strong);
        font: 700 15px/1.2 var(--service-sans);
      }

      .overview-stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .overview-stat {
        position: relative;
        overflow: hidden;
        padding: 14px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 55%),
          rgba(255, 255, 255, 0.04);
      }

      .overview-stat::after {
        content: '';
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: 12px;
        height: 3px;

          radial-gradient(
            circle at top,
            rgba(255, 255, 255, 0.05),
            transparent 34%
          ),
          linear-gradient(180deg, #172b38 0%, #13222c 40%, #101922 100%);
        box-shadow: var(--shadow);
        z-index: 1;
      }

      .office canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        z-index: 1;
      }

      .office::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 34px 34px;
        opacity: 0.16;
        pointer-events: none;
      }

      .office::after {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            circle at 50% 50%,
            rgba(255, 191, 105, 0.06),
            transparent 28%
          ),
          radial-gradient(
            circle at 18% 78%,
            rgba(87, 209, 183, 0.08),
            transparent 24%
          ),
          radial-gradient(
            circle at 82% 22%,
            rgba(125, 181, 255, 0.08),
            transparent 24%
          );
        opacity: 0.45;
        pointer-events: none;
      }

      .walkway {
        position: absolute;
        border-radius: 24px;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.06),
            rgba(255, 255, 255, 0.02)
          ),
          rgba(255, 255, 255, 0.03);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .walkway.center {
        left: 26%;
        right: 26%;
        top: 46%;
        height: 10%;
      }

      .walkway.left {
        left: 19%;
        top: 16%;
        width: 7%;
        height: 68%;
      }

      .walkway.right {
        right: 19%;
        top: 16%;
        width: 7%;
        height: 68%;
      }

      .room {
        position: absolute;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 14px;
        color: var(--text);
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.05), transparent 44%),
          rgba(9, 18, 24, 0.92);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          0 18px 32px rgba(0, 0, 0, 0.24);
        text-align: left;
        transition:
          transform 150ms ease,
          border-color 150ms ease;
      }

      .room:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.18);
      }

      .room.active {
        border-color: rgba(255, 191, 105, 0.34);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          0 18px 32px rgba(0, 0, 0, 0.24),
          0 0 0 2px rgba(255, 191, 105, 0.12);
      }

      .room .room-kicker {
        color: var(--muted);
        font: 600 10px/1.2 var(--mono);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .room .room-title {
        margin-top: 10px;
        font: 700 14px/1.4 var(--pixel);
      }

      .room .room-copy {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .room .room-desks {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 10px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .desk {
        height: 16px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
      }

      .room.team {
        background:
          linear-gradient(
            135deg,
            color-mix(in srgb, var(--team-color) 18%, transparent),
            transparent 48%
          ),
          rgba(9, 18, 24, 0.94);
      }

      .room.hr {
        background:
          linear-gradient(135deg, rgba(125, 181, 255, 0.16), transparent 44%),
          rgba(9, 18, 24, 0.94);
      }

      .room.lounge {
        background:
          linear-gradient(135deg, rgba(87, 209, 183, 0.18), transparent 44%),
          rgba(9, 18, 24, 0.94);
      }

      .room.offsite {
        background:
          linear-gradient(135deg, rgba(255, 141, 123, 0.16), transparent 44%),
          rgba(9, 18, 24, 0.94);
      }

      .room.ops {
        background:
          linear-gradient(135deg, rgba(125, 181, 255, 0.16), transparent 44%),
          rgba(9, 18, 24, 0.94);
      }

      .worker {
        position: absolute;
        width: 112px;
        border: 0;
        background: transparent;
        text-align: center;
        color: var(--text);
        transform: translate(-50%, -50%);
        transition:
          left 520ms ease,
          top 520ms ease,
          transform 180ms ease;
      }

      .worker:hover {
        transform: translate(-50%, calc(-50% - 2px));
      }

      .worker.selected .worker-card {
        box-shadow:
          0 14px 24px rgba(0, 0, 0, 0.25),
          0 0 0 2px rgba(255, 191, 105, 0.2);
      }

      .worker-card {
        position: relative;
        width: 80px;
        margin: 0 auto;
        padding-top: 4px;
      }

      .worker-avatar {
        position: relative;
        width: 80px;
        height: 92px;
        margin: 0 auto;
        border-radius: 18px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 36%),
          rgba(7, 16, 20, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 14px 24px rgba(0, 0, 0, 0.25);
        animation: workerFloat 2.6s ease-in-out infinite;
      }

      .worker-head {
        position: absolute;
        top: 13px;
        left: 50%;
        width: 28px;
        height: 28px;
        margin-left: -14px;
        border-radius: 50%;
        background: #f2d1b0;
        box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.06);
      }

      .worker-hair {
        position: absolute;
        top: 9px;
        left: 50%;
        width: 32px;
        height: 15px;
        margin-left: -16px;
        border-radius: 16px 16px 10px 10px;
        background: color-mix(in srgb, var(--worker-color) 54%, #182128);
      }

      .worker-body {
        position: absolute;
        left: 50%;
        top: 40px;
        width: 38px;
        height: 28px;
        margin-left: -19px;
        border-radius: 12px 12px 10px 10px;
        background: var(--worker-color);
      }

      .worker-legs {
        position: absolute;
        left: 50%;
        top: 67px;
        width: 24px;
        height: 14px;
        margin-left: -12px;
        border-radius: 0 0 6px 6px;
        background: linear-gradient(
          90deg,
          #1e2b36 0 10px,
          transparent 10px 14px,
          #1e2b36 14px 24px
        );
      }

      .worker-badge {
        position: absolute;
        top: -6px;
        right: -6px;
        min-width: 28px;
        height: 28px;
        padding: 4px 6px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(7, 14, 18, 0.92);
        color: var(--worker-color);
        font: 700 10px/1 var(--pixel);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .worker-name {
        margin-top: 10px;
        font: 700 11px/1.4 var(--pixel);
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.22);
      }

      .worker-meta {
        margin-top: 5px;
        color: var(--muted);
        font: 500 10px/1.4 var(--mono);
      }

      .stage-footer {
        position: absolute;
        right: 16px;
        bottom: 16px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        z-index: 5;
        pointer-events: none;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
        z-index: 100;
        min-width: 260px;
        max-width: min(560px, calc(100vw - 40px));
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(7, 14, 18, 0.94);
        color: var(--text);
        box-shadow: var(--shadow);
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 180ms ease,
          transform 180ms ease;
      }

      .toast.success {
        border-color: rgba(87, 209, 183, 0.34);
        background: rgba(8, 25, 21, 0.96);
      }

      .toast.error {
        border-color: rgba(255, 141, 123, 0.36);
        background: rgba(33, 13, 11, 0.96);
      }

      .toast.info {
        border-color: rgba(125, 181, 255, 0.34);
        background: rgba(10, 18, 31, 0.96);
      }

      .toast.visible {
        opacity: 1;
        transform: translateX(-50%) translateY(-2px);
      }

      .service-log-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .service-log-card {
        min-width: 0;
        padding: 12px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(3, 10, 14, 0.82);
      }

      .service-log-head {
        display: grid;
        gap: 4px;
        margin-bottom: 8px;
      }

      .service-log-title {
        font: 700 12px/1.3 var(--mono);
        color: var(--text);
      }

      .service-log-path {
        color: var(--muted);
        font: 500 11px/1.45 var(--mono);
        word-break: break-all;
      }

      .service-log-pre {
        min-height: 180px;
        max-height: 320px;
        margin: 0;
        padding: 10px;
        overflow: auto;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font: 500 11px/1.55 var(--mono);
        white-space: pre-wrap;
        word-break: break-word;
      }

      .empty {
        padding: 18px;
        border-radius: 18px;
        border: 1px dashed rgba(255, 255, 255, 0.12);
        color: var(--muted);
        text-align: center;
        line-height: 1.6;
      }

      @keyframes workerFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-3px);
        }
      }

      @media (max-width: 1100px) {
        .app {
          grid-template-columns: minmax(0, 1fr) 380px;
        }

        .stage-header {
          display: block;
        }

        .stage-header-right {
          justify-content: flex-start;
          min-width: 0;
          width: 100%;
        }

        .stage-overview {
          grid-template-columns: 1fr;
        }

        .party-focus {
          grid-template-columns: 1fr;
        }

        .party-grid,
        .reserve-grid,
        .party-quick-grid,
        .preset-grid,
        .relic-summary,
        .relic-grid {
          grid-template-columns: 1fr;
        }

        .overview-ribbon {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .service-log-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 880px) {
        body {
          overflow: auto;
        }

        .app {
          grid-template-columns: 1fr;
          height: auto;
          min-height: 100vh;
        }

        .stage-wrap {
          height: auto;
          padding: 14px;
        }

        .office {
          height: 72vh;
        }

        .stage-header {
          padding: 16px;
          border-radius: 24px;
        }

        .overview-card {
          padding: 16px;
        }

        .overview-ribbon,
        .overview-stats {
          grid-template-columns: 1fr;
        }

        .preset-grid {
          grid-template-columns: 1fr;
        }

        .party-head,
        .rpg-panel-head,
        .mission-footer {
          flex-direction: column;
          align-items: flex-start;
        }

        .detail-panel {
          padding: 0 14px 14px;
          overflow: visible;
        }

        .field-grid {
          grid-template-columns: 1fr;
        }

        .detail-card {
          height: auto;
          overflow: visible;
        }

        .detail-shell,
        .detail-body {
          height: auto;
          min-height: 0;
          overflow: visible;
        }

        .detail-tabs {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .stage-title {
          font-size: 28px;
        }

        .stage-copy {
          font-size: 13px;
        }

        .overview-title {
          font-size: 24px;
        }

        .overview-stat-value {
          font-size: 24px;
        }

        .party-focus-title h3 {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <main class="stage-wrap">
        <div class="stage-header">
          <div class="stage-header-left">
            <div class="stage-header-copy">
              <div class="stage-kicker" id="stage-kicker">HKClaw Control Center</div>
              <div class="stage-title" id="stage-title"></div>
              <div class="stage-copy" id="stage-copy"></div>
            </div>
          </div>
          <div class="stage-header-right" id="header-hud"></div>
        </div>
        <div class="stage-overview" id="stage-overview"></div>
        <div class="office" id="office"></div>
      </main>

      <aside class="detail-panel">
        <div class="detail-card" id="detail-panel"></div>
      </aside>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/vendor/phaser.min.js"></script>
    <script>
      const ui = {
        data: null,
        derived: emptyDerivedState(),
        detailMode: 'team',
        activeDesk: 'management',
        activeTab: 'team-management',
        selectedTeamId: null,
        selectedServiceId: null,
        selectedTemperamentId: null,
        selectedRoomId: null,
        cameraMode: 'focus',
        cameraTargetKey: '',
        selectedTeamChatServiceId: null,
        selectedLayoutTargetKey: null,
        employeeFilterQuery: '',
        heroPartyServiceIds: [],
        heroPartyPresets: createDefaultPartyPresets(),
        heroCustomizations: {},
        campaignState: createDefaultCampaignState(),
        chatHistory: [],
        chatLoading: false,
        messageSending: false,
        localBusyServiceIds: new Set(),
        dashboardPreview: {
          content: '',
          generatedAt: null,
          loading: false,
          error: '',
        },
        serviceLogs: {
          serviceId: null,
          loading: false,
          error: '',
          stdout: '',
          stderr: '',
          stdoutPath: '',
          stderrPath: '',
          loadedAt: null,
        },
        toastTimer: null,
        refreshTimer: null,
        mapVersion: null,
      };

      let officeGame = null;
      const TILED_OFFICE_MAP_KEY = 'hkclaw-office-map';
      const TILED_OFFICE_TILESET_KEY = 'rpg2000-office-tiles';
      const CANVAS_RENDER_RESOLUTION = Math.max(
        window.devicePixelRatio || 1,
        1,
      );
      const TEXT_RENDER_RESOLUTION = Math.max(
        Math.ceil((window.devicePixelRatio || 1) * 2),
        3,
      );
      const PARTY_LIMIT = 4;
      const UI_PREFS_STORAGE_KEY = 'hkclaw-office-rpg-ui-v1';

      function createDefaultPartyPresets() {
        return [
          { slotId: 'alpha', name: 'Alpha Memory', serviceIds: [] },
          { slotId: 'bravo', name: 'Bravo Memory', serviceIds: [] },
          { slotId: 'crescent', name: 'Crescent Memory', serviceIds: [] },
        ];
      }

      function createDefaultRelicLoadouts() {
        return [
          {
            slotId: 'assault',
            name: 'Assault Memory',
            relicIds: [],
            savedAt: '',
          },
          {
            slotId: 'signal',
            name: 'Signal Memory',
            relicIds: [],
            savedAt: '',
          },
          {
            slotId: 'standby',
            name: 'Standby Memory',
            relicIds: [],
            savedAt: '',
          },
        ];
      }

      function normalizePartyPresets(input) {
        return createDefaultPartyPresets().map((preset, index) => {
          const entry = Array.isArray(input) ? input[index] : null;
          return {
            slotId: preset.slotId,
            name:
              entry && typeof entry.name === 'string' && entry.name.trim()
                ? entry.name.trim().slice(0, 32)
                : preset.name,
            serviceIds: Array.isArray(entry?.serviceIds)
              ? uniqueIds(entry.serviceIds.map((value) => String(value || ''))).slice(
                  0,
                  PARTY_LIMIT,
                )
              : [],
          };
        });
      }

      function normalizeRelicLoadouts(input, ownedRelicInventory = []) {
        const owned = new Set(ownedRelicInventory);
        return createDefaultRelicLoadouts().map((loadout, index) => {
          const entry = Array.isArray(input) ? input[index] : null;
          return {
            slotId: loadout.slotId,
            name:
              entry && typeof entry.name === 'string' && entry.name.trim()
                ? entry.name.trim().slice(0, 32)
                : loadout.name,
            relicIds: Array.isArray(entry?.relicIds)
              ? uniqueIds(
                  entry.relicIds
                    .map((value) => String(value || '').trim())
                    .filter((value) => owned.has(value)),
                ).slice(0, RELIC_EQUIP_LIMIT)
              : [],
            savedAt: String(entry?.savedAt || '').trim(),
          };
        });
      }

      function createDefaultCampaignState() {
        return {
          moraleBonus: 0,
          syncBonus: 0,
          threatDelta: 0,
          guildBonus: 0,
          completedObjectiveIds: [],
          activeObjectiveId: '',
          journal: [],
          relicInventory: [],
          equippedRelicIds: [],
          relicLoadouts: createDefaultRelicLoadouts(),
          raid: {
            activeEncounterId: '',
            bossHp: 0,
            bossMaxHp: 0,
            victories: 0,
            relicCharge: 0,
            pendingReward: '',
            lastOutcome: '',
            lastBossTitle: '',
          },
        };
      }

      function normalizeCampaignState(input) {
        const defaults = createDefaultCampaignState();
        const source = input && typeof input === 'object' ? input : {};
        const normalizedRelicInventory = Array.isArray(source.relicInventory)
          ? uniqueIds(
              source.relicInventory
                .map((value) => String(value || '').trim())
                .filter((value) => RAID_RELIC_IDS.has(value)),
            ).slice(0, RAID_RELIC_DEFS.length)
          : [];
        const normalizedEquippedRelicIds = Array.isArray(source.equippedRelicIds)
          ? uniqueIds(
              source.equippedRelicIds
                .map((value) => String(value || '').trim())
                .filter((value) => normalizedRelicInventory.includes(value)),
            ).slice(0, RELIC_EQUIP_LIMIT)
          : [];
        const normalizedRelicLoadouts = normalizeRelicLoadouts(
          source.relicLoadouts,
          normalizedRelicInventory,
        );
        return {
          moraleBonus: Number(source.moraleBonus) || 0,
          syncBonus: Number(source.syncBonus) || 0,
          threatDelta: Number(source.threatDelta) || 0,
          guildBonus: Number(source.guildBonus) || 0,
          completedObjectiveIds: Array.isArray(source.completedObjectiveIds)
            ? source.completedObjectiveIds
                .map((value) => String(value || '').trim())
                .filter(Boolean)
                .slice(0, 20)
            : [],
          activeObjectiveId: String(source.activeObjectiveId || '').trim(),
          journal: Array.isArray(source.journal)
            ? source.journal
                .map((entry) => ({
                  label: String(entry.label || '').trim(),
                  copy: String(entry.copy || '').trim(),
                  at: String(entry.at || '').trim(),
                }))
                .filter((entry) => entry.label && entry.copy)
                .slice(0, 12)
            : [],
          relicInventory: normalizedRelicInventory,
          equippedRelicIds: normalizedEquippedRelicIds,
          relicLoadouts: normalizedRelicLoadouts,
          raid: {
            ...defaults.raid,
            ...(source.raid && typeof source.raid === 'object'
              ? {
                  activeEncounterId: String(
                    source.raid.activeEncounterId || '',
                  ).trim(),
                  bossHp: Math.max(0, Number(source.raid.bossHp) || 0),
                  bossMaxHp: Math.max(0, Number(source.raid.bossMaxHp) || 0),
                  victories: Math.max(0, Number(source.raid.victories) || 0),
                  relicCharge: Math.max(
                    0,
                    Number(source.raid.relicCharge) || 0,
                  ),
                  pendingReward: String(source.raid.pendingReward || '').trim(),
                  lastOutcome: String(source.raid.lastOutcome || '').trim(),
                  lastBossTitle: String(source.raid.lastBossTitle || '').trim(),
                }
              : {}),
          },
        };
      }

      function clampNumber(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function uniqueIds(values) {
        const seen = new Set();
        return values.filter((value) => {
          const normalized = String(value || '').trim();
          if (!normalized || seen.has(normalized)) {
            return false;
          }
          seen.add(normalized);
          return true;
        });
      }

      function normalizeCameraMode(value) {
        return value === 'overview' ? 'overview' : 'focus';
      }

      function normalizeCameraTargetKey(value) {
        const raw = String(value || '').trim();
        return /^(service|team|room):.+/.test(raw) ? raw : '';
      }

      function loadUiPrefs() {
        try {
          const raw = window.localStorage?.getItem(UI_PREFS_STORAGE_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          ui.cameraMode = normalizeCameraMode(parsed?.cameraMode);
          ui.cameraTargetKey = normalizeCameraTargetKey(parsed?.cameraTargetKey);
          if (Array.isArray(parsed?.heroPartyServiceIds)) {
            ui.heroPartyServiceIds = uniqueIds(
              parsed.heroPartyServiceIds.map((value) => String(value || '')),
            ).slice(0, PARTY_LIMIT);
          }
          if (Array.isArray(parsed?.heroPartyPresets)) {
            ui.heroPartyPresets = normalizePartyPresets(parsed.heroPartyPresets);
          }
          if (parsed?.heroCustomizations && typeof parsed.heroCustomizations === 'object') {
            ui.heroCustomizations = Object.fromEntries(
              Object.entries(parsed.heroCustomizations)
                .map(([serviceId, value]) => {
                  if (!value || typeof value !== 'object') {
                    return null;
                  }
                  return [
                    String(serviceId || '').trim(),
                    {
                      alias: String(value.alias || '').trim(),
                      title: String(value.title || '').trim(),
                      formationRole: String(value.formationRole || '').trim(),
                      theme: String(value.theme || '').trim(),
                      motto: String(value.motto || '').trim(),
                    },
                  ];
                })
                .filter(Boolean),
            );
          }
          if (parsed?.campaignState && typeof parsed.campaignState === 'object') {
            ui.campaignState = normalizeCampaignState(parsed.campaignState);
          }
        } catch {
          ui.cameraMode = 'focus';
          ui.cameraTargetKey = '';
          ui.heroPartyServiceIds = [];
          ui.heroPartyPresets = createDefaultPartyPresets();
          ui.heroCustomizations = {};
          ui.campaignState = createDefaultCampaignState();
        }
      }

      function persistUiPrefs() {
        try {
          window.localStorage?.setItem(
            UI_PREFS_STORAGE_KEY,
            JSON.stringify({
              cameraMode: ui.cameraMode,
              cameraTargetKey: ui.cameraTargetKey,
              heroPartyServiceIds: ui.heroPartyServiceIds.slice(0, PARTY_LIMIT),
              heroPartyPresets: ui.heroPartyPresets,
              heroCustomizations: ui.heroCustomizations,
              campaignState: ui.campaignState,
            }),
          );
        } catch {}
      }

      loadUiPrefs();

      function buildDerivedState(data) {
        if (!data) {
          return emptyDerivedState();

        const services = data.services || [];
        const teams = data.teams || [];
        const channels = data.channels || [];
        const temperaments = data.temperaments || [];
        const servicesById = new Map(
          services.map((service) => [service.serviceId, service]),
        );
        const teamsById = new Map(teams.map((team) => [team.teamId, team]));
        const channelsByJid = new Map(
          channels.map((channel) => [channel.jid, channel]),
        );
        const temperamentsById = new Map(
          temperaments.map((entry) => [entry.temperamentId, entry]),
        );
        const discordChannels = channels.filter(
          (channel) => channel.channel === 'discord',
        );
        const nonDashboardServices = services.filter(
          (service) => service.role !== 'dashboard',
        );
        const serviceTeamsByServiceId = new Map();
        const teamChatServicesByTeamId = new Map();

        teams.forEach((team) => {
          (Array.isArray(team.memberServiceIds)
            ? team.memberServiceIds
            : []
          ).forEach((serviceId) => {
            const serviceTeams = serviceTeamsByServiceId.get(serviceId) || [];
            serviceTeams.push(team);
            serviceTeamsByServiceId.set(serviceId, serviceTeams);
          });
        });

        teams.forEach((team) => {
          const channelAssignments =
            channelsByJid.get(team.linkedJid || '')?.assignments || [];
          const assignedServiceIds = channelAssignments
            .filter((assignment) => assignment.kind === 'group')
            .map((assignment) => assignment.serviceId);
          const sourceServiceIds = assignedServiceIds.length
            ? assignedServiceIds
            : Array.isArray(team.memberServiceIds)
              ? team.memberServiceIds
              : [];
          const seenServiceIds = new Set();
          const resolvedServices = [];

          sourceServiceIds.forEach((serviceId) => {
            if (seenServiceIds.has(serviceId)) return;
            seenServiceIds.add(serviceId);
            const service = servicesById.get(serviceId);
            if (service && service.role !== 'dashboard') {
              resolvedServices.push(service);
            }
          });

          teamChatServicesByTeamId.set(team.teamId, resolvedServices);
        });

        return {
          services,
          teams,
          channels,
          temperaments,
          discordChannels,
          servicesById,
          teamsById,
          channelsByJid,
          temperamentsById,
          nonDashboardServices,

        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');

      function shortTime(value) {
        if (!value) return 'unknown';
        try {

        } catch {

      function renderDashboardPreviewHtml(content) {
        const normalized = String(content || '')
          .replace(/\r\n/g, '\n')
          .trim();
        if (!normalized) {
          return '<div class="dashboard-preview is-empty">출력할 dashboard 내용이 아직 없습니다.</div>';
        }

        const parts = normalized.split(/```/);
        return `
          <div class="dashboard-preview">
            ${parts
              .map((part, index) =>
                index % 2 === 1
                  ? `<pre class="dashboard-preview-code">${escapeHtml(part.trim())}</pre>`
                  : part
                      .split(/\n{2,}/)
                      .map((block) => block.trim())
                      .filter(Boolean)
                      .map((block) => {
                        const escaped = escapeHtml(block)
                          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                          .replace(/\*(.+?)\*/g, '<em>$1</em>')
                          .replace(/_(.+?)_/g, '<em>$1</em>')
                          .replace(/\n/g, '<br />');
                        return `<p>${escaped}</p>`;
                      })
                      .join(''),
              )
              .join('')}
          </div>
        `;
      }

      function parseDiscordChannelInput(value) {
        const trimmed = String(value || '').trim();
        if (!trimmed) return null;
        if (/^\d+$/.test(trimmed)) return trimmed;

        const jidMatch = trimmed.match(/^dc:(\d+)$/);
        if (jidMatch) return jidMatch[1];

        const mentionMatch = trimmed.match(/^<#(\d+)>$/);
        if (mentionMatch) return mentionMatch[1];

        const urlMatch = trimmed.match(
          /(?:https?:\/\/)?(?:canary\.|ptb\.)?discord(?:app)?\.com\/channels\/\d+\/(\d+)/,
        );
        if (urlMatch) return urlMatch[1];

        return null;
      }

      function normalizeDiscordChannelInputValue(value, mode) {
        const channelId = parseDiscordChannelInput(value);
        if (!channelId) return null;
        return mode === 'jid' ? `dc:${channelId}` : channelId;
      }

      function discordChannelInputHelp(mode, required) {
        const accepted =
          mode === 'jid'
            ? '허용: dc:123, 123, <#123>, Discord 채널 URL'
            : '허용: 123, dc:123, <#123>, Discord 채널 URL';
        return required ? `필수 · ${accepted}` : accepted;
      }

      function applyDiscordChannelInputState(input) {
        if (!(input instanceof HTMLInputElement)) return;
        const mode =
          input.dataset.discordChannelInput === 'jid'
            ? 'jid'
            : input.dataset.discordChannelInput === 'channel-id'
              ? 'channel-id'
              : null;
        if (!mode) return;

        const hint = input
          .closest('.field')
          ?.querySelector('[data-channel-hint]');
        const trimmed = input.value.trim();
        const normalized = normalizeDiscordChannelInputValue(trimmed, mode);

        input.classList.remove('valid', 'invalid');
        if (!trimmed) {
          input.setCustomValidity('');
          if (hint) {
            hint.textContent = discordChannelInputHelp(mode, input.required);
            hint.className = 'input-hint';
          }
          return;
        }

        if (normalized) {
          input.setCustomValidity('');
          input.classList.add('valid');
          if (hint) {
            hint.textContent = `저장 시 ${normalized}`;
            hint.className = 'input-hint valid';
          }
          return;
        }

        input.setCustomValidity('Discord 채널 형식을 확인하세요.');
        input.classList.add('invalid');
        if (hint) {
          hint.textContent = `형식 인식 실패 · ${discordChannelInputHelp(
            mode,
            input.required,
          )}`;
          hint.className = 'input-hint error';
        }
      }

      function normalizeDiscordChannelInputElement(input) {
        if (!(input instanceof HTMLInputElement)) return;
        const mode =
          input.dataset.discordChannelInput === 'jid'
            ? 'jid'
            : input.dataset.discordChannelInput === 'channel-id'
              ? 'channel-id'
              : null;
        if (!mode) return;

        const normalized = normalizeDiscordChannelInputValue(input.value, mode);
        if (normalized) {
          input.value = normalized;
        }
        applyDiscordChannelInputState(input);
      }

      function syncDiscordChannelInputs(root = document) {

      function equippedRelicBonuses() {
        return buildOwnedRelics().reduce(
          (totals, relic) => {
            if (!relic.equipped) return totals;
            totals.power += relic.power || 0;
            totals.morale += relic.morale || 0;
            totals.sync += relic.sync || 0;
            totals.threat += relic.threat || 0;
            totals.guild += relic.guild || 0;
            return totals;
          },
          {
            power: 0,
            morale: 0,
            sync: 0,
            threat: 0,
            guild: 0,
          },
        );
      }

      function formatRelicBonuses(relic) {
        return [
          relic.power ? `power +${relic.power}` : '',
          relic.sync ? `sync +${relic.sync}` : '',
          relic.morale ? `morale +${relic.morale}` : '',
          relic.guild ? `guild +${relic.guild}` : '',
          relic.threat
            ? `threat ${relic.threat > 0 ? '+' : ''}${relic.threat}`
            : '',
        ].filter(Boolean);
      }

      function formatRelicBonusSummary(relic) {
        return formatRelicBonuses(relic).join(' · ') || 'no bonus';
      }

        ui.campaignState = {
          ...ui.campaignState,
          journal: [

            ...campaignJournalEntries(),

      function partyCombatPower(profiles = partyServices().map((service) => buildHeroProfile(service))) {
        if (!profiles.length) return 0;
        const total = profiles.reduce(
          (sum, profile) =>
            sum +
            profile.level * 5 +
            profile.sync * 2 +
            profile.focus +
            profile.guard +
            profile.speed,
          0,
        );
        return Math.round(total / profiles.length + equippedRelicBonuses().power);
      }

      function buildHeroProfile(service) {
        const hash = hashText(
          `${service.serviceId}:${service.assistantName}:${service.agentType}:${service.role}`,
        );
        const customization = heroCustomizationFor(service.serviceId);
        const teamNames = serviceTeams(service.serviceId)
          .map((team) => team.name)
          .filter(Boolean);
        const palette = [
          '#ffbf69',
          '#57d1b7',
          '#7db5ff',
          '#ff8d7b',
          '#b894ff',
          '#f2d58b',
        ];
        const archetype =
          service.role === 'dashboard'
            ? {
                className: '전술 오라클',
                stance: '상황실에서 지휘와 감시 루틴을 관리합니다.',
              }
            : service.agentType === 'codex'
              ? service.presence === 'working'
                ? {
                    className: '룬 엔지니어',
                    stance: '코드와 도면을 뜯어고치며 돌파구를 만듭니다.',
                  }
                : {
                    className: '회로 스카우트',
                    stance: '탐색과 빠른 조사를 맡는 테크 정찰병입니다.',
                  }
              : service.presence === 'working'
                ? {
                    className: '대화 기사',
                    stance: '채널과 사용자를 직접 상대하는 현장형 운영자입니다.',
                  }
                : {
                    className: '기록 연금술사',
                    stance: '문맥과 기록을 정제해 다음 행동을 준비합니다.',
                  };
        const level =
          12 +
          (hash % 18) +
          (service.runtime?.running ? 3 : 0) +
          (service.presence === 'working' ? 2 : 0);
        const maxHp = 120 + level * 5 + (service.role === 'dashboard' ? 28 : 0);
        const hpRatio =
          {
            working: 0.82,
            monitoring: 0.74,
            resting: 0.94,
            offline: 0.58,
          }[service.presence] || 0.76;
        const maxMp =
          80 + level * 4 + (service.agentType === 'codex' ? 20 : 12);
        const mpRatio =
          {
            working: 0.58,
            monitoring: 0.82,
            resting: 0.93,
            offline: 0.48,
          }[service.presence] || 0.7;
        const sync = clampNumber(
          28 +
            (service.runtime?.running ? 22 : 0) +
            teamNames.length * 11 +
            (service.presence === 'working' ? 12 : 0) +
            (hash % 14),
          18,
          100,
        );
        const guard =
          20 + ((hash >> 3) % 18) + (service.role === 'dashboard' ? 8 : 0);
        const speed =
          18 + ((hash >> 7) % 18) + (service.presence === 'working' ? 5 : 0);
        const focus =
          24 +
          ((hash >> 11) % 18) +
          (service.agentType === 'codex' ? 6 : 2);
        const selected = service.serviceId === ui.selectedServiceId;
        const themeIndex = palette.findIndex(
          (color) => color === customization.theme,
        );
        const accentColor =
          themeIndex >= 0 ? palette[themeIndex] : palette[(hash >> 4) % palette.length];
        const formationRole =
          customization.formationRole || defaultFormationRole(service);
        const displayName = customization.alias || service.assistantName;
        const title = customization.title || '';
        const motto = customization.motto || archetype.stance;
        return {
          service,
          displayName,
          title,
          className: archetype.className,
          formationRole,
          formationRoleLabel: formationRoleLabel(formationRole),
          stance: motto,
          level,
          hp: Math.round(maxHp * hpRatio),
          maxHp,
          mp: Math.round(maxMp * mpRatio),
          maxMp,
          sync,
          guard,
          speed,
          focus,
          rank: ['S', 'A', 'A', 'B', 'B', 'C'][hash % 6],
          primaryColor: workerColor(service),
          accentColor,
          teamLabel: teamNames[0] || '무소속',
          extraTeamLabel:
            teamNames.length > 1 ? `+${teamNames.length - 1}` : '',
          statusLabel: presenceQuestLabel(service.presence),
          originLabel: originDisplayName(service.agentType),
          summary: `${service.serviceId} · ${originDisplayName(
            service.agentType,
          )} · ${presenceQuestLabel(service.presence)}`,
          tags: [
            service.role === 'dashboard' ? 'OPS' : 'FIELD',
            teamNames[0] || 'SOLO',
            formationRoleLabel(formationRole),
            service.runtime?.running ? 'LIVE' : 'CAMP',
          ],
          customization,
          selected,
        };
      }

      function buildCampaignSystems() {
        const derived = ui.derived || emptyDerivedState();
        const totalServices = Math.max(derived.services.length, 1);
        const monitoringCount = derived.services.filter(

        ).length;
        const restingCount = derived.services.filter(
          (service) =>
            service.presence === 'resting' || service.presence === 'offline',
        ).length;
        const state = ui.campaignState || {
          moraleBonus: 0,
          syncBonus: 0,
          threatDelta: 0,
          guildBonus: 0,
        };
        const relicBonus = equippedRelicBonuses();
        const ownedRelics = buildOwnedRelics();
        const equippedRelics = ownedRelics.filter((relic) => relic.equipped);
        const raid = raidState();
        return [
          {
            label: 'Morale',
            value: clampNumber(
              36 +

                derived.teams.length * 6 -
                restingCount * 10 +
                state.moraleBonus +

            ),
            copy: '현재 활동 인원과 팀 밀도에 따라 달라지는 파티 사기',
          },

              28 +
                derived.runningServiceCount * 16 +
                derived.temperaments.length * 8 +

              100,
            ),

          },

              18 +
                restingCount * 14 +

                monitoringCount * 6 +
                state.threatDelta +
                relicBonus.threat,
              6,
              100,
            ),
            copy: '대기 인원이 많고 빈 방이 생길수록 높아지는 리스크',
          },
          {
            label: 'Guild',
            value: clampNumber(
              20 +
                derived.teams.length * 18 +
                totalServices * 8 +
                state.guildBonus +
                relicBonus.guild,
              12,
              100,
            ),
            copy: '길드 규모와 배치 확장도를 보여주는 HQ 성장 수치',
          },
          {
            label: 'Relic',
            value: clampNumber(
              ownedRelics.length * 20 +
                equippedRelics.length * 18 +
                (raid.relicCharge || 0) * 14,
              0,
              100,
            ),
            copy: equippedRelics.length
              ? `${equippedRelics.map((relic) => relic.title).join(' · ')} 장착 · power +${relicBonus.power}`
              : '레이드 보상을 회수하면 영구 장비와 전력 보정이 열립니다.',
          },
        ];
      }

      function buildRaidEncounters() {
        const raid = raidState();
        const victories = raid.victories || 0;
        const partyPower = partyCombatPower();

        return RAID_ENCOUNTER_DEFS.map((encounter, index) => {
          const bossMaxHp = encounter.baseHp + victories * 36 + index * 24;
          const active = raid.activeEncounterId === encounter.id;
          const bossHp = active
            ? Math.max(raid.bossHp ?? bossMaxHp, 0)
            : bossMaxHp;
          const delta = partyPower - encounter.difficulty;
          const readiness =
            delta >= 40
              ? { label: 'favored', state: 'clear' }
              : delta >= 0
                ? { label: 'ready', state: 'progress' }
                : { label: 'risky', state: 'alert' };

          return {
            ...encounter,
            bossMaxHp,
            bossHp,
            active,
            cleared: active && bossHp <= 0,
            readinessLabel: readiness.label,
            state: readiness.state,
            partyPower,
          };
        });
      }

      function activeRaidEncounter() {
        const raid = raidState();
        return buildRaidEncounters().find(
          (encounter) => encounter.id === raid.activeEncounterId,
        ) || null;
      }

      function buildChronicleEntries(hero, focus) {
        const derived = ui.derived || emptyDerivedState();
        const reserveCount = reserveServices().length;
        const latestFocus = focus?.title || '오피스 전체';
        const raid = activeRaidEncounter();
        const raidProgress = raidState();
        const ownedRelics = buildOwnedRelics();
        const equippedRelics = ownedRelics.filter((relic) => relic.equipped);
        const relicBonus = equippedRelicBonuses();
        const savedRelicLoadouts = relicLoadouts().filter(
          (loadout) => loadout.savedAt,
        ).length;
        const baselineEntries = [
          {
            label: 'Focus',
            copy: `${latestFocus} 기준으로 전장을 훑고 있습니다.`,
          },
          hero
            ? {
                label: 'Hero',
                copy: `${hero.service.assistantName} · ${hero.className} · ${hero.statusLabel}`,
              }
            : null,
          {
            label: 'Field',
            copy: `작업 중 ${derived.workingServiceCount}명 · 경계 ${derived.services.filter((service) => service.presence === 'monitoring').length}명 · 대기 ${derived.services.filter((service) => service.presence !== 'working' && service.presence !== 'monitoring').length}명`,
          },
          {
            label: 'Reserve',
            copy:
              reserveCount > 0
                ? `예비 캐릭터 ${reserveCount}명을 언제든 파티에 편성할 수 있습니다.`
                : '현재 파티 외 예비 캐릭터는 없습니다.',
          },
          {
            label: 'Relic',
            copy: equippedRelics.length
              ? `${equippedRelics.map((relic) => relic.title).join(' · ')} 장착 중 · power +${relicBonus.power} · 충전 ${raidProgress.relicCharge}`
              : ownedRelics.length
                ? `보유 렐릭 ${ownedRelics.length}개 · 장착 슬롯 ${equippedRelics.length}/${RELIC_EQUIP_LIMIT} · 메모리 ${savedRelicLoadouts}/${relicLoadouts().length} · 충전 ${raidProgress.relicCharge}`
                : '아직 회수한 렐릭이 없습니다. 레이드 보상을 금고에 쌓아 장기 보정을 여세요.',
          },
          raid
            ? {
                label: 'Raid',
                copy:
                  raid.bossHp > 0
                    ? `${raid.title} 진행 중 · HP ${raid.bossHp}/${raid.bossMaxHp}`
                    : `${raid.title} 격파 완료 · ${raidProgress.pendingReward || raid.reward} 회수 대기`,
              }
            : {
                label: 'Raid',
                copy:
                  raidProgress.victories > 0
                    ? `레이드 승리 ${raidProgress.victories}회 · 렐릭 충전 ${raidProgress.relicCharge}`
                    : '아직 레이드가 시작되지 않았습니다. 파티를 저장하고 보스를 공략하세요.',
              },
        ].filter(Boolean);
        const journalEntries = campaignJournalEntries().map((entry) => ({
          label: entry.label,
          copy: `${entry.copy} · ${shortTime(entry.at)}`,
        }));
        return [...journalEntries, ...baselineEntries].slice(0, 8);
      }

              <span class="pill">${escapeHtml(relic.equipped ? 'equipped' : 'stored')}</span>
            </div>
            <p>${escapeHtml(relic.copy)}</p>
            <div class="relic-bonus-list">
              ${formatRelicBonuses(relic)

                    `<span class="relic-bonus">${escapeHtml(bonus)}</span>`,
                )

                class="secondary small"
                data-action="${escapeHtml(relic.equipped ? 'unequip-relic' : 'equip-relic')}"

              >
                ${escapeHtml(relic.equipped ? '장착 해제' : '장착')}
              </button>
            </div>
          </article>
        `;
      }

      function renderRelicLoadoutCard(loadout, index) {
        const relics = uniqueIds(loadout.relicIds || [])
          .map((relicId) => relicDefById(relicId))
          .filter(Boolean);
        const bonuses = relicBonusesForIds(loadout.relicIds || []);
        const savedState = loadout.savedAt
          ? `saved ${shortTime(loadout.savedAt)}`
          : 'unsaved';
        return `
          <article class="preset-card">
            <div class="preset-top">
              <div>
                <div class="mission-tier">Loadout ${escapeHtml(String(index + 1))}</div>
                <h3>${escapeHtml(loadout.name)}</h3>
              </div>
              <span class="pill">${escapeHtml(
                `${relics.length}/${RELIC_EQUIP_LIMIT}`,
              )}</span>
            </div>
            <p>${escapeHtml(
              relics.length
                ? relics.map((relic) => relic.title).join(' / ')
                : loadout.savedAt
                  ? '빈 세팅이 저장되어 있습니다.'
                  : '저장된 렐릭 세팅 없음',
            )}</p>
            <div class="preset-meta">
              <span>${escapeHtml(
                relics.length
                  ? formatRelicBonusSummary(bonuses)
                  : 'vault standby',
              )}</span>
              <span>${escapeHtml(savedState)}</span>
            </div>
            <div class="party-controls">
              <button
                type="button"
                class="secondary small"
                data-action="load-relic-loadout"
                data-loadout-slot="${escapeHtml(loadout.slotId)}"
              >
                불러오기
              </button>
              <button
                type="button"
                class="secondary small"
                data-action="save-relic-loadout"
                data-loadout-slot="${escapeHtml(loadout.slotId)}"
              >
                현재 렐릭 저장
              </button>
            </div>
          </article>
        `;
