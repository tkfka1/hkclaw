{{- if and (not .Values.admin.existingSecret) .Values.admin.username .Values.admin.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hkclaw.adminSecretName" . }}
  labels:
    {{- include "hkclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.admin.usernameKey }}: {{ .Values.admin.username | quote }}
  {{ .Values.admin.passwordKey }}: {{ .Values.admin.password | quote }}
{{- end }}
